<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SUGAR DEFENSE — お菓子 vs カビ タワーディフェンス</title>
<style>
  :root{ --pink:#ff8fc4; --spicy:#ff5a4a; --bitter:#b07a4a; --ink:#3a2540; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:#241033; color:#fff2fb;
    font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif; overflow:hidden; }
  #app{ display:flex; flex-direction:column; height:100%; max-width:760px; margin:0 auto; }
  header{ display:flex; align-items:center; gap:10px; padding:8px 12px;
    background:linear-gradient(90deg,#3a1c52,#5a2668); box-shadow:0 2px 8px #0006; }
  header h1{ font-size:16px; margin:0; letter-spacing:.02em; }
  header .grow{ flex:1; }
  .stat{ display:flex; align-items:center; gap:4px; font-weight:800; font-size:15px;
    background:#00000030; padding:4px 9px; border-radius:20px; }
  #stageWrap{ position:relative; flex:1; display:flex; align-items:center; justify-content:center;
    background:#1b0c28; overflow:hidden; }
  #cv{ width:100%; height:auto; max-height:100%; display:block; image-rendering:pixelated;
    touch-action:none; cursor:pointer; }
  #hint{ position:absolute; top:8px; left:50%; transform:translateX(-50%);
    background:#00000088; padding:5px 12px; border-radius:16px; font-size:12px; pointer-events:none;
    white-space:nowrap; max-width:94%; overflow:hidden; text-overflow:ellipsis; }
  /* パレット（タワー選択） */
  #palette{ display:flex; gap:6px; padding:8px; overflow-x:auto; background:#2b1440; }
  .tw{ flex:0 0 auto; width:76px; background:#3d1e59; border:2px solid #ffffff20; border-radius:12px;
    padding:6px 4px 5px; text-align:center; cursor:pointer; transition:.1s; position:relative; }
  .tw.sel{ border-color:#ffe27a; background:#5a2c7e; box-shadow:0 0 0 2px #ffe27a55; }
  .tw.cant{ opacity:.45; }
  .tw .ic{ font-size:22px; line-height:1; }
  .tw canvas{ width:40px; height:40px; display:block; margin:0 auto; image-rendering:pixelated; }
  .tw .nm{ font-size:10px; font-weight:700; margin-top:1px; white-space:nowrap; }
  .tw .co{ font-size:11px; font-weight:800; color:#ffe27a; }
  .badge{ position:absolute; top:2px; right:2px; font-size:11px; }
  /* 下部バー：ウェーブ開始・速度 */
  #ctrl{ display:flex; gap:8px; padding:8px 10px; background:#2b1440; align-items:center; }
  .btn{ border:none; border-radius:20px; padding:9px 14px; font-weight:800; font-size:14px;
    color:#3a2540; background:#ffe27a; cursor:pointer; }
  .btn.ghost{ background:#ffffff22; color:#fff; }
  .btn:disabled{ opacity:.5; cursor:default; }
  #ctrl .grow{ flex:1; }
  /* 選択中タワーの操作パネル */
  #selPanel{ position:absolute; left:50%; bottom:8px; transform:translateX(-50%);
    background:#3a1c52ee; border:2px solid #ffe27a; border-radius:14px; padding:8px 12px;
    display:none; gap:8px; align-items:center; box-shadow:0 4px 16px #0008; z-index:5; }
  #selPanel.on{ display:flex; }
  #selPanel .t{ font-size:13px; font-weight:800; }
  #selPanel .btn{ padding:6px 11px; font-size:13px; }
  /* オーバーレイ（勝敗・ステージ選択） */
  #overlay{ position:absolute; inset:0; background:#150820ee; display:none; z-index:20;
    align-items:center; justify-content:center; }
  #overlay.on{ display:flex; }
  .card{ background:#3a1c52; border:2px solid #ffffff22; border-radius:18px; padding:20px;
    text-align:center; max-width:88%; box-shadow:0 8px 30px #000a; }
  .card h1{ margin:.1em 0 .3em; font-size:24px; }
  .card p{ margin:.2em 0 1em; opacity:.9; font-size:14px; line-height:1.5; }
  .stages{ display:flex; flex-direction:column; gap:8px; }
  .sbtn{ background:#4d2670; border:2px solid #ffffff20; border-radius:12px; padding:10px 14px;
    font-weight:800; cursor:pointer; color:#fff; display:flex; justify-content:space-between; gap:12px; }
  .sbtn:disabled{ opacity:.4; cursor:default; }
  .sbtn .cl{ color:#8effa8; font-size:12px; }
</style>

<body>
<div id="app">
  <header>
    <h1>🏰 SUGAR DEFENSE</h1>
    <span class="grow"></span>
    <span class="stat">🍬<span id="coinTxt">0</span></span>
    <span class="stat">❤️<span id="lifeTxt">0</span></span>
    <span class="stat">🌊<span id="waveTxt">0</span></span>
  </header>
  <div id="stageWrap">
    <canvas id="cv" width="720" height="540"></canvas>
    <div id="hint">タワーを選んで空きマスに置こう！</div>
    <div id="selPanel">
      <span class="t" id="selT"></span>
      <button class="btn" id="upBtn"></button>
      <button class="btn ghost" id="sellBtn"></button>
    </div>
    <div id="overlay"><div class="card" id="ovCard"></div></div>
  </div>
  <div id="palette"></div>
  <div id="ctrl">
    <button class="btn" id="waveBtn">▶ つぎのウェーブ</button>
    <span class="grow"></span>
    <button class="btn ghost" id="spdBtn">⏩ 1x</button>
    <button class="btn ghost" id="menuBtn">🗺 ステージ</button>
  </div>
</div>

<script>
"use strict";
/* ============================================================
   SUGAR DEFENSE — お菓子の王国 vs カビ軍団 タワーディフェンス
   ・単一HTML完結。スプライトは index.html の SPRITE_DATA から build_td.js で注入。
   ・コアループ：カビが経路を進んで拠点へ → お菓子タワーを配置して迎撃 → 拠点HP0で敗北。
   ・🍬キャンディコインでタワー設置・強化。ウェーブ制。属性(甘/辛/苦)の三すくみ。
   ・数値バランスは各 TOWERS / ENEMIES / WAVES / CONF をいじるだけ。
   ============================================================ */
const SPRITE_DATA = /*__SPRITES__*/ {};
const SPRITES = {};
for(const k in SPRITE_DATA){ const im = new Image(); im.src = SPRITE_DATA[k]; SPRITES[k] = im; }

/* --- 盤面設定 --- */
const CONF = {
  W:720, H:540, TILE:60, COLS:12, ROWS:9,
  startCoins:180,     // 開始🍬
  startLives:20,      // 拠点ライフ
  prepBonus:8,        // ウェーブを早出しすると 1体につき残り予告カウント×この係数の🍬（今回は簡易＝未使用）
  sellRate:0.7,       // 売却で戻る割合
};

/* --- 属性（三すくみ：甘→辛→苦→甘。有利で×ADV、不利ペナルティなし） --- */
const ATTR = {
  sweet: {key:'sweet',  name:'甘', emoji:'🍬', col:'#ff8fc4'},
  spicy: {key:'spicy',  name:'辛', emoji:'🌶', col:'#ff5a4a'},
  bitter:{key:'bitter', name:'苦', emoji:'🍫', col:'#b07a4a'},
};
const ATTR_STRONG = { sweet:'spicy', spicy:'bitter', bitter:'sweet' }; // key が value に強い
const ATTR_ADV = 1.6;
// 攻撃属性 a が 防御属性 d に有利なら ADV、そうでなければ 1.0（不利でも等倍＝ペナルティなし）
function attrMul(a, d){ return ATTR_STRONG[a] === d ? ATTR_ADV : 1.0; }

/* --- タワー定義（お菓子＝味方・青スプライト） ---
   attr=属性 / cost=設置🍬 / range=射程px / cd=発射間隔s / dmg=基礎ダメージ
   splash=範囲半径px(0=単体) / slow={mul,dur}=鈍足 / spr=スプライトキー / shot=弾の種類 */
const TOWERS = {
  cookie: {name:'クッキー',  attr:'sweet',  cost:50,  range:100, cd:0.5, dmg:8,  splash:0,  spr:'cookie_blue',  shot:'crumb',
           desc:'安くて手数が多い甘の連射砲。'},
  shoe:   {name:'シューアーチャー', attr:'spicy', cost:85, range:165, cd:0.95,dmg:20, splash:0, spr:'shoe_aim_blue', shot:'arrow',
           desc:'射程が長い辛の狙撃手。遠くから撃ち抜く。'},
  daifuku:{name:'大福サムライ', attr:'spicy', cost:120, range:92, cd:1.1, dmg:22, splash:48, spr:'daifuku_blue', shot:'slash',
           desc:'刀の薙ぎで固まった敵をまとめて斬る辛の範囲アタッカー。'},
  choco:  {name:'チョコナイト', attr:'bitter', cost:95, range:78, cd:1.3, dmg:34, splash:0, spr:'choco_blue', shot:'heavy',
           desc:'短射程だが一撃が重い苦の壁役。'},
  icewiz: {name:'アイス魔導士', attr:'bitter', cost:110, range:140, cd:1.4, dmg:12, splash:40, slow:{mul:0.5,dur:1.4}, spr:'icewiz_blue', shot:'ice',
           desc:'氷弾で範囲の敵を鈍足にする苦の妨害役。'},
  slime:  {name:'スライム',  attr:'sweet',  cost:70,  range:96, cd:0.8, dmg:10, splash:36, spr:'slime_blue', shot:'goo',
           desc:'安めの甘の小範囲アタッカー。'},
};
const TOWER_ORDER = ['cookie','slime','shoe','daifuku','choco','icewiz'];

/* --- タワー強化（レベルごとにダメージ/射程アップ） --- */
const TOWER_MAX_LV = 3;
// Lv1=設置時。Lv2/3 の強化コストは設置コスト基準。
function upgradeCost(base, level){ return Math.round(base.cost * (0.8 + level*0.5)); } // Lv1→2, Lv2→3
function towerDmgAt(base, level){ return Math.round(base.dmg * (1 + (level-1)*0.7)); } // Lv1=x1, Lv2=x1.7, Lv3=x2.4
function towerRangeAt(base, level){ return Math.round(base.range * (1 + (level-1)*0.12)); }

/* --- 敵＝カビ軍団（canvas手描き・mold=形状 / col,col2=配色） ---
   attr=属性 / hp / speed=px/s / bounty=撃破🍬 / lives=拠点到達で減るライフ */
const ENEMIES = {
  m_swarm:{name:'アオカビン', attr:'spicy',  hp:34,  speed:52, bounty:5,  lives:1, scale:0.8,  mold:'blob',  col:'#7fae5c', col2:'#4f7038'},
  m_puff: {name:'プクーレ',   attr:'sweet',  hp:70,  speed:74, bounty:8,  lives:1, scale:0.9,  mold:'spiky', col:'#a7b86a', col2:'#6f7d3f'},
  m_phage:{name:'ファージ砲', attr:'bitter', hp:90,  speed:46, bounty:9,  lives:1, scale:0.98, mold:'phage', col:'#9a7bc0', col2:'#5f4488'},
  m_tank: {name:'ネバモチ',   attr:'bitter', hp:210, speed:34, bounty:14, lives:2, scale:1.15, mold:'blob',  col:'#6b7d55', col2:'#39482c'},
  m_big:  {name:'ドロカビ',   attr:'sweet',  hp:420, speed:26, bounty:24, lives:3, scale:1.34, mold:'blob',  col:'#8a6bb0', col2:'#573f83'},
};

/* --- 経路（cell座標のウェイポイント。曲がり角だけ書けば直線でつなぐ） ---
   入口＝左端(0,1)、拠点＝右端(11,7)。 */
const WAYPOINTS = [ [0,1],[9,1],[9,4],[2,4],[2,7],[11,7] ];
function cellCenter(c,r){ return { x:c*CONF.TILE + CONF.TILE/2, y:r*CONF.TILE + CONF.TILE/2 }; }
function inBounds(c,r){ return c>=0 && c<CONF.COLS && r>=0 && r<CONF.ROWS; }
// 経路が通る cell 集合（"c,r"）と、移動用のピクセルウェイポイントを作る（純関数）
function buildPath(waypoints){
  const cells = new Set(); const px = [];
  for(let i=0;i<waypoints.length;i++){
    const [c,r] = waypoints[i]; px.push(cellCenter(c,r));
    if(i===0){ cells.add(c+','+r); continue; }
    const [pc,pr] = waypoints[i-1];
    const dc = Math.sign(c-pc), dr = Math.sign(r-pr);
    let cc=pc, rr=pr;
    while(cc!==c || rr!==r){ cc+=dc; rr+=dr; cells.add(cc+','+rr); }
  }
  return { cells, px };
}
const PATH = buildPath(WAYPOINTS);
function isPathCell(c,r){ return PATH.cells.has(c+','+r); }

/* --- ウェーブ（各グループ：敵key×数、間隔s。lead=グループ開始までの待ち） --- */
const WAVES = [
  [ {key:'m_swarm', n:6, gap:0.9} ],
  [ {key:'m_swarm', n:8, gap:0.7}, {key:'m_puff', n:3, gap:1.2, lead:4} ],
  [ {key:'m_puff', n:6, gap:0.8}, {key:'m_phage', n:4, gap:1.0, lead:3} ],
  [ {key:'m_swarm', n:10, gap:0.5}, {key:'m_tank', n:2, gap:2.0, lead:5} ],
  [ {key:'m_phage', n:6, gap:0.8}, {key:'m_tank', n:3, gap:1.8, lead:4} ],
  [ {key:'m_puff', n:10, gap:0.5}, {key:'m_big', n:1, gap:1, lead:8} ],
  [ {key:'m_swarm', n:12, gap:0.4}, {key:'m_phage', n:6, gap:0.8, lead:3}, {key:'m_tank', n:3, gap:1.6, lead:8} ],
  [ {key:'m_tank', n:4, gap:1.4}, {key:'m_big', n:2, gap:3.0, lead:4}, {key:'m_puff', n:8, gap:0.5, lead:2} ],
];
function waveCount(wave){ return wave.reduce((s,g)=>s+g.n, 0); }

/* --- ステージ（今回は1マップ＝ウェーブ違いは将来。startCoins/lives でも難度調整可） --- */
const STAGES = [
  { id:1, name:'クッキー平原', waves:WAVES, coins:CONF.startCoins, lives:CONF.startLives },
];

/* ============================================================
   状態
   ============================================================ */
let state, world, elapsed=0, lastT=0, running=false, gameSpeed=1;
let selTowerKey=null;      // パレットで選択中のタワー種
let selPlaced=null;        // 盤面で選択中の設置済みタワー
let hoverCell=null;        // マウス/タッチ中のセル
let cvScale=1;             // 画面→内部座標の変換

function resetState(stage){
  state = {
    coins: stage.coins, lives: stage.lives,
    waveIdx: 0,               // 次に始めるウェーブ番号（0始まり）
    waveActive: false,        // 生成中か
    towers: [],               // {key,U,c,r,x,y,level,cool,dmg,range}
    occupied: new Set(),      // "c,r" 設置済みセル
    spawnQueue: [],           // {key,t}（絶対 elapsed 時刻に湧く）
    aliveEnemies: 0,          // このウェーブでまだ残っている（未撃破＋未到達）数
    stageClear: false, dead:false,
  };
  world = { enemies:[], shots:[], parts:[], slashes:[], nextId:1, shake:0 };
  elapsed = 0; selPlaced = null; running = true;
}

/* --- 設置可否（純関数寄り：state を参照するが判定はシンプル） --- */
function isBuildable(c,r){
  if(!inBounds(c,r)) return false;
  if(isPathCell(c,r)) return false;
  return !state.occupied.has(c+','+r);
}
function canAfford(cost){ return state.coins >= cost; }

/* --- タワー設置 --- */
function placeTower(key, c, r){
  const base = TOWERS[key];
  if(!base || !isBuildable(c,r) || !canAfford(base.cost)) return false;
  state.coins -= base.cost;
  const cc = cellCenter(c,r);
  state.towers.push({
    key, U:base, c, r, x:cc.x, y:cc.y, level:1, cool:0, spent:base.cost,
    dmg:towerDmgAt(base,1), range:towerRangeAt(base,1),
  });
  state.occupied.add(c+','+r);
  SFX.play('place');
  return true;
}
function upgradeTower(t){
  if(t.level>=TOWER_MAX_LV) return false;
  const cost = upgradeCost(t.U, t.level);
  if(!canAfford(cost)) return false;
  state.coins -= cost; t.spent += cost; t.level++;
  t.dmg = towerDmgAt(t.U, t.level);
  t.range = towerRangeAt(t.U, t.level);
  SFX.play('place');
  return true;
}
function sellTower(t){
  state.coins += Math.round(t.spent * CONF.sellRate);
  state.occupied.delete(t.c+','+t.r);
  state.towers = state.towers.filter(x=>x!==t);
  if(selPlaced===t) selPlaced=null;
  SFX.play('sell');
}

/* ============================================================
   ウェーブ生成
   ============================================================ */
function startWave(){
  if(state.waveActive || state.waveIdx >= curStage.waves.length) return;
  const wave = curStage.waves[state.waveIdx];
  state.spawnQueue = [];
  for(const g of wave){
    const lead = g.lead||0;
    for(let i=0;i<g.n;i++) state.spawnQueue.push({ key:g.key, t: elapsed + lead + i*g.gap });
  }
  state.spawnQueue.sort((a,b)=>a.t-b.t);
  state.waveActive = true;
  state.aliveEnemies = waveCount(wave);
  SFX.play('wave');
  updateHint('ウェーブ '+(state.waveIdx+1)+' 開始！');
}
function spawnEnemy(key){
  const D = ENEMIES[key];
  const p0 = PATH.px[0];
  world.enemies.push({
    id: world.nextId++, key, U:D, attr:D.attr,
    x:p0.x, y:p0.y, wp:1, traveled:0,
    hp:D.hp, maxHp:D.hp, speed:D.speed, bob:Math.random()*6.28,
    slowT:0, slowMul:1, fuseT:-1, kbT:0, kbVX:-1, dead:false, dir:1,
  });
}

/* ============================================================
   ターゲット選択（射程内で最も拠点に近い＝traveled最大の敵）
   純関数：enemies配列 と 塔座標/射程 から対象を返す
   ============================================================ */
function pickTarget(enemies, tx, ty, range){
  let best=null, bestProg=-1;
  for(const e of enemies){
    if(e.dead) continue;
    const dx=e.x-tx, dy=e.y-ty;
    if(dx*dx+dy*dy > range*range) continue;
    if(e.traveled > bestProg){ bestProg=e.traveled; best=e; }
  }
  return best;
}
// タワー1発ぶんの敵へのダメージ（属性補正込み）
function shotDamage(tower, enemy){ return tower.dmg * attrMul(tower.U.attr, enemy.attr); }

/* ============================================================
   毎フレーム更新
   ============================================================ */
function step(dt){
  elapsed += dt;
  // --- 敵の湧き ---
  while(state.spawnQueue.length && state.spawnQueue[0].t <= elapsed){
    spawnEnemy(state.spawnQueue.shift().key);
  }
  // --- 敵の移動 ---
  for(const e of world.enemies){
    if(e.dead) continue;
    // 鈍足
    if(e.slowT>0){ e.slowT-=dt; if(e.slowT<=0){ e.slowMul=1; } }
    if(e.kbT>0) e.kbT-=dt;
    e.bob += dt*6;
    const sp = e.speed * (e.slowMul||1);
    let remain = sp*dt;
    while(remain>0 && e.wp < PATH.px.length){
      const tgt = PATH.px[e.wp];
      const dx=tgt.x-e.x, dy=tgt.y-e.y; const d=Math.hypot(dx,dy);
      e.dir = dx>=0 ? 1 : -1;
      if(d <= remain){ e.x=tgt.x; e.y=tgt.y; e.traveled+=d; remain-=d; e.wp++; }
      else { e.x+=dx/d*remain; e.y+=dy/d*remain; e.traveled+=remain; remain=0; }
    }
    if(e.wp >= PATH.px.length){ // 拠点到達
      state.lives -= e.U.lives; e.dead=true; state.aliveEnemies--;
      world.shake = Math.min(10, world.shake+4);
      SFX.play('leak');
      if(state.lives<=0){ state.lives=0; lose(); }
    }
  }
  // --- タワーの攻撃 ---
  for(const t of state.towers){
    t.cool -= dt;
    if(t.cool>0) continue;
    const tgt = pickTarget(world.enemies, t.x, t.y, t.range);
    if(!tgt) continue;
    t.cool = t.U.cd;
    fireTower(t, tgt);
  }
  // --- 弾の移動＆命中 ---
  stepShots(dt);
  // --- 斬撃/粒子の寿命 ---
  for(const s of world.slashes) s.life -= dt;
  world.slashes = world.slashes.filter(s=>s.life>0);
  for(const p of world.parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt; }
  world.parts = world.parts.filter(p=>p.life>0);
  world.shake *= Math.pow(0.001, dt);
  // 死んだ敵を除去
  world.enemies = world.enemies.filter(e=>!e.dead);
  // --- ウェーブ終了判定 ---
  if(state.waveActive && state.spawnQueue.length===0 && state.aliveEnemies<=0){
    state.waveActive = false;
    state.waveIdx++;
    if(state.waveIdx >= curStage.waves.length){ win(); }
    else { updateHint('ウェーブクリア！つぎへ'); }
  }
  refreshHUD();
}

function fireTower(t, tgt){
  const base = t.U;
  SFX.play('shot_'+t.key);
  if(base.shot==='slash'){
    // 大福：即時の範囲斬り（弾を飛ばさない）
    world.slashes.push({ x:t.x, y:t.y, ang:Math.atan2(tgt.y-t.y,tgt.x-t.x), life:0.22, max:0.22, r:base.splash });
    applyAoE(t, tgt.x, tgt.y, base.splash);
    world.shake = Math.min(8, world.shake+2);
  } else {
    // 弾を飛ばす（命中で単体 or 範囲）
    const dx=tgt.x-t.x, dy=tgt.y-t.y; const d=Math.hypot(dx,dy)||1;
    const spd = 460;
    world.shots.push({ x:t.x, y:t.y-6, vx:dx/d*spd, vy:dy/d*spd, ang:Math.atan2(dy,dx),
      from:t, targetId:tgt.id, kind:base.shot, life:1.4 });
  }
}
function stepShots(dt){
  for(const s of world.shots){
    s.life-=dt;
    // 目標を追う（緩めのホーミング）
    const tgt = world.enemies.find(e=>e.id===s.targetId && !e.dead);
    if(tgt){
      const dx=tgt.x-s.x, dy=tgt.y-s.y; const d=Math.hypot(dx,dy)||1;
      const spd=Math.hypot(s.vx,s.vy);
      s.vx += (dx/d*spd - s.vx)*Math.min(1,dt*6);
      s.vy += (dy/d*spd - s.vy)*Math.min(1,dt*6);
      s.ang = Math.atan2(s.vy,s.vx);
      if(d < 14){ hitShot(s, tgt); s.life=0; continue; }
    }
    s.x+=s.vx*dt; s.y+=s.vy*dt;
    if(s.x<-30||s.x>CONF.W+30||s.y<-30||s.y>CONF.H+30) s.life=0;
  }
  world.shots = world.shots.filter(s=>s.life>0);
}
function hitShot(s, tgt){
  const t = s.from;
  if(t.U.splash>0){ applyAoE(t, tgt.x, tgt.y, t.U.splash); }
  else { damageEnemy(t, tgt); }
  burst(tgt.x, tgt.y, ATTR[t.U.attr].col, 5);
}
function applyAoE(t, x, y, r){
  for(const e of world.enemies){
    if(e.dead) continue;
    const dx=e.x-x, dy=e.y-y;
    if(dx*dx+dy*dy <= r*r) damageEnemy(t, e);
  }
  burst(x, y, ATTR[t.U.attr].col, 8);
}
function damageEnemy(t, e){
  const dmg = shotDamage(t, e);
  e.hp -= dmg;
  // 鈍足付与
  if(t.U.slow){ e.slowT = t.U.slow.dur; e.slowMul = t.U.slow.mul; }
  if(attrMul(t.U.attr, e.attr) > 1){ // ばつぐん！
    e._eff = elapsed;
  }
  if(e.hp <= 0 && !e.dead){
    e.dead = true; state.aliveEnemies--;
    state.coins += e.U.bounty;
    burst(e.x, e.y, e.U.col, 12);
    SFX.play('pop');
  }
}
function burst(x,y,c,n){
  for(let i=0;i<n;i++){ const a=Math.random()*6.28, sp=40+Math.random()*120;
    world.parts.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-40, r:2+Math.random()*3, c, life:0.4+Math.random()*0.3, max:0.7 }); }
}

/* ============================================================
   描画
   ============================================================ */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

function render(){
  const {W,H,TILE} = CONF;
  ctx.clearRect(0,0,W,H);
  // 背景
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#3a2a55'); bg.addColorStop(1,'#243a5c');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // 芝マス（設置可）＋グリッド
  for(let r=0;r<CONF.ROWS;r++) for(let c=0;c<CONF.COLS;c++){
    if(isPathCell(c,r)) continue;
    ctx.fillStyle = ((c+r)&1) ? '#3d6b46' : '#437a4e';
    ctx.fillRect(c*TILE+1, r*TILE+1, TILE-2, TILE-2);
  }
  drawPath();
  // 設置プレビュー（パレット選択中）
  if(selTowerKey && hoverCell){
    const {c,r} = hoverCell; const ok = isBuildable(c,r) && canAfford(TOWERS[selTowerKey].cost);
    const cc = cellCenter(c,r);
    ctx.fillStyle = ok ? '#ffffff30' : '#ff333340';
    ctx.fillRect(c*TILE+1, r*TILE+1, TILE-2, TILE-2);
    drawRange(cc.x, cc.y, towerRangeAt(TOWERS[selTowerKey],1), ok?'#ffe27a':'#ff6b6b');
  }
  // 選択中タワーの射程
  if(selPlaced) drawRange(selPlaced.x, selPlaced.y, selPlaced.range, '#ffe27a');

  const shk = world.shake||0;
  ctx.save();
  if(shk>0.2) ctx.translate(Math.sin(elapsed*90)*shk, Math.cos(elapsed*70)*shk*0.6);
  // タワー
  for(const t of state.towers) drawTower(t);
  // 敵（奥→手前）
  const es = world.enemies.slice().sort((a,b)=>a.y-b.y);
  for(const e of es) drawEnemy(e);
  // 斬撃
  for(const s of world.slashes) drawSlash(s);
  // 弾
  for(const s of world.shots) drawShot(s);
  // 粒子
  for(const p of world.parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill(); }
  ctx.globalAlpha=1;
  ctx.restore();
  drawBases();
}

function drawPath(){
  const {TILE} = CONF;
  ctx.save();
  ctx.strokeStyle='#caa15f'; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.lineWidth=TILE*0.86;
  ctx.beginPath();
  PATH.px.forEach((p,i)=> i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.stroke();
  ctx.strokeStyle='#e7c07a'; ctx.lineWidth=TILE*0.62;
  ctx.beginPath();
  PATH.px.forEach((p,i)=> i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.stroke();
  ctx.restore();
}
function drawBases(){
  const {TILE,H} = CONF;
  // 入口（左・カビの穴）
  const inp = PATH.px[0];
  ctx.fillStyle='#2b1a3a'; ctx.beginPath(); ctx.ellipse(inp.x-6, inp.y, 22, 16, 0,0,6.28); ctx.fill();
  ctx.fillStyle='#1a0f26'; ctx.beginPath(); ctx.ellipse(inp.x-6, inp.y, 14, 10, 0,0,6.28); ctx.fill();
  // 拠点（右・お菓子の城）
  const g = PATH.px[PATH.px.length-1];
  ctx.font = (TILE*0.9)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🏰', g.x+4, g.y-4);
}
function drawRange(x,y,r,col){
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col+'18'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(x,y,r,0,6.28); ctx.fill(); ctx.stroke(); ctx.restore();
}

function drawTower(t){
  const {TILE}=CONF; const S=TILE*0.92*(t.U.scale||1);
  const im = SPRITES[t.U.spr];
  // 台座
  ctx.fillStyle='#2a1838aa'; ctx.beginPath(); ctx.ellipse(t.x, t.y+TILE*0.30, TILE*0.36, TILE*0.14, 0,0,6.28); ctx.fill();
  // 向き：最寄りの経路方向（左向きが基本）
  const face = -1;
  ctx.save(); ctx.translate(t.x, t.y+2);
  const bob = Math.sin(elapsed*3 + t.x)*1.5;
  if(im && im.complete && im.naturalWidth){
    ctx.save(); if(face<0){ ctx.scale(-1,1); } ctx.drawImage(im, -S/2, -S/2+bob-4, S, S); ctx.restore();
  } else {
    ctx.fillStyle=ATTR[t.U.attr].col; ctx.beginPath(); ctx.arc(0,-4,S*0.3,0,6.28); ctx.fill();
  }
  ctx.restore();
  // 属性バッジ＋レベル
  ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(ATTR[t.U.attr].emoji, t.x-TILE*0.28, t.y-TILE*0.30);
  for(let i=0;i<t.level;i++){ ctx.fillStyle='#ffe27a';
    ctx.beginPath(); ctx.arc(t.x-6+i*6, t.y+TILE*0.36, 2.4, 0, 6.28); ctx.fill(); }
}

function drawEnemy(e){
  const {TILE}=CONF; const S=TILE*(e.U.scale||1);
  const cx=e.x, cy=e.y - S*0.1;
  drawMold(e, S, cx, cy + Math.sin(e.bob)*2);
  // HPバー
  if(e.hp < e.maxHp){
    const w=S*0.7, x=cx-w/2, y=cy - S*0.62;
    ctx.fillStyle='#00000088'; ctx.fillRect(x-1,y-1,w+2,5);
    ctx.fillStyle= e.hp/e.maxHp>0.4?'#7fe084':'#ff7a6b'; ctx.fillRect(x,y,w*Math.max(0,e.hp/e.maxHp),3);
  }
  // ばつぐん！演出
  if(e._eff && elapsed - e._eff < 0.5){
    ctx.save(); ctx.globalAlpha = 1-(elapsed-e._eff)/0.5;
    ctx.fillStyle='#fff27a'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('ばつぐん!', cx, cy - S*0.8); ctx.restore();
  }
}

/* --- カビの手描き（nyanko.tpl.html の drawMold を移植・調整） --- */
const KB_TIME=0.4;
function drawMold(u, S, cx, cy){
  const D=u.U, col=D.col||'#7fae5c', dk=D.col2||'#4f7038';
  const r=S*0.36, top=cy - S*0.5;
  const puls = D.mold==='spiky' ? (1 + 0.10*Math.sin(elapsed*20 + u.x)) : 1;
  ctx.save(); ctx.translate(cx, top);
  if(u.kbT>0) ctx.rotate((KB_TIME-u.kbT)*7*Math.sign(u.kbVX||-1));
  ctx.scale(puls, puls);
  const look = (u.dir>=0? 1 : -1) * 2.0;
  if(D.mold==='phage'){
    ctx.strokeStyle=dk; ctx.lineWidth=Math.max(2,S*0.05); ctx.lineCap='round';
    for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(i*r*0.5,0); ctx.lineTo(i*r*0.9, r*0.9+S*0.16); ctx.stroke(); }
    ctx.fillStyle=col; ctx.beginPath();
    for(let k=0;k<6;k++){ const a=Math.PI/6 + k*Math.PI/3; const px=Math.cos(a)*r, py=Math.sin(a)*r*0.9-r*0.2;
      k?ctx.lineTo(px,py):ctx.moveTo(px,py); } ctx.closePath(); ctx.fill();
    ctx.strokeStyle=dk; ctx.lineWidth=2; ctx.stroke();
    eyes(0,-r*0.25, r*0.5, S*0.11, look);
  } else if(D.mold==='spiky'){
    ctx.fillStyle=dk;
    for(let k=0;k<9;k++){ const a=k*6.283/9; const ox=Math.cos(a)*r, oy=Math.sin(a)*r;
      ctx.beginPath(); ctx.moveTo(ox*0.8,oy*0.8);
      ctx.lineTo(ox*1.35 - Math.sin(a)*r*0.18, oy*1.35 + Math.cos(a)*r*0.18);
      ctx.lineTo(ox*1.35 + Math.sin(a)*r*0.18, oy*1.35 - Math.cos(a)*r*0.18); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle=col; circle(0,0,r);
    eyes(0,-r*0.1, r*0.42, S*0.1, look);
  } else {
    ctx.fillStyle=col;
    const lumps=[[0,0,1],[-0.55,-0.15,0.6],[0.55,-0.1,0.62],[-0.3,-0.55,0.5],[0.32,-0.5,0.52],[0,0.35,0.7]];
    for(const [lx,ly,ls] of lumps) circle(lx*r, ly*r, r*ls);
    ctx.fillStyle=dk;
    for(const [sx,sy,ss] of [[-0.35,-0.1,0.14],[0.3,0.05,0.12],[0.05,-0.4,0.1],[-0.1,0.3,0.11]]) circle(sx*r,sy*r,r*ss);
    ctx.fillStyle=col; ctx.globalAlpha=0.6;
    for(let k=0;k<3;k++){ const a=elapsed*1.4 + k*2.1 + u.x*0.02; circle(Math.cos(a)*r*1.15, -r*1.0 - (k*4) + Math.sin(a)*3, r*0.08); }
    ctx.globalAlpha=1;
    eyes(0,-r*0.15, r*0.5, S*0.12, look);
  }
  ctx.restore();
  function circle(x,y,rr){ ctx.beginPath(); ctx.arc(x,y,rr,0,6.283); ctx.fill(); }
  function eyes(ex,ey,sp,er,lk){
    for(const s of [-1,1]){
      ctx.fillStyle='#fff'; circle(ex+s*sp*0.5, ey, er);
      ctx.fillStyle='#241a1a'; circle(ex+s*sp*0.5 + lk, ey+er*0.1, er*0.5);
    }
  }
}

function drawShot(s){
  if(s.kind==='arrow'){
    const im = SPRITES['arrow_blue']; const sz=34;
    ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.ang);
    if(im && im.complete && im.naturalWidth){ ctx.drawImage(im,-sz/2,-sz/2,sz,sz); }
    else { ctx.fillStyle='#ffe27a'; ctx.fillRect(-sz*0.3,-2,sz*0.6,4); }
    ctx.restore(); return;
  }
  const map={ crumb:'#ffd98a', heavy:'#7a5a3a', ice:'#9fe4ff', goo:'#8fe0a0' };
  const col=map[s.kind]||'#fff';
  ctx.save(); ctx.translate(s.x,s.y);
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(0,0, s.kind==='heavy'?6:4, 0,6.28); ctx.fill();
  if(s.kind==='ice'){ ctx.strokeStyle='#dff6ff'; ctx.lineWidth=1.5;
    for(let k=0;k<3;k++){ const a=k*2.09+elapsed*4; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*7,Math.sin(a)*7); ctx.stroke(); } }
  ctx.restore();
}
function drawSlash(s){
  const k = 1 - s.life/s.max;
  ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.ang);
  ctx.globalAlpha = (1-k)*0.9; ctx.strokeStyle='#fff6d0'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,0, s.r*(0.5+k*0.7), -0.9, 0.9); ctx.stroke();
  ctx.restore(); ctx.globalAlpha=1;
}

function buildPalette(){
  const pal = document.getElementById('palette'); pal.innerHTML='';
  for(const key of TOWER_ORDER){
    const b = TOWERS[key];
    const el = document.createElement('div'); el.className='tw'; el.dataset.key=key;
    el.innerHTML = '<canvas width="40" height="40"></canvas>'+
      '<div class="nm">'+b.name+'</div><div class="co">🍬'+b.cost+'</div>'+
      '<span class="badge">'+ATTR[b.attr].emoji+'</span>';

    pal.appendChild(el);
    // タワー立ち絵をミニcanvasに描く

    const im = SPRITES[b.spr];
    const draw=()=>{ mx.clearRect(0,0,40,40); if(im&&im.complete&&im.naturalWidth){ mx.imageSmoothingEnabled=false; mx.drawImage(im,2,2,36,36);} };
    if(im&&im.complete) draw(); else if(im) im.addEventListener('load',draw);
  }
  refreshPalette();
}
function refreshPalette(){
  document.querySelectorAll('#palette .tw').forEach(el=>{
    const key=el.dataset.key; const b=TOWERS[key];
    el.classList.toggle('sel', selTowerKey===key);
    el.classList.toggle('cant', !state || !canAfford(b.cost));
  });
}
function selectTower(key){
  selTowerKey = (selTowerKey===key? null : key);
  selPlaced = null; hideSelPanel();
  updateHint(selTowerKey ? TOWERS[key].name+'：'+TOWERS[key].desc+'（空きマスをタップ）' : 'タワーを選んで空きマスに置こう！');
  refreshPalette();
}

/* ============================================================
   入力
   ============================================================ */
function evtCell(ev){
  const rect = cv.getBoundingClientRect();
  const px = (ev.clientX - rect.left) / rect.width * CONF.W;
  const py = (ev.clientY - rect.top) / rect.height * CONF.H;
  return { c: Math.floor(px/CONF.TILE), r: Math.floor(py/CONF.TILE), px, py };
}
function onTap(ev){
  const {c,r} = evtCell(ev);
  // 設置済みタワーをタップ？
  const hit = state.towers.find(t=>t.c===c && t.r===r);
  if(hit && !selTowerKey){ showSelPanel(hit); return; }
  if(selTowerKey){
    if(placeTower(selTowerKey, c, r)){ refreshHUD(); if(!canAfford(TOWERS[selTowerKey].cost)){ selTowerKey=null; refreshPalette(); } }
    else if(!isBuildable(c,r)) updateHint('ここには置けないよ（経路や設置済み）');
    else updateHint('🍬が足りない！');
    return;
  }
  hideSelPanel();
}
cv.addEventListener('pointerdown', onTap);
cv.addEventListener('pointermove', ev=>{ hoverCell = evtCell(ev); });
cv.addEventListener('pointerleave', ()=>{ hoverCell=null; });

/* ============================================================
   効果音（Web Audio 合成・素材なし・ヘッドレスは無音）
   ============================================================ */
const SFX = (()=>{
  let ac=null; const last={};
  function ctxOf(){ try{ if(!ac && typeof AudioContext!=='undefined') ac=new AudioContext(); }catch(e){} return ac; }
  function blip(f,d,type,vol){ const c=ctxOf(); if(!c) return; const t=c.currentTime;
    const o=c.createOscillator(), g=c.createGain(); o.type=type||'square'; o.frequency.value=f;
    g.gain.setValueAtTime(vol||0.06,t); g.gain.exponentialRampToValueAtTime(0.0001,t+d);
    o.connect(g).connect(c.destination); o.start(t); o.stop(t+d); }
  function noise(d,vol){ const c=ctxOf(); if(!c) return; const t=c.currentTime;
    const n=c.createBufferSource(), buf=c.createBuffer(1,c.sampleRate*d,c.sampleRate); const dt=buf.getChannelData(0);
    for(let i=0;i<dt.length;i++) dt[i]=(Math.random()*2-1)*Math.pow(1-i/dt.length,2);
    const g=c.createGain(); g.gain.value=vol||0.08; n.buffer=buf; n.connect(g).connect(c.destination); n.start(); }
  const S={
    place:()=>blip(660,0.09,'triangle',0.08),
    sell:()=>blip(320,0.12,'sine',0.08),
    wave:()=>{ blip(440,0.12,'sawtooth',0.06); setTimeout(()=>blip(660,0.14,'sawtooth',0.06),120); },
    pop:()=>{ noise(0.12,0.06); blip(520,0.06,'square',0.05); },
    leak:()=>blip(140,0.25,'sawtooth',0.1),
    win:()=>{ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>blip(f,0.2,'triangle',0.08),i*130)); },
    lose:()=>{ [330,262,196].forEach((f,i)=>setTimeout(()=>blip(f,0.25,'sawtooth',0.08),i*160)); },
    shot_cookie:()=>blip(880,0.04,'square',0.03),
    shot_slime:()=>blip(520,0.05,'sine',0.03),
    shot_shoe:()=>blip(1000,0.05,'triangle',0.03),
    shot_choco:()=>blip(300,0.09,'square',0.05),
    shot_icewiz:()=>blip(1200,0.06,'sine',0.03),
    shot_daifuku:()=>noise(0.08,0.05),
  };
  return { play(name){ const now=Date.now(); if(last[name] && now-last[name]<40) return; last[name]=now; const f=S[name]; if(f) try{f();}catch(e){} } };
})();

/* ============================================================
   メインループ
   ============================================================ */
function loop(ts){
  if(!lastT) lastT=ts;
  let dt = Math.min(0.05, (ts-lastT)/1000); lastT=ts;
  if(running){ for(let i=0;i<gameSpeed;i++) step(dt); }
  render();
  requestAnimationFrame(loop);
}

/* --- キャンバスのCSSサイズを枠に合わせる（アスペクト維持） --- */
function fitCanvas(){
  const wrap=document.getElementById('stageWrap');
  const aw=wrap.clientWidth, ah=wrap.clientHeight;
  const ar=CONF.W/CONF.H;
  let w=aw, h=aw/ar; if(h>ah){ h=ah; w=ah*ar; }
  cv.style.width=w+'px'; cv.style.height=h+'px';
}
window.addEventListener('resize', fitCanvas);

/* --- 起動 --- */
function boot(){
  curStage = STAGES[0]; resetState(curStage);
  buildPalette(); fitCanvas(); refreshHUD();
  requestAnimationFrame(loop);
  openStages();
}
if(typeof document!=='undefined' && document.getElementById('cv')) boot();

/* ============================================================
   ヘッドレステスト用 API（純関数中心）
   ============================================================ */
globalThis.__API = {
  CONF, ATTR, ATTR_STRONG, ATTR_ADV, attrMul,
  TOWERS, TOWER_ORDER, ENEMIES, WAVES, STAGES, WAYPOINTS,
  cellCenter, inBounds, buildPath, isPathCell, get PATH(){ return PATH; },
  waveCount, upgradeCost, towerDmgAt, towerRangeAt, TOWER_MAX_LV,
  pickTarget, shotDamage,
  get state(){ return state; }, get world(){ return world; },
  resetState, isBuildable, canAfford, placeTower, upgradeTower, sellTower,
  startWave, spawnEnemy, step, damageEnemy,
  setStage:(s)=>{ curStage = s; }, get curStage(){ return curStage; },
};
</script>
