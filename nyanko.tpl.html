<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SUGAR MARCH（にゃんこ風・試作）</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:#0d0a16; color:#fff;
    font-family:system-ui,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN",sans-serif; overflow:hidden; }
  #wrap{ width:100%; height:100%; display:flex; flex-direction:column; align-items:center; }
  #top{ width:100%; max-width:960px; padding:6px 10px 0; }
  .tophead{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .bars{ display:flex; gap:10px; align-items:center; margin-top:2px; }
  .castle{ flex:1; }
  .clabel{ font-size:12px; opacity:.85; display:flex; justify-content:space-between; }
  .track{ height:12px; border-radius:7px; background:#00000055; overflow:hidden; box-shadow:inset 0 0 0 1px #ffffff22; }
  .fill{ height:100%; width:100%; transition:width .12s linear; }
  .p .fill{ background:linear-gradient(90deg,#43c6ff,#2a7bff); }
  .e .fill{ background:linear-gradient(90deg,#a7d15a,#5f8a34); }
  #moneyBox{ text-align:right; white-space:nowrap; font-weight:800; font-size:14px; text-shadow:0 1px 2px #000; }
  #moneyBox b{ color:#ffdf6b; font-size:20px; }
  #moneyBox .sub{ display:block; opacity:.65; font-size:11px; font-weight:600; }
  #stage{ width:100%; max-width:960px; flex:1; min-height:0; display:flex; align-items:center; justify-content:center; padding:4px 6px; }
  canvas{ width:100%; height:auto; max-height:100%; border-radius:12px; display:block;
    image-rendering:pixelated; box-shadow:0 8px 28px #0008; touch-action:manipulation; }
  #bottom{ width:100%; max-width:960px; display:flex; align-items:stretch; gap:8px; padding:8px 10px 12px; }
  #dock{ flex:1; display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  .btn{ position:relative; flex:1 1 90px; min-width:84px; max-width:150px; border:none; border-radius:12px; padding:6px 4px 5px;
    background:#241a33; color:#fff; cursor:pointer; overflow:hidden; user-select:none;
    box-shadow:0 3px 0 #0006, inset 0 0 0 1px #ffffff18; }
  .btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #0006, inset 0 0 0 1px #ffffff18; }
  .btn .ic{ width:40px; height:40px; margin:0 auto; display:block; image-rendering:pixelated; }
  .btn .nm{ font-size:10px; opacity:.9; margin-top:1px; }
  .btn .co{ font-size:12px; font-weight:800; color:#ffdf6b; }
  .btn .cd{ position:absolute; left:0; right:0; bottom:0; top:0; background:#000a;
    transform-origin:bottom; transform:scaleY(0); pointer-events:none; }
  .btn.off{ filter:grayscale(.6) brightness(.7); }
  .btn.rdy{ box-shadow:0 3px 0 #0006, inset 0 0 0 2px #ffd23f; }
  /* サイド操作ボタン（左下＝お財布 / 右下＝タワー攻撃） */
  .sidebtn{ position:relative; flex:0 0 80px; border:none; border-radius:12px; color:#fff; cursor:pointer; font-weight:800;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:6px 4px; overflow:hidden;
    user-select:none; box-shadow:0 3px 0 #0006, inset 0 0 0 1px #ffffff20; }
  .sidebtn:active{ transform:translateY(2px); box-shadow:0 1px 0 #0006, inset 0 0 0 1px #ffffff20; }
  .sidebtn .big{ font-size:22px; line-height:1; }
  .sidebtn .lbl{ font-size:10.5px; }
  .sidebtn .sub{ font-size:11px; color:#ffe27a; }
  .sidebtn.off{ filter:grayscale(.55) brightness(.72); }
  .sidebtn.rdy{ box-shadow:0 3px 0 #0006, inset 0 0 0 2px #ffd23f; }
  #walletBtn{ background:linear-gradient(160deg,#7b5cff,#a94bff); }
  #towerBtn{ background:linear-gradient(160deg,#ff8f43,#ff5b7d); }
  .sidebtn .cd{ position:absolute; inset:0; background:#000a; transform-origin:bottom; transform:scaleY(0); pointer-events:none; }
  #overlay{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:#000b; z-index:20; }
  #overlay .card{ background:#20152e; border-radius:18px; padding:26px 28px; text-align:center;
    box-shadow:0 12px 40px #000a, inset 0 0 0 1px #ffffff1a; max-width:88vw; }
  #overlay h1{ margin:0 0 6px; font-size:34px; }
  #overlay p{ margin:0 0 16px; opacity:.85; }
  #overlay button{ border:none; border-radius:12px; padding:12px 22px; font-size:16px; font-weight:800;
    background:linear-gradient(90deg,#ff9f43,#ff6b9d); color:#fff; cursor:pointer; box-shadow:0 4px 0 #0006; }
  #hint{ position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:5;
    background:#000a; padding:5px 12px; border-radius:20px; font-size:12px; opacity:.9; pointer-events:none; transition:opacity .5s; }
  .title{ font-size:13px; font-weight:800; letter-spacing:.5px; opacity:.9; margin-top:2px; }
  /* --- メタ画面（ホーム/ステージ選択/編成）--- */
  .screen{ position:fixed; inset:0; z-index:30; display:none; flex-direction:column; align-items:center;
    background:linear-gradient(180deg,#2a1a3a,#12203a); color:#fff; overflow-y:auto; padding:16px; }
  .screen.on{ display:flex; }
  .screen h1{ margin:8px 0 2px; font-size:30px; text-shadow:0 3px 0 #0006; }
  .screen .sub{ opacity:.7; font-size:13px; margin-bottom:14px; }
  .bigbtn{ border:none; border-radius:16px; padding:16px 34px; font-size:20px; font-weight:900; cursor:pointer;
    background:linear-gradient(90deg,#ff9f43,#ff6b9d); color:#fff; box-shadow:0 5px 0 #0006; }
  .bigbtn:active{ transform:translateY(2px); box-shadow:0 3px 0 #0006; }
  .bigbtn.off{ filter:grayscale(.6) brightness(.7); cursor:default; }
  .backbtn{ align-self:flex-start; border:none; background:#0004; color:#fff; border-radius:10px; padding:8px 14px;
    font-weight:800; cursor:pointer; margin-bottom:6px; }
  .list{ width:100%; max-width:520px; display:flex; flex-direction:column; gap:10px; }
  .stagecard{ display:flex; align-items:center; gap:12px; text-align:left; border:none; cursor:pointer;
    background:#2a2140; border-radius:14px; padding:12px 14px; color:#fff; box-shadow:0 3px 0 #0005, inset 0 0 0 1px #ffffff14; }
  .stagecard:active{ transform:translateY(2px); }
  .stagecard.locked{ filter:grayscale(.7) brightness(.6); cursor:default; }
  .stagecard .no{ font-size:22px; font-weight:900; width:38px; height:38px; border-radius:10px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; background:#0004; }
  .stagecard .nm{ font-weight:800; }
  .stagecard .meta{ font-size:11px; opacity:.7; }
  .stagecard .rw{ margin-left:auto; text-align:center; font-size:10px; opacity:.9; }
  .stagecard .rw img{ width:38px; height:38px; display:block; image-rendering:pixelated; }
  .stagecard .clr{ margin-left:auto; font-size:22px; }
  .grid{ width:100%; max-width:560px; display:grid; grid-template-columns:repeat(auto-fill,minmax(92px,1fr)); gap:8px; }
  .ucard{ position:relative; border:none; cursor:pointer; background:#241a33; border-radius:12px; padding:8px 4px 6px;
    color:#fff; box-shadow:0 3px 0 #0006, inset 0 0 0 1px #ffffff14; }
  .ucard img{ width:44px; height:44px; display:block; margin:0 auto; image-rendering:pixelated; }
  .ucard .nm{ font-size:10.5px; opacity:.9; }
  .ucard .co{ font-size:11px; font-weight:800; color:#ffdf6b; }
  .ucard.sel{ box-shadow:0 3px 0 #0006, inset 0 0 0 2px #ffd23f; background:#33264a; }
  .ucard .pick{ position:absolute; top:3px; right:5px; width:20px; height:20px; border-radius:50%; background:#ffd23f;
    color:#20152e; font-weight:900; font-size:12px; display:none; align-items:center; justify-content:center; }
  .ucard.sel .pick{ display:flex; }
  #loadoutBar{ position:sticky; bottom:0; width:100%; max-width:560px; display:flex; align-items:center; gap:10px;
    padding:10px 0; background:linear-gradient(180deg,#12203a00,#12203a); }
  #loadoutBar .cnt{ font-weight:800; }
</style>
</head>
<body>
<!-- ホーム -->
<div id="homeScreen" class="screen">
  <div style="flex:1"></div>
  <div style="font-size:52px">🍭</div>
  <h1>SUGAR MARCH</h1>
  <div class="sub">お菓子の王国をカビ軍団から守れ！</div>
  <button class="bigbtn" onclick="goSelect()">▶ はじめる</button>
  <button class="bigbtn" onclick="goCollect()" style="margin-top:10px;background:linear-gradient(90deg,#7b5cff,#a94bff);font-size:16px;padding:12px 26px">🍬 なかま／ガチャ</button>
  <div class="sub" id="homeProgress" style="margin-top:14px"></div>
  <div style="flex:1"></div>
</div>
<!-- なかま（解放＆ガチャ） -->
<div id="collectScreen" class="screen">
  <button class="backbtn" onclick="goHome()">← ホーム</button>
  <h1>なかま</h1>
  <div class="sub">🍬 <b id="collectCoins" style="color:#ffdf6b">0</b> キャンディコイン</div>
  <button class="bigbtn" onclick="doGacha()" id="gachaBtn" style="background:linear-gradient(90deg,#ff8f43,#ff5b7d);font-size:16px;padding:12px 26px;margin-bottom:14px">🎰 ガチャを回す（🍬<span id="gachaCostTxt"></span>）</button>
  <div class="grid" id="collectGrid" style="max-width:560px"></div>
</div>
<!-- ステージ選択 -->
<div id="selectScreen" class="screen">
  <button class="backbtn" onclick="goHome()">← ホーム</button>
  <h1>ステージ</h1>
  <div class="sub">クリアで新しいなかまが解放！</div>
  <div class="list" id="stageList"></div>
</div>
<!-- 編成 -->
<div id="loadoutScreen" class="screen">
  <button class="backbtn" onclick="goSelect()">← ステージ</button>
  <h1>へんせい</h1>
  <div class="sub" id="loadoutHint"></div>
  <div class="grid" id="unitGrid"></div>
  <div id="loadoutBar">
    <span class="cnt" id="loadoutCnt"></span>
    <button class="bigbtn" id="sortieBtn" onclick="sortie()" style="margin-left:auto;padding:12px 24px;font-size:17px">しゅつじん！</button>
  </div>
</div>
<div id="wrap">
  <div id="top">
    <div class="tophead">
      <div class="title">🍭 SUGAR MARCH <span style="opacity:.5;font-weight:400">— にゃんこ風・試作</span></div>
      <div id="moneyBox">🍬 <b id="moneyTxt">0</b><span class="sub">/<span id="capTxt">0</span> ・+<span id="rateTxt">0</span>/秒</span></div>
    </div>
    <div class="bars">
      <div class="castle e"><div class="clabel"><span>敵のお城 🏰</span><span id="ehpTxt"></span></div><div class="track"><div class="fill" id="ehp"></div></div></div>
      <div class="castle p"><div class="clabel"><span id="phpTxt"></span><span>🏰 じぶんのお城</span></div><div class="track"><div class="fill" id="php"></div></div></div>
    </div>
  </div>
  <div id="stage"><canvas id="cv" width="960" height="440"></canvas></div>
  <div id="bottom">
    <button id="walletBtn" class="sidebtn" onclick="upgradeWallet()"><span class="big">💰</span><span class="lbl">お財布UP</span><span class="sub" id="walletSub">Lv1</span></button>
    <div id="dock"></div>
    <button id="towerBtn" class="sidebtn" onclick="castTower()"><span class="cd" id="towerCdFill"></span><span class="big">💥</span><span class="lbl">タワー攻撃</span><span class="sub" id="towerSub">OK</span></button>
  </div>
</div>
<div id="hint">🍬を貯めて下のボタンでなかまを出撃！ 左の敵のお城を落とそう（右＝自分）</div>
<div id="overlay"><div class="card"><h1 id="ovT"></h1><p id="ovP"></p><div id="overButtons" style="display:flex;flex-direction:column;gap:8px;align-items:center"></div></div></div>

<script>
"use strict";
/* ============================================================
   SUGAR MARCH — SUGAR WARS のキャラを流用した「にゃんこ大戦争風」1レーン試作
   ・本家 index.html とは独立した単一ファイル（スプライトは index.html から流用）。
   ・コアループ：🍬が時間で貯まる → ボタンで出撃 → 左へ歩いて自動戦闘 → 敵の城を破壊で勝利。
   ・レイアウト：右＝味方陣地／左＝敵陣地。🍬右上・お財布UP左下・タワー攻撃右下。
   ・数値は仮。バランス調整は各 DEFS / CONF をいじるだけ。
   ============================================================ */
const SPRITE_DATA = /*__SPRITES__*/ {};
const SPRITES = {};
for(const k in SPRITE_DATA){ const im = new Image(); im.src = SPRITE_DATA[k]; SPRITES[k] = im; }

/* --- 設定（ここを触ればバランス調整できる） --- */
const CONF = {
  W: 960, H: 440,
  groundY: 384,          // 地面のライン（足元がここに乗る）
  rowBand: 36,           // ユニットを縦に散らす幅（重なっても見分けやすいよう・浮かない範囲で）
  castleHP: 1600,        // 両陣営のお城HP
  moneyStart: 160,       // 開始🍬
  moneyRate: 26,         // 🍬/秒（お財布Lv0）
  moneyCap: 700,         // 🍬上限（お財布Lv0）
  arrowSize: 70,         // シューの矢の描画サイズ(px)。大きいほど大量に飛ぶ迫力が出る
  castleAtkRange: 60,    // お城への攻撃が届く距離（大きいほど手前で殴れる＝城にめり込まない）
  spawnInset: 18,        // ユニットの湧き位置（城のふち＝端からの距離）。castleAtkRangeより内側にして
                         // 「城に張り付いた敵ユニットの後ろ」に湧かせ、防衛側が張り付き組を最優先で攻撃できるように
  maxUnitsPerSide: 60,   // 片side上限（暴走防止）
  enemyStartCd: 3.6,     // 敵の出撃間隔（開始）
  enemyMinCd: 1.5,       // 敵の出撃間隔（最短）
  enemyRampSec: 70,      // この秒数かけて最短まで詰める
  // お財布レベルアップ
  walletMax: 6,          // 最大Lv
  walletRateStep: 10,    // 1Lvごとの🍬/秒アップ
  walletCapStep: 120,    // 1Lvごとの上限アップ
  walletCostBase: 130,   // Lv1→2のコスト
  walletCostStep: 90,    // 以降1Lvごとの追加コスト
  // タワー攻撃スキル（右下ボタン＝自分の城から放つ一撃）
  towerDmg: 120,         // 敵ユニットへのダメージ
  towerKB: 70,           // 敵を自陣（左）へ押し戻す距離
  towerCd: 12,           // クールダウン秒
};

/* --- ユニット定義（本家 UNITS の抜粋＋にゃんこ用の出撃コスト/リチャージ） ---
   role: melee=近接 / ranged=射手 / bomber=自爆
   cost=出撃🍬 / rc=リチャージ秒 / num=1回で出る数 / scale=描画倍率 / spr=スプライト名 */
const DEFS = {
  // 量産（特殊なし・安い数押し）。槍を横に構えて前へ突き出す
  cookie: {name:'クッキー',   role:'melee',  atk:14, hp:50,  speed:118, range:26, cd:0.35, scale:0.80,
           cost:50,  rc:2.0, num:2, spr:'cookie',
           gear:'spear', body:'cookie_body', bodyWalk:['cookie_body','cookie_body2'], bodyFps:4},
  // 支援：一定間隔で頭上にミラーボール→近くの味方の攻撃UP（クッキーはさらにUP）
  partycookie:{name:'パーティークッキー', role:'melee', atk:8, hp:90, speed:100, range:26, cd:0.6, scale:0.86,
           cost:140, rc:8.0, num:1, spr:'cookie_party',
           disco:{cd:4.5, dur:2.5, r:110, mul:1.35, cookieMul:1.9}},
  // スライム：倒れるとチビ2体に分裂。ぽよんジャンプ移動アニメ
  slime:  {name:'スライム',   role:'melee',  atk:8,  hp:90,  speed:84,  range:26, cd:0.6, scale:0.92,
           cost:70,  rc:3.2, num:2, spr:'slime', split:{key:'chibi', n:2},
           anim:{hop:true, base:'slime', squash:'slime_squash', up:'slime_up', fps:1.5}},
  // 巨大スライム：倒れるとスライム2体→さらにチビ2体に分裂（2段チェーン）
  bigslime:{name:'巨大スライム', role:'melee', atk:14, hp:280, speed:76, range:28, cd:0.7, scale:1.30,
           cost:160, rc:9.0, num:1, spr:'slimebig', split:{key:'slime', n:2},
           anim:{hop:true, base:'slimebig', squash:'slimebigsquash', up:'slimebigup', fps:1.1}},
  chibi:  {name:'チビスライム', role:'melee', atk:5,  hp:30,  speed:98,  range:24, cd:0.5, scale:0.60,
           spr:'slime', anim:{hop:true, base:'slime', squash:'slime_squash', up:'slime_up', fps:1.8}}, // 分裂専用
  // 突撃：納刀→少し抜刀→高速突撃→鋭い切り付け（居合）。初撃で大ダメージ
  daifuku:{name:'大福',       role:'melee',  atk:18, hp:160, speed:66,  range:30, cd:0.85, scale:0.98,
           cost:120, rc:6.5, num:1, spr:'daifuku', gear:'katana', body:'daifuku_body',
           charge:{dmg:150, spd:6.0, r:46, windup:0.6}},
  // ただ硬い壁。剣を振って攻撃（剣＋盾を合成）
  choco:  {name:'チョコ',     role:'melee',  atk:20, hp:240, speed:60,  range:32, cd:0.95, scale:1.05,
           cost:130, rc:7.0, num:1, spr:'choco', gear:'sword', body:'choco_body'},
  // 妨害：送風で正面の敵を吹き飛ばす（自身は超硬タンク）
  donut:  {name:'ドーナッツ', role:'melee',  atk:6,  hp:460, speed:48,  range:32, cd:1.1,  scale:1.12,
           cost:210, rc:13.0,num:1, spr:'donut', blow:{cd:2.0, kb:95, r:130}},
  // 後衛射手（矢）。歩行2フレーム＋構え（攻撃）／待機ポーズ
  shoe:   {name:'シュー',     role:'ranged', atk:16, hp:46,  speed:56,  range:175, cd:1.0, scale:0.86,
           cost:90,  rc:4.0, num:1, spr:'shoe_aim', arc:true,
           anim:{walk:['shoe_walk1','shoe_walk2'], atk:'shoe_aim', idle:'shoe_idle', fps:3}},
  // 自爆。歩行2フレーム
  bomb:   {name:'ポップコーン',role:'bomber', atk:0,  hp:55,  speed:132, range:30, cd:1.0, scale:0.86,
           blast:120, blastR:64, cost:60, rc:3.0, num:1, spr:'bomb',
           anim:{walk:['bomb','bomb2'], idle:'bomb', fps:4}},
};
const ORDER = ['cookie','partycookie','slime','bigslime','daifuku','choco','donut','shoe','bomb'];

/* ============================================================
   ゲーム基盤：スターター／ステージ／編成／進行（localStorage保存）
   ・キャラ追加＝DEFS/ORDERに足す。ステージ追加＝STAGESに1行足すだけ。
   ============================================================ */
const STARTERS = ['cookie','choco'];   // 最初から使える2体（前衛＋壁）
const LOADOUT_MAX = 6;                  // 編成に持ち込める最大数
// coins=そのステージ初回クリアの🍬キャンディコイン報酬（再挑戦は少額）
const STAGES = [
  { id:1, name:'カビの森 入口',   enemyHP:1100, spawnStart:3.8, spawnMin:2.1, ramp:75, coins:150,
    pools:[[0.35,['m_swarm','m_swarm','m_puff']],[0.7,['m_swarm','m_puff','m_phage']],[1,['m_swarm','m_tank','m_phage']]] },
  { id:2, name:'ねばねば湿地',     enemyHP:1400, spawnStart:3.4, spawnMin:1.9, ramp:80, coins:200,
    pools:[[0.3,['m_swarm','m_swarm','m_phage']],[0.6,['m_swarm','m_tank','m_puff']],[1,['m_swarm','m_tank','m_phage','m_puff']]] },
  { id:3, name:'紫カビ回廊',       enemyHP:1750, spawnStart:3.1, spawnMin:1.7, ramp:85, coins:250,
    pools:[[0.3,['m_swarm','m_phage','m_puff']],[0.6,['m_swarm','m_tank','m_phage']],[1,['m_swarm','m_tank','m_big','m_phage']]] },
  { id:4, name:'胞子の大広間',     enemyHP:2100, spawnStart:2.8, spawnMin:1.5, ramp:90, coins:300,
    pools:[[0.3,['m_swarm','m_tank','m_puff']],[0.6,['m_swarm','m_tank','m_phage','m_puff']],[1,['m_swarm','m_tank','m_big','m_phage','m_puff']]] },
  { id:5, name:'カビ大帝の巣',     enemyHP:2600, spawnStart:2.6, spawnMin:1.4, ramp:95, coins:400,
    pools:[[0.3,['m_swarm','m_tank','m_phage']],[0.6,['m_swarm','m_tank','m_big','m_puff']],[1,['m_tank','m_big','m_phage','m_puff','m_swarm']]] },
];
const STAGE_BY_ID = Object.fromEntries(STAGES.map(s=>[s.id,s]));
const REPLAY_COINS = 30;                // 再挑戦クリアの報酬
// キャラ解放：coin=🍬で購入 / gacha=ガチャ限定（コインでは買えない）
const UNLOCKS = {
  slime:      {via:'coin', cost:200},
  bomb:       {via:'coin', cost:250},
  shoe:       {via:'coin', cost:350},
  daifuku:    {via:'coin', cost:500},
  donut:      {via:'coin', cost:700},
  partycookie:{via:'gacha'},
  bigslime:   {via:'gacha'},
};
const GACHA_COST = 400;                                 // 1回ガチャの🍬
const GACHA_POOL = ['partycookie','bigslime'];          // ガチャから出るキャラ（増やせる）
const GACHA_DUP_COINS = 120;                            // 重複時の🍬還元

/* --- 敵＝カビ軍団（画像素材なし・canvasで手描き。mold=描画形状 / col,col2=配色） ---
   ステータスは対応するお菓子とほぼ同じ＝バランスは据え置き。見た目と名前だけカビ化。 */
const FOE_DEFS = {
  m_swarm:{name:'アオカビン', role:'melee',  atk:14, hp:50,  speed:118, range:26, cd:0.35, scale:0.82,
           num:2, mold:'blob',  col:'#7fae5c', col2:'#4f7038'},   // 前衛スウォーム（クッキー相当）
  m_tank: {name:'ネバモチ',   role:'melee',  atk:20, hp:230, speed:60,  range:32, cd:0.95, scale:1.18,
           num:1, mold:'blob',  col:'#6b7d55', col2:'#39482c'},   // 壁タンク（チョコ相当）
  m_big:  {name:'ドロカビ',   role:'melee',  atk:8,  hp:460, speed:48,  range:32, cd:1.1,  scale:1.34,
           num:1, mold:'blob',  col:'#8a6bb0', col2:'#573f83'},   // 超硬タンク（ドーナッツ相当）
  m_phage:{name:'ファージ砲', role:'ranged', atk:14, hp:46,  speed:56,  range:170, cd:1.0, scale:0.98,
           num:1, mold:'phage', col:'#9a7bc0', col2:'#5f4488'},   // 射手（シュー相当）
  m_puff: {name:'プクーレ',   role:'bomber', atk:0,  hp:55,  speed:132, range:30, cd:1.0, scale:0.92,
           blast:120, blastR:64, num:1, mold:'spiky', col:'#a7b86a', col2:'#6f7d3f'}, // 自爆（ポップコーン相当）
};

/* --- 状態 --- */
let world, money, php, ehp, cd, enemyCd, elapsed, running, lastT, walletLv, towerCd, hintT;
let curStage=null, myLoadout=STARTERS.slice(0,LOADOUT_MAX);   // 現在のステージ／編成

function effRate(){ return CONF.moneyRate + walletLv*CONF.walletRateStep; }
function effCap(){ return CONF.moneyCap + walletLv*CONF.walletCapStep; }
function walletCost(){ return CONF.walletCostBase + walletLv*CONF.walletCostStep; }

function reset(){
  world = { units:[], shots:[], parts:[], slashes:[], nextId:1, shake:0 };
  money = CONF.moneyStart;
  php = CONF.castleHP;
  ehp = curStage ? curStage.enemyHP : CONF.castleHP;   // 敵城HPはステージ難易度
  cd = {}; for(const k of ORDER) cd[k]=0;
  enemyCd = 1.2;
  elapsed = 0;
  walletLv = 0;
  towerCd = 0;              // タワー攻撃：最初から撃てる
  running = true;
}

/* --- ユニットオブジェクトを作る（デプロイ・分裂で共用） --- */
function defOf(key, side){ return side==='p' ? (DEFS[key]||FOE_DEFS[key]) : (FOE_DEFS[key]||DEFS[key]); }
function newUnit(key, side, x, y){
  const D = defOf(key, side);
  return {
    id: world.nextId++, key, side, U:D, x, y,
    hp:D.hp, maxHp:D.hp, atk:D.atk, speed:D.speed, range:D.range, cd:D.cd,
    cool: Math.random()*0.2, dir: side==='p'?-1:1, bob:Math.random()*6.28,
    fuseT:-1, dead:false,
    charging: !!D.charge,                 // 大福＝出た直後は突撃状態
    chargeT: 0,                           // 突撃の経過時間（納刀→抜刀→突撃の判定）
    blowT: 0,                             // ドーナッツ送風タイマー
    discoT: D.disco ? D.disco.cd*0.4 : 0, // パーティークッキーのミラーボール発生タイマー
    auraT: 0, buffMul: 1,
    moving: false, atkAnim: 0, px: x,     // アニメ用（歩行/攻撃/前フレームx）
    kbVX:0, kbVY:0, kbY:0, kbT:0,          // 吹き飛び（ノックバック）の速度・高さ・残り時間
  };
}
const ATK_ANIM = 0.18;   // 攻撃モーションの表示時間(秒)
/* --- ノックバック：座標ワープでなく、弧を描いて後ろへ吹き飛ばす --- */
const KB_TAU=0.12, KB_POP=250, KB_GRAV=1300, KB_TIME=0.5;
function applyKnock(o, fromX, dist){
  const dir = Math.sign(o.x - fromX) || -1;   // 攻撃者から遠ざかる向き
  o.kbVX = dir * dist / KB_TAU;                // 初速（KB_TAUで減衰し概ね dist 進む）
  o.kbVY = -KB_POP; o.kbY = -0.01; o.kbT = KB_TIME;
}

/* --- ユニット生成（デプロイ／敵湧き） --- */
function spawn(key, side){
  const D = defOf(key, side);
  if(world.units.filter(u=>u.side===side).length >= CONF.maxUnitsPerSide) return;
  const n = D.num || 1;
  for(let i=0;i<n;i++){
    // 味方(p)は右端ふちから出て左へ／敵(e)は左端ふちから出て右へ（張り付き組を優先迎撃できる湧き位置）
    const baseX = side==='p' ? CONF.W-CONF.spawnInset : CONF.spawnInset;
    const dir = side==='p' ? -1 : 1;
    const y = CONF.groundY - Math.random()*CONF.rowBand;
    world.units.push(newUnit(key, side, baseX + dir*(i*14 + Math.random()*8), y));
  }
}

/* --- 前方（進行方向の先）にいる敵/味方で一番近いもの --- */
function frontUnit(u, sameSide){
  let best=null, bg=1e9;
  for(const o of world.units){
    if(o.dead || o===u) continue;
    if(sameSide ? o.side!==u.side : o.side===u.side) continue;
    const ahead = u.dir>0 ? o.x>u.x : o.x<u.x;   // 進む向きの先にいるか
    if(!ahead) continue;
    const g = Math.abs(o.x-u.x);
    if(g<bg){ bg=g; best=o; }
  }
  return best ? {o:best, gap:bg} : null;
}
// テスト互換：一番近い敵（前後問わず）
function nearestEnemy(u){
  let best=null,bd=1e9;
  for(const o of world.units){ if(o.side===u.side||o.dead) continue; const d=Math.abs(o.x-u.x); if(d<bd){bd=d;best=o;} }
  return best?{o:best,d:bd}:null;
}

/* --- ダメージ適用（装甲=被ダメ軽減をここで一本化） --- */
function hurt(o, dmg){ o.hp -= dmg * (1 - (o.U.dr||0)); }

/* --- 分裂：倒れた場所に子ユニット（別の種類）を生む。
   split={key,n} で子の種類と数を指定＝巨大スライム→スライム→チビ の多段チェーン --- */
function splitOnDeath(u){
  const sp = u.U.split; if(!sp) return;
  for(let i=0;i<sp.n;i++){
    const c = newUnit(sp.key, u.side, u.x + (i? 14 : -14), u.y);
    world.units.push(c);
  }
}

/* --- パーティークッキー：ミラーボールで近くの味方の攻撃UP（クッキーはさらにUP） ---
   各ユニットの u.buffMul（攻撃倍率）を毎フレーム再計算する。 */
function updateBuffs(dt){
  for(const u of world.units){
    if(u.U.disco){
      u.discoT -= dt;
      if(u.discoT<=0){ u.discoT = u.U.disco.cd; u.auraT = u.U.disco.dur; SFX_disco(); }
      if(u.auraT>0) u.auraT -= dt;
    }
    u.buffMul = 1;
  }
  for(const a of world.units){
    const dz = a.U.disco; if(!dz || a.dead || !(a.auraT>0)) continue;
    for(const o of world.units){
      if(o.dead || o.side!==a.side) continue;
      if(Math.abs(o.x-a.x) <= dz.r){
        const m = (o.key==='cookie'||o.key==='partycookie') ? dz.cookieMul : dz.mul;
        if(m > o.buffMul) o.buffMul = m;
      }
    }
  }
}

/* --- ドーナッツの送風：正面（進行方向の先）の敵を吹き飛ばす --- */
function blowAway(u, blow){
  for(const o of world.units){
    if(o.side===u.side || o.dead) continue;
    const ahead = u.dir>0 ? o.x>u.x : o.x<u.x;
    if(!ahead || Math.abs(o.x-u.x) > blow.r) continue;
    applyKnock(o, u.x, blow.kb);   // パーンと後ろへ吹き飛ばす
  }
  // 風のエフェクト（前方へ流れる粒）
  for(let i=0;i<10;i++){ const spd=120+Math.random()*160;
    world.parts.push({x:u.x, y:u.y-20-Math.random()*30, vx:u.dir*spd, vy:(Math.random()-0.5)*40, life:0.4, max:0.4, c:'#cfe8ff', r:2+Math.random()*2}); }
  SFX_blow();
}

/* --- 大福の居合の斬撃エフェクト --- */
function slashFx(u){
  for(let i=0;i<12;i++){ const a=Math.random()*6.28, s=60+Math.random()*160;
    world.parts.push({x:u.x, y:u.y-18, vx:Math.cos(a)*s, vy:Math.sin(a)*s-40, life:0.35, max:0.35, c:'#fff2c4', r:2+Math.random()*3}); }
}

/* --- 爆発（bomber） --- */
function explode(x, y, side, blast, blastR){
  for(const o of world.units){
    if(o.side===side || o.dead) continue;
    const d = Math.hypot(o.x-x, o.y-y);
    if(d<=blastR){ hurt(o, blast*(1 - 0.5*(d/blastR))); }
  }
  if(side==='p' && x<=blastR+CONF.castleAtkRange) ehp -= blast;              // 敵城=左
  if(side==='e' && (CONF.W-x)<=blastR+CONF.castleAtkRange) php -= blast;     // 味方城=右
  const c = side==='e' ? '#b6e06a' : '#ffd23f';   // カビ=緑の胞子 / お菓子=金
  for(let i=0;i<14;i++){ const a=Math.random()*6.28, s=40+Math.random()*120;
    world.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-30,life:0.5,max:0.5,c,r:3+Math.random()*3}); }
  SFX_boom();
}

/* --- 弾（射手） --- */
function fireShot(u, target){
  if(u.U.arc){
    // シューの矢：山なりの弧を描いて着弾（大きめ）
    const x0=u.x + u.dir*8, y0=u.y-34, tx=target.x, ty=target.y-14;
    const dist=Math.abs(tx-x0);
    world.shots.push({ lob:true, side:u.side, dmg:u.atk*(u.buffMul||1), r:18, tid:target.id,
      x:x0, y:y0, x0, y0, tx, ty, t:0, dur:Math.max(0.4, dist/360), arcH:70+dist*0.35, ang:0, arrow:true });
  }else{
    world.shots.push({ x:u.x, y:u.y-16, side:u.side, dmg:u.atk, sp:340, r:12,
      tid:target.id, tx:target.x, ty:target.y-16, ang:0 });
  }
}

/* --- 1フレーム進める --- */
function step(dt){
  elapsed += dt;
  money = Math.min(effCap(), money + effRate()*dt);
  for(const k of ORDER) if(cd[k]>0) cd[k]=Math.max(0, cd[k]-dt);
  if(towerCd>0) towerCd = Math.max(0, towerCd-dt);
  if(world.shake>0) world.shake = Math.max(0, world.shake - dt*40);   // 画面揺れの減衰
  if(world.beam){ world.beam.t += dt; if(world.beam.t >= world.beam.dur) world.beam=null; }

  // 敵の出撃（ステージごとの間隔/ランプ）
  enemyCd -= dt;
  if(enemyCd<=0){
    enemySpawn();
    const S = curStage;
    const ramp = S ? S.ramp : CONF.enemyRampSec;
    const start = S ? S.spawnStart : CONF.enemyStartCd;
    const minc  = S ? S.spawnMin : CONF.enemyMinCd;
    const p = Math.min(1, elapsed/ramp);
    enemyCd = start + (minc-start)*p;
  }

  updateBuffs(dt);   // パーティークッキーのミラーボール→味方の攻撃バフ(u.buffMul)を先に計算

  for(const u of world.units){
    if(u.dead) continue;
    u.bob += dt*10;
    if(u.atkAnim>0) u.atkAnim -= dt;
    // 吹き飛び中：弧を描いて後ろへ飛ぶ（この間はAIしない）
    if(u.kbT>0){
      u.kbT -= dt;
      u.kbVX -= u.kbVX*Math.min(1, dt/KB_TAU);          // 水平は減衰
      u.x += u.kbVX*dt;
      u.kbVY += KB_GRAV*dt; u.kbY += u.kbVY*dt;          // 上下は放物線
      if(u.kbY>=0){ u.kbY=0; if(u.kbVY>140){ u.kbVY=-u.kbVY*0.35; } else { u.kbVY=0; } }  // 着地バウンド
      u.x = Math.max(CONF.castleAtkRange, Math.min(CONF.W-CONF.castleAtkRange, u.x));
      continue;
    }
    const D = u.U;
    const fe = frontUnit(u,false);          // 前方の敵
    const castleX = u.side==='p' ? 0 : CONF.W;   // 攻撃対象は相手の城（味方=左の敵城 / 敵=右の味方城）
    const castleGap = Math.abs(castleX - u.x);
    const enemyInRange  = fe && fe.gap <= u.range;
    const castleInRange = castleGap <= Math.max(u.range, CONF.castleAtkRange);

    // ドーナッツの送風：一定間隔で正面の敵を吹き飛ばす
    if(D.blow){
      u.blowT -= dt;
      if(u.blowT<=0 && fe && fe.gap <= D.blow.r){
        u.blowT = D.blow.cd; blowAway(u, D.blow);
      }
    }

    // 導火中（bomber）
    if(u.fuseT>=0){
      u.fuseT -= dt;
      if(u.fuseT<=0){ explode(u.x,u.y,u.side,D.blast,D.blastR); u.dead=true; }
      continue;
    }
    // 自爆準備
    if(D.role==='bomber' && (enemyInRange || castleInRange)){ u.fuseT=0.28; continue; }

    // 大福の居合：納刀→(windup)少し抜刀→突撃→鋭い切り付け。初撃だけ大ダメージ（範囲）
    if(u.charging){
      u.chargeT += dt;
      const windup = u.chargeT < D.charge.windup;   // 抜刀のためだけの時間（まだ斬らない）
      if(!windup && (enemyInRange || castleInRange)){
        if(enemyInRange){
          for(const o of world.units){ if(o.side===u.side || o.dead) continue;   // 敵だけに当てる
            if(Math.abs(o.x-u.x) <= D.charge.r) hurt(o, D.charge.dmg); }
          slashFx(u); world.slashes.push({x:u.x, y:u.y-CONF.rowBand, dir:u.dir, t:0, dur:0.28, reach:D.charge.r});
          if(u.side==='p') world.shake = 5;   // サムライの居合ヒットで軽く画面が揺れる
        }else{ if(u.side==='p') ehp -= D.charge.dmg; else php -= D.charge.dmg; }
        u.charging=false; u.cool=u.cd; u.atkAnim=ATK_ANIM; SFX_hit();
        continue;
      }
    }

    // 攻撃（射程内なら足を止めて攻撃＝前線ができる）
    if(enemyInRange || castleInRange){
      u.moving = false;
      u.cool -= dt;
      if(u.cool<=0){
        u.cool = u.cd; u.atkAnim = ATK_ANIM;
        const dmg = u.atk * (u.buffMul||1);
        if(D.role==='ranged' && enemyInRange){ fireShot(u, fe.o); SFX_shot(); }
        else if(enemyInRange){ hurt(fe.o, dmg); SFX_hit(); }
        else if(castleInRange){ if(u.side==='p') ehp -= dmg; else php -= dmg; SFX_hit(); }
      }
      continue;
    }

    // 前進：味方どうしは重なってOK（にゃんこ風に前線で団子になる）。敵の手前でだけ止まる。
    u.moving = true;
    // 居合：抜刀の溜め中(windup)はゆっくり／抜刀後は一気に加速して突撃
    const windup = u.charging && u.chargeT < D.charge.windup;
    const sp = u.charging ? u.speed*(windup ? 0.30 : D.charge.spd) : u.speed;
    let nx = u.x + u.dir*sp*dt;
    if(u.side==='p'){            // 左へ進む・敵城は左(0)
      nx = Math.max(nx, CONF.castleAtkRange);
      if(fe) nx = Math.max(nx, fe.o.x + u.range);   // 前方の敵の射程手前で停止
    }else{                        // 右へ進む・味方城は右(W)
      nx = Math.min(nx, CONF.W - CONF.castleAtkRange);
      if(fe) nx = Math.min(nx, fe.o.x - u.range);
    }
    u.x = nx;
  }

  // 弾の移動
  for(const s of world.shots){
    if(s.dead) continue;
    if(s.lob){
      // 山なり：発射時に決めた着弾点へ放物線で飛ぶ
      s.t += dt; const p = Math.min(1, s.t/s.dur);
      const nx = s.x0 + (s.tx-s.x0)*p;
      const ny = s.y0 + (s.ty-s.y0)*p - s.arcH*Math.sin(p*Math.PI);
      s.ang = Math.atan2(ny-s.y, nx-s.x); s.x=nx; s.y=ny;
      if(p>=1){
        let t = world.units.find(u=>u.id===s.tid && !u.dead);
        if(!t){ let bd=44; for(const o of world.units){ if(o.side===s.side||o.dead) continue; const dd=Math.hypot(o.x-s.x,o.y-s.y); if(dd<bd){bd=dd;t=o;} } }
        if(t) hurt(t, s.dmg);
        s.dead=true;
      }
      continue;
    }
    const t = world.units.find(u=>u.id===s.tid && !u.dead);
    if(t){ s.tx=t.x; s.ty=t.y-16; }
    const dx=s.tx-s.x, dy=s.ty-s.y, d=Math.hypot(dx,dy)||1;
    s.ang = Math.atan2(dy,dx);
    if(d < s.sp*dt + s.r){ if(t) hurt(t, s.dmg); s.dead=true; }
    else{ s.x += dx/d*s.sp*dt; s.y += dy/d*s.sp*dt; }
  }

  for(const u of world.units){ if(!u.dead && u.hp<=0){ u.dead=true; deathBurst(u); splitOnDeath(u); } }
  world.units = world.units.filter(u=>!u.dead);
  world.shots = world.shots.filter(s=>!s.dead);

  for(const p of world.parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt; }
  world.parts = world.parts.filter(p=>p.life>0);
  for(const sl of world.slashes){ sl.t += dt; }
  world.slashes = world.slashes.filter(sl=>sl.t < sl.dur);

  if(ehp<=0){ running=false; win(true); }
  else if(php<=0){ running=false; win(false); }
}

function deathBurst(u){
  for(let i=0;i<6;i++){ const a=Math.random()*6.28, s=20+Math.random()*70;
    world.parts.push({x:u.x,y:u.y-10,vx:Math.cos(a)*s,vy:-Math.random()*80,life:0.4,max:0.4,
      c:u.side==='p'?'#8fd0ff':'#b6e06a', r:2+Math.random()*2}); }
}

/* --- 敵の出撃AI（時間経過で強い編成も混ざる） --- */
function enemySpawn(){
  const p = Math.min(1, elapsed/CONF.enemyRampSec);
  let pool;
  if(p<0.25)      pool = ['m_swarm','m_swarm','m_puff','m_phage'];
  else if(p<0.55) pool = ['m_swarm','m_tank','m_phage','m_puff','m_swarm'];
  else            pool = ['m_swarm','m_tank','m_big','m_phage','m_puff','m_tank'];
  spawn(pool[(Math.random()*pool.length)|0], 'e');
}

/* --- プレイヤー出撃 --- */
function deploy(key){
  if(!running) return;
  const D = DEFS[key];
  if(cd[key]>0 || money < D.cost) return;
  money -= D.cost; cd[key]=D.rc;
  spawn(key,'p'); SFX_deploy(); hideHint();
}

/* --- お財布レベルアップ --- */
function upgradeWallet(){
  if(!running || walletLv>=CONF.walletMax) return;
  const c = walletCost();
  if(money < c) return;
  money -= c; walletLv++; SFX_deploy();
}

/* --- タワー攻撃スキル（右下）：自分の城（右）から一撃。敵全体にダメージ＋左へ押し戻す --- */
function castTower(){
  if(!running || towerCd>0) return;
  towerCd = CONF.towerCd;
  for(const o of world.units){
    if(o.side!=='e' || o.dead) continue;
    hurt(o, CONF.towerDmg);
    applyKnock(o, CONF.W, CONF.towerKB);   // 自城(右)から左へパーンと吹き飛ばす
    for(let i=0;i<4;i++){ const a=Math.random()*6.28, s=30+Math.random()*90;
      world.parts.push({x:o.x,y:o.y-10,vx:Math.cos(a)*s,vy:-Math.random()*90,life:0.4,max:0.4,c:'#ffe9a8',r:2+Math.random()*2}); }
  }
  world.beam = { t:0, dur:0.35 };   // 右→左へ走るビーム演出
  SFX_tower();
}

/* ============================================================ 描画 ============================================================ */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

function drawCastle(x, side){
  const g = CONF.groundY;
  ctx.save(); ctx.translate(x,0);
  const col = side==='p' ? '#3b7bd6' : '#6f8f52';   // 味方=青／敵=カビ緑
  const col2= side==='p' ? '#2a5aa8' : '#465a2f';
  ctx.fillStyle=col2; ctx.fillRect(-26,g-70,52,70);
  ctx.fillStyle=col;  ctx.fillRect(-22,g-64,44,64);
  ctx.fillStyle=col2; ctx.beginPath(); ctx.moveTo(-30,g-64); ctx.lineTo(0,g-92); ctx.lineTo(30,g-64); ctx.closePath(); ctx.fill();
  ctx.fillStyle = side==='p' ? '#ffe9a8' : '#c8e29a'; ctx.fillRect(-8,g-44,16,18);
  if(side==='e'){   // 敵城にカビの斑点
    ctx.fillStyle='#2f3d22';
    for(const [sx,sy,r] of [[-12,-52,4],[8,-40,3],[-4,-24,3.5],[14,-58,3]]){ ctx.beginPath(); ctx.arc(sx,sy,r,0,6.283); ctx.fill(); }
  }
  ctx.restore();
}

/* アニメ：状態に応じてフレームのスプライトキーを返す（SUGAR WARSのフレームを転用） */
function hopPhase(u, fps){ let p=(elapsed*fps + u.x*0.03)%1; return p<0?p+1:p; }
function animFrame(u){
  const D=u.U, team = u.side==='p'?'blue':'red', A=D.anim;
  if(!A) return D.spr+'_'+team;
  if(u.atkAnim>0 && A.atk) return A.atk+'_'+team;                 // 攻撃ポーズ（構えなど）
  if(u.moving && A.walk && A.walk.length){                        // 歩行フレーム
    const i = Math.floor(elapsed*(A.fps||6) + u.x*0.05) % A.walk.length;
    return A.walk[i]+'_'+team;
  }
  return (A.idle || D.spr)+'_'+team;                              // 待機
}

/* --- 武器合成キャラの描画（本家 index.html の合成ロジックを移植）---
   本家は「左向き＝前方」が基準でミラーせず、本体中心(cx,cy)に武器を重ねる。
   nyankoの味方も左向きなのでそのまま流用できる（cy=本体中心＝footY-S/2）。 */
function drawGearUnit(u, S, cx, footY, team){
  const D = u.U;
  const cy = footY - S*0.5;                       // 本体の中心（本家の基準）
  const bob = u.moving ? Math.sin(u.bob)*S*0.02 : 0;
  let bodyKey = D.body + '_' + team;
  if(D.bodyWalk && u.moving){ const i=Math.floor(elapsed*(D.bodyFps||6)+u.x*0.05)%D.bodyWalk.length; bodyKey=D.bodyWalk[i]+'_'+team; }
  const im = SPRITES[bodyKey] || SPRITES[D.spr+'_'+team];
  const windup = u.charging && u.chargeT < (D.charge?D.charge.windup:0);
  // 突撃ダッシュの残像（後方＝進行方向の逆へ）
  if(u.charging && !windup && im && im.complete && im.naturalWidth){
    for(let k=1;k<=3;k++){ ctx.save(); ctx.globalAlpha=0.12*(4-k);
      ctx.drawImage(im, cx - u.dir*k*13 - S/2, cy-S/2, S, S); ctx.restore(); }
  }
  const cyb = cy + bob;
  if(im && im.complete && im.naturalWidth){ ctx.imageSmoothingEnabled=false; ctx.drawImage(im, cx-S/2, cyb-S/2, S, S); }
  else { ctx.font=(S*0.7)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillText('🍬', cx, footY-6); }
  if(D.gear==='spear')  drawCookieSpear(u,S,cx,cyb);
  if(D.gear==='sword')  drawChocoGear(u,S,cx,cyb);
  if(D.gear==='katana') drawDaifukuWeapon(u,S,cx,cyb);
}
// クッキーの槍（本家 drawCookieSpear 移植）。待機=上向き／移動=左に倒す／攻撃=左へ突き出す
const SP_PIVX=0.5, SP_PIVY=0.72;
function drawCookieSpear(u, S, cx, cy){
  const sp = SPRITES['cookie_spear_'+(u.side==='p'?'blue':'red')];
  if(!sp || !sp.complete || !sp.naturalWidth) return;
  const handX=cx+S*0.24, handY=cy-S*0.02;
  const spH=S*1.05, spW=spH*(sp.naturalWidth/sp.naturalHeight);
  let ang, px=handX, py=handY;
  if(u.atkAnim>0){ const a=1-u.atkAnim/ATK_ANIM, j=Math.sin(a*Math.PI); ang=-1.65; px=handX - j*S*0.34; py=handY + S*0.06; }
  else { ang=-1.15; py=handY + S*0.04; }   // 常に前へ倒して構える（上に戻さない＝せわしなくしない）
  ctx.save(); ctx.translate(px,py); ctx.rotate(ang); ctx.imageSmoothingEnabled=false;
  ctx.drawImage(sp, -SP_PIVX*spW, -SP_PIVY*spH, spW, spH); ctx.restore();
}
// チョコの剣(左)・盾(右)（本家 drawChocoGear 移植）。攻撃=剣を左へ振り下ろし／歩行=盾が揺れる
const CSW_PIVX=0.5, CSW_PIVY=0.82;
function drawChocoGear(u, S, cx, cy){
  const c=u.side==='p'?'blue':'red';
  const sword=SPRITES['choco_sword_'+c], shield=SPRITES['choco_shield_'+c];
  if(shield && shield.complete && shield.naturalWidth){
    const shW=S*0.42, shH=shW*(shield.naturalHeight/shield.naturalWidth);
    const by = u.moving ? Math.sin(u.bob*0.6)*S*0.03 : 0;   // 揺れ控えめ
    ctx.save(); ctx.translate(cx+S*0.26, cy+S*0.05+by); ctx.imageSmoothingEnabled=false; ctx.drawImage(shield,-0.5*shW,-0.5*shH,shW,shH); ctx.restore();
  }
  if(sword && sword.complete && sword.naturalWidth){
    const swH=S*0.72, swW=swH*(sword.naturalWidth/sword.naturalHeight);
    let ang=-0.25;
    if(u.atkAnim>0){ const a=1-u.atkAnim/ATK_ANIM; ang=-0.5 - 2.0*a; }
    ctx.save(); ctx.translate(cx-S*0.24, cy+S*0.04); ctx.rotate(ang); ctx.imageSmoothingEnabled=false;
    ctx.drawImage(sword,-CSW_PIVX*swW,-CSW_PIVY*swH,swW,swH); ctx.restore();
  }
}
// 大福の刀・鞘（本家 drawDaifukuWeapon 移植）。納刀→抜刀(charge)→突撃(dash)→左で振り下ろし(walk攻撃)
const KAT_PIVX=0.24, KAT_PIVY=0.5;
function drawDaifukuWeapon(u, S, cx, cy){
  const kat=SPRITES['daifuku_katana'], sh=SPRITES['daifuku_sheath'];
  if(!kat || !kat.complete || !kat.naturalWidth) return;
  const kW=S*0.92, kH=kW*(kat.naturalHeight/kat.naturalWidth);
  const SA=Math.PI-2.3, dcos=Math.cos(SA), dsin=Math.sin(SA);
  const SCX=cx+S*0.15, SCY=cy+S*0.20, SLEN=S*0.66;
  const openX=SCX-dcos*SLEN*0.5, openY=SCY-dsin*SLEN*0.5;
  const shePX=openX-dcos*0.17*S, shePY=openY-dsin*0.17*S;
  const drawKat=function(px,py,ang){ ctx.save(); ctx.translate(px,py); ctx.rotate(ang); ctx.imageSmoothingEnabled=false; ctx.drawImage(kat,-KAT_PIVX*kW,-KAT_PIVY*kH,kW,kH); ctx.restore(); };
  const drawSheath=function(){ if(!sh||!sh.complete||!sh.naturalWidth) return; const sW=SLEN, sHh=sW*(sh.naturalHeight/sh.naturalWidth); ctx.save(); ctx.translate(SCX,SCY); ctx.rotate(SA); ctx.imageSmoothingEnabled=false; ctx.drawImage(sh,-0.5*sW,-0.5*sHh,sW,sHh); ctx.restore(); };
  const DRAW_DIST=S*0.30;
  // nyankoの状態→本家cstate相当
  const windup = u.charging && u.chargeT < (u.U.charge?u.U.charge.windup:0);
  let st;
  if(u.charging && windup) st='charge';
  else if(u.charging) st='dash';
  else st='walk';
  let px, py, ang, behind=false;
  if(st==='dash'){
    behind=true; px=shePX + (-dcos)*DRAW_DIST; py=shePY + (-dsin)*DRAW_DIST; ang=SA;
  } else if(st==='walk' && u.atkAnim>0){
    const a=1-u.atkAnim/ATK_ANIM; px=cx-S*0.12; py=cy+S*0.12; ang=-2.35 - 1.5*a;
  } else if(st==='walk'){
    px=cx-S*0.12; py=cy+S*0.12; ang=-2.75;
  } else if(st==='charge'){
    behind=true;
    const prog = u.U.charge.windup>0 ? Math.min(1,(u.chargeT||0)/u.U.charge.windup) : 0;
    const p = prog<0.3 ? 0 : Math.min(1,(prog-0.3)/0.7);
    px=shePX + (-dcos)*p*DRAW_DIST; py=shePY + (-dsin)*p*DRAW_DIST; ang=SA;
  } else { behind=true; px=shePX; py=shePY; ang=SA; }
  if(behind){ drawKat(px,py,ang); drawSheath(); }
  else { drawSheath(); drawKat(px,py,ang); }
}
// 居合の斬撃アーク
function drawSlashes(){
  for(const sl of world.slashes){
    const p=sl.t/sl.dur, a=1-p;
    const cx=sl.x + sl.dir*(24+p*34), cy=sl.y;
    ctx.save(); ctx.globalAlpha=a*0.85; ctx.strokeStyle='#fff'; ctx.lineWidth=5; ctx.lineCap='round';
    const base = sl.dir>0 ? 0 : Math.PI;
    ctx.beginPath(); ctx.arc(cx, cy, sl.reach*1.3, base-0.85, base+0.85); ctx.stroke();
    ctx.globalAlpha=a*0.4; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx, cy, sl.reach*1.6, base-0.7, base+0.7); ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

function drawUnit(u){
  const D = u.U;
  const team = u.side==='p'?'blue':'red';
  const S = 58 * (D.scale||1) * (u.sMul||1);
  const cx = u.x;
  const air = -(u.kbY||0);                      // 吹き飛びの高さ（px・0以上）
  const footY = u.y + (u.kbY||0);               // 本体は吹き飛び中は浮く（kbYは負＝上）
  // 影は地面に残し、浮くほど小さく薄く（＝飛んでる感）
  ctx.save(); ctx.globalAlpha=0.28*Math.max(0.25, 1-air/70); ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(cx, u.y, S*0.30*Math.max(0.4,1-air/120), S*0.10, 0,0,6.28); ctx.fill(); ctx.restore();
  if(u.side==='e' && D.mold){
    drawMold(u, S, cx, footY + (Math.sin(u.bob)*2));            // 敵＝カビ軍団（手描き）
  }else if(D.gear){
    drawGearUnit(u, S, cx, footY, team);                        // 武器合成キャラ（槍/剣/刀）
  }else{
    const A = D.anim;
    // フレーム選択（ぽよんスライムは phase から潰れ/伸び/通常＋跳ね上げ）
    let frameKey, lift=0;
    if(A && A.hop && u.moving){
      const ph = hopPhase(u, A.fps||1.3);
      frameKey = ((ph<0.15||ph>0.85) ? A.squash : (ph>=0.40&&ph<=0.60) ? A.base : A.up) + '_' + team;
      lift = Math.sin(ph*Math.PI) * S * 0.16;
    } else {
      frameKey = animFrame(u);
    }
    const im = SPRITES[frameKey] || SPRITES[D.spr+'_'+team];
    // 歩行：フレーム切替キャラはゆるやかに上下（プルプルしないよう控えめ・低速）
    let bobY = 0;
    if(A && A.hop) bobY = 0;
    else if(A && A.walk && u.moving) bobY = -Math.abs(Math.sin(elapsed*A.fps*0.8 + u.x))*1.6;
    else if(u.moving) bobY = Math.sin(u.bob)*2;
    // 攻撃のモーション：前へ踏み込む＋潰れ
    let lungeX=0, sqx=1, sqy=1;
    if(u.atkAnim>0 && !(A && A.atk)){    // 専用の攻撃ポーズが無いキャラは踏み込みで表現
      const a = Math.sin((u.atkAnim/ATK_ANIM)*Math.PI);
      lungeX = u.dir * a * S*0.18; sqx = 1 + 0.08*a; sqy = 1 - 0.10*a;
    }
    ctx.save();
    ctx.translate(cx + lungeX, footY + bobY - lift);
    if(u.side==='p') ctx.scale(-1,1);   // 味方は左へ進む＝左向き（スプライトは右向きが素）
    ctx.scale(sqx, sqy);
    if(u.fuseT>=0) ctx.globalAlpha = 0.6 + 0.4*Math.sin(elapsed*40);
    if(im && im.complete && im.naturalWidth){ ctx.drawImage(im, -S/2, -S, S, S); }
    else { ctx.font=(S*0.7)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillText('🍬',0,-6); }
    ctx.restore();
  }
  if(u.hp < u.maxHp){
    const w=S*0.5,h=4,bx=cx-w/2,by=footY-S-2;
    ctx.fillStyle='#0008'; ctx.fillRect(bx,by,w,h);
    ctx.fillStyle = u.side==='p'?'#6fd66f':'#b6e06a'; ctx.fillRect(bx,by,w*Math.max(0,u.hp/u.maxHp),h);
  }
  // パーティークッキー：頭上のミラーボール
  if(u.U.disco && u.auraT>0) drawMirrorBall(cx, footY-S-6, elapsed);
  // 攻撃バフ中の味方：小さな♪キラキラ
  if(u.buffMul>1 && !(u.U.disco)){
    ctx.fillStyle='#ffe27a'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.globalAlpha=0.7+0.3*Math.sin(elapsed*8+u.x); ctx.fillText('♪', cx+S*0.3, footY-S+2); ctx.globalAlpha=1;
  }
}

/* ミラーボール（キラキラ回転する球） */
function drawMirrorBall(x, y, t){
  ctx.save(); ctx.translate(x,y);
  // 吊り紐
  ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(0,-9); ctx.stroke();
  // 球（市松のミラー）
  ctx.fillStyle='#bcd2e8'; ctx.beginPath(); ctx.arc(0,0,9,0,6.28); ctx.fill();
  for(let i=0;i<10;i++){ const a=i*0.9+t*3; ctx.fillStyle=(i%2)?'#ffffff':'#7fa8d8';
    ctx.fillRect(Math.cos(a)*3-1.5, Math.sin(a)*3-1.5, 3,3); }
  // キラッ
  ctx.globalAlpha=0.5+0.5*Math.sin(t*10); ctx.fillStyle='#fff';
  ctx.fillRect(-1,-14,2,4); ctx.fillRect(-14,-1,4,2); ctx.fillRect(10,-1,4,2);
  ctx.globalAlpha=1; ctx.restore();
}

/* --- カビ敵の手描き（プレースホルダ／画像素材なし） ---
   mold: blob=もやもやカビ玉 / phage=脚つきウイルス砲 / spiky=トゲ球（自爆） */
function drawMold(u, S, cx, cy){
  const D = u.U, col = D.col||'#7fae5c', dk = D.col2||'#4f7038';
  const r = S*0.36;
  const top = cy - S*0.5;                       // 体の中心を足元より上へ
  const puls = D.mold==='spiky' && u.fuseT>=0 ? (1 + 0.18*Math.sin(elapsed*40)) : 1;
  ctx.save();
  ctx.translate(cx, top);
  if(u.kbT>0) ctx.rotate((KB_TIME-u.kbT)*7*Math.sign(u.kbVX||-1));   // 吹き飛び中はくるっと回転
  ctx.scale(puls, puls);
  // 目の向き（プレイヤー＝右を見る）
  const look = 2.2;
  if(D.mold==='phage'){
    // 脚つきウイルス（着陸船型）
    ctx.strokeStyle=dk; ctx.lineWidth=Math.max(2,S*0.05); ctx.lineCap='round';
    for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(i*r*0.5,0); ctx.lineTo(i*r*0.9, r*0.9+S*0.16); ctx.stroke(); }
    // 頭（六角）
    ctx.fillStyle=col; ctx.beginPath();
    for(let k=0;k<6;k++){ const a=Math.PI/6 + k*Math.PI/3; const px=Math.cos(a)*r, py=Math.sin(a)*r*0.9-r*0.2;
      k?ctx.lineTo(px,py):ctx.moveTo(px,py); } ctx.closePath(); ctx.fill();
    ctx.strokeStyle=dk; ctx.lineWidth=2; ctx.stroke();
    eyes(0,-r*0.25, r*0.5, S*0.11, look);
  } else if(D.mold==='spiky'){
    // トゲ球（自爆ウイルス）
    ctx.fillStyle=dk;
    for(let k=0;k<9;k++){ const a=k*6.283/9; const ox=Math.cos(a)*r, oy=Math.sin(a)*r;
      ctx.beginPath(); ctx.moveTo(ox*0.8,oy*0.8);
      ctx.lineTo(ox*1.35 - Math.sin(a)*r*0.18, oy*1.35 + Math.cos(a)*r*0.18);
      ctx.lineTo(ox*1.35 + Math.sin(a)*r*0.18, oy*1.35 - Math.cos(a)*r*0.18); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle=col; circle(0,0,r);
    eyes(0,-r*0.1, r*0.42, S*0.1, look);
  } else {
    // もやもやカビ玉（デコボコ）
    ctx.fillStyle=col;
    const lumps=[[0,0,1],[-0.55,-0.15,0.6],[0.55,-0.1,0.62],[-0.3,-0.55,0.5],[0.32,-0.5,0.52],[0,0.35,0.7]];
    for(const [lx,ly,ls] of lumps) circle(lx*r, ly*r, r*ls);
    // カビの斑点
    ctx.fillStyle=dk;
    for(const [sx,sy,ss] of [[-0.35,-0.1,0.14],[0.3,0.05,0.12],[0.05,-0.4,0.1],[-0.1,0.3,0.11]]) circle(sx*r,sy*r,r*ss);
    // 浮遊する胞子
    ctx.fillStyle=col; ctx.globalAlpha=0.6;
    for(let k=0;k<3;k++){ const a=elapsed*1.4 + k*2.1 + u.x*0.02; circle(Math.cos(a)*r*1.15, -r*1.0 - (k*4) + Math.sin(a)*3, r*0.08); }
    ctx.globalAlpha=1;
    eyes(0,-r*0.15, r*0.5, S*0.12, look);
  }
  ctx.restore();

  function circle(x,y,rr){ ctx.beginPath(); ctx.arc(x,y,rr,0,6.283); ctx.fill(); }
  function eyes(ex,ey,sp,er,lk){
    for(const s of [-1,1]){
      ctx.fillStyle='#fff'; circle(ex+s*sp*0.5, ey, er);
      ctx.fillStyle='#241a1a'; circle(ex+s*sp*0.5 + lk, ey+er*0.1, er*0.5);
    }
  }
}

function drawShot(s){
  if(s.side==='e'){                    // カビの胞子弾（トゲ付きの緑玉）
    ctx.save(); ctx.translate(s.x,s.y);
    ctx.fillStyle='#5f7d3a';
    for(let k=0;k<6;k++){ const a=k*6.283/6 + elapsed*6; ctx.beginPath();
      ctx.moveTo(Math.cos(a)*3,Math.sin(a)*3); ctx.lineTo(Math.cos(a)*9,Math.sin(a)*9); ctx.lineTo(Math.cos(a+0.5)*3,Math.sin(a+0.5)*3); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle='#a7c96a'; ctx.beginPath(); ctx.arc(0,0,5,0,6.283); ctx.fill();
    ctx.restore(); return;
  }
  const im = SPRITES['arrow_'+(s.side==='p'?'blue':'red')];
  const sz = s.arrow ? CONF.arrowSize : 28;     // 矢は大きめ（大量に飛ぶ迫力）
  ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.ang);
  if(im && im.complete && im.naturalWidth){ ctx.drawImage(im,-sz/2,-sz/2,sz,sz); }
  else { ctx.fillStyle='#7fd0ff'; ctx.fillRect(-sz*0.25,-2,sz*0.5,4); }
  ctx.restore();
}

function render(){
  const W=CONF.W,H=CONF.H,g=CONF.groundY;
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#3a2a55'); bg.addColorStop(0.6,'#2a3a66'); bg.addColorStop(1,'#243a5c');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff12';
  for(let i=0;i<4;i++){ ctx.beginPath(); ctx.ellipse(120+i*260, g+20, 200, 90, 0,0,6.28); ctx.fill(); }
  // 画面揺れ（サムライの居合ヒット時）＝背景以外を少し揺らす
  const shk = world.shake||0;
  ctx.save();
  if(shk>0) ctx.translate(Math.sin(elapsed*90)*shk, Math.cos(elapsed*70)*shk*0.6);
  ctx.fillStyle='#e7b57a'; ctx.fillRect(-8,g,W+16,H-g);
  ctx.fillStyle='#d59f63'; ctx.fillRect(-8,g,W+16,6);
  drawCastle(24,'e'); drawCastle(W-24,'p');   // 左＝敵(赤) / 右＝味方(青)
  const us = world.units.slice().sort((a,b)=>a.y-b.y);   // 奥(小y)→手前(大y)
  for(const u of us) drawUnit(u);
  drawSlashes();
  for(const s of world.shots) drawShot(s);
  for(const p of world.parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill(); }
  ctx.globalAlpha=1;
  ctx.restore();
  drawBeam();
}

/* タワー攻撃のビーム演出（右の自城→左へ走る光の帯） */
function drawBeam(){
  const bm = world.beam; if(!bm) return;
  const W=CONF.W, H=CONF.H, g=CONF.groundY;
  const k = bm.t/bm.dur;                 // 0→1
  const headX = W - k*W;                 // 右から左へ
  ctx.save();
  // うっすら全域フラッシュ
  ctx.globalAlpha = 0.25*(1-k);
  ctx.fillStyle = '#fff3c4'; ctx.fillRect(0, g-120, W, 120);
  // 走る光の帯
  ctx.globalAlpha = 0.9*(1-k*0.5);
  const grad = ctx.createLinearGradient(headX-70,0,headX+70,0);
  grad.addColorStop(0,'rgba(255,220,110,0)'); grad.addColorStop(0.5,'#fff6d0'); grad.addColorStop(1,'rgba(255,220,110,0)');
  ctx.fillStyle = grad; ctx.fillRect(headX-70, g-112, 140, 108);
  ctx.restore();
  ctx.globalAlpha = 1;
}

/* --- HUD --- */
function hud(){
  document.getElementById('moneyTxt').textContent = Math.floor(money);
  document.getElementById('rateTxt').textContent = effRate();
  document.getElementById('capTxt').textContent = effCap();
  const pv=Math.max(0,php/CONF.castleHP), ev=Math.max(0,ehp/CONF.castleHP);
  document.getElementById('php').style.width=(pv*100)+'%';
  document.getElementById('ehp').style.width=(ev*100)+'%';
  document.getElementById('phpTxt').textContent=Math.max(0,Math.ceil(php));
  document.getElementById('ehpTxt').textContent=Math.max(0,Math.ceil(ehp));
  const wb=document.getElementById('walletBtn'), ws=document.getElementById('walletSub');
  if(walletLv>=CONF.walletMax){ ws.textContent='MAX'; wb.classList.add('off'); wb.classList.remove('rdy'); }
  else{ ws.textContent='🍬'+walletCost(); const poorW=money<walletCost(); wb.classList.toggle('off',poorW); wb.classList.toggle('rdy',!poorW); }
  const tb=document.getElementById('towerBtn'), ts=document.getElementById('towerSub'), tf=document.getElementById('towerCdFill');
  const ready = towerCd<=0;
  ts.textContent = ready ? 'OK' : Math.ceil(towerCd)+'秒';
  tb.classList.toggle('off', !ready); tb.classList.toggle('rdy', ready);
  tf.style.transform='scaleY('+(ready?0:towerCd/CONF.towerCd)+')';
  for(const k of ORDER){
    const el=btnEls[k]; if(!el) continue; const D=DEFS[k];
    const onCd=cd[k]>0, poor=money<D.cost;
    el.classList.toggle('off', onCd||poor); el.classList.toggle('rdy', !onCd&&!poor);
    el._cd.style.transform='scaleY('+(onCd? cd[k]/D.rc : 0)+')';
  }
}

/* --- ループ --- */
function loop(t){
  if(!lastT) lastT=t;
  let dt=(t-lastT)/1000; lastT=t;
  if(dt>0.05) dt=0.05;
  if(running) step(dt);
  render(); hud();
  requestAnimationFrame(loop);
}

/* --- 決着 --- */
function win(youWon){
  const ov=document.getElementById('overlay');
  const T=document.getElementById('ovT'), P=document.getElementById('ovP'), B=document.getElementById('overButtons');
  B.innerHTML='';
  const addBtn=(label,fn,alt)=>{ const b=document.createElement('button'); b.textContent=label; if(alt) b.style.background='#0005'; b.onclick=fn; B.appendChild(b); };
  if(youWon && !curStage){   // ステージ外（テスト等）：進行なしの簡易表示
    T.textContent='🎉 しょうり！'; P.textContent='敵のお城を落とした！'; ov.style.display='flex'; SFX_win(); return;
  }
  if(youWon){
    const s=curStage, first=!save.cleared.includes(s.id);
    const reward = first ? s.coins : REPLAY_COINS;
    save.coins += reward;
    if(first) save.cleared.push(s.id);
    saveGame();
    T.textContent='🎉 ステージクリア！';
    P.innerHTML='🍬 <b style="color:#ffdf6b">+'+reward+'</b> キャンディコイン'+(first?'（初クリア）':'')+'<br>所持：🍬'+save.coins;
    const next=STAGE_BY_ID[s.id+1];
    if(next && save.cleared.includes(s.id)) addBtn('▶ 次のステージへ',()=>{ closeOver(); openLoadout(next); });
    addBtn('🎒 編成にもどる',()=>{ closeOver(); openLoadout(s); }, true);
    addBtn('🏠 ホームへ',()=>{ closeOver(); goHome(); }, true);
    SFX_win();
  }else{
    T.textContent='💥 まけ…';
    P.textContent='お城が落ちてしまった…もう一度挑戦しよう';
    addBtn('🔄 リトライ',()=>{ closeOver(); startBattle(); });
    addBtn('🎒 編成にもどる',()=>{ closeOver(); openLoadout(curStage); }, true);
    addBtn('🏠 ホームへ',()=>{ closeOver(); goHome(); }, true);
    SFX_lose();
  }
  ov.style.display='flex';
}
function closeOver(){ document.getElementById('overlay').style.display='none'; }

/* ============================================================ ゲーム基盤：保存・画面遷移・編成・解放・ガチャ ============================================================ */
const SAVE_KEY='sm_save_v1';
let save={ coins:0, cleared:[], units:[] };   // units=解放したキャラ（スターターは含めない）
function loadGame(){ try{ const j=JSON.parse(localStorage.getItem(SAVE_KEY)); if(j) save=Object.assign(save,j); }catch(e){} }
function saveGame(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }catch(e){} }
function unlockedUnits(){ return ORDER.filter(k=> STARTERS.includes(k) || save.units.includes(k)); }
function isUnlocked(k){ return STARTERS.includes(k) || save.units.includes(k); }
function stageUnlocked(id){ return id===1 || save.cleared.includes(id-1); }

// 画面遷移
const SCREENS=['homeScreen','selectScreen','loadoutScreen','collectScreen'];
function showScreen(id){ running=false; for(const s of SCREENS){ document.getElementById(s).classList.toggle('on', s===id); } }
function hideScreens(){ for(const s of SCREENS) document.getElementById(s).classList.remove('on'); }
function goHome(){ document.getElementById('overlay').style.display='none'; showScreen('homeScreen');
  document.getElementById('homeProgress').textContent='クリア '+save.cleared.length+' / '+STAGES.length+' ステージ ・ なかま '+unlockedUnits().length+' / '+ORDER.length; }
function goSelect(){ showScreen('selectScreen'); renderStages(); }
function goCollect(){ showScreen('collectScreen'); renderCollect(); }

// ステージ選択
function renderStages(){
  const L=document.getElementById('stageList'); L.innerHTML='';
  for(const s of STAGES){
    const open=stageUnlocked(s.id), clr=save.cleared.includes(s.id);
    const c=document.createElement(open?'button':'div'); c.className='stagecard'+(open?'':' locked');
    c.innerHTML='<div class="no">'+(open?s.id:'🔒')+'</div>'+
      '<div><div class="nm">'+s.name+'</div><div class="meta">敵城HP '+s.enemyHP+' ・ 初回 🍬'+s.coins+'</div></div>'+
      (clr?'<div class="clr">✓</div>':'');
    if(open) c.onclick=()=>openLoadout(s);
    L.appendChild(c);
  }
}

// 編成
let _pick=[];
function openLoadout(stage){ curStage=stage; _pick = myLoadout.filter(isUnlocked).slice(0,LOADOUT_MAX);
  if(_pick.length===0) _pick=[STARTERS[0]]; showScreen('loadoutScreen'); renderLoadout(); }
function renderLoadout(){
  document.getElementById('loadoutHint').textContent='「'+curStage.name+'」に持ち込むなかまを選ぼう（最大'+LOADOUT_MAX+'）';
  const G=document.getElementById('unitGrid'); G.innerHTML='';
  for(const k of unlockedUnits()){
    const D=DEFS[k], i=_pick.indexOf(k);
    const b=document.createElement('button'); b.className='ucard'+(i>=0?' sel':'');
    b.innerHTML='<span class="pick">'+(i>=0?i+1:'')+'</span><img src="'+(SPRITE_DATA[D.spr+'_blue']||'')+'"><div class="nm">'+D.name+'</div><div class="co">🍬'+D.cost+'</div>';
    b.onclick=()=>togglePick(k); G.appendChild(b);
  }
  const cnt=document.getElementById('loadoutCnt'); cnt.textContent=_pick.length+' / '+LOADOUT_MAX+' 体';
  document.getElementById('sortieBtn').classList.toggle('off', _pick.length===0);
}
function togglePick(k){ const i=_pick.indexOf(k);
  if(i>=0) _pick.splice(i,1); else { if(_pick.length>=LOADOUT_MAX) return; _pick.push(k); }
  renderLoadout(); }
function sortie(){ if(_pick.length===0) return; myLoadout=_pick.slice(); startBattle(); }

// バトル開始
function startBattle(){ hideScreens(); document.getElementById('overlay').style.display='none';
  buildDock(); reset(); running=true; showHint(); }

// なかま（解放＆ガチャ）
function renderCollect(){
  document.getElementById('collectCoins').textContent=save.coins;
  document.getElementById('gachaCostTxt').textContent=GACHA_COST;
  document.getElementById('gachaBtn').classList.toggle('off', save.coins<GACHA_COST);
  const G=document.getElementById('collectGrid'); G.innerHTML='';
  for(const k of ORDER){
    const D=DEFS[k], owned=isUnlocked(k), info=UNLOCKS[k];
    const b=document.createElement('button'); b.className='ucard'+(owned?' sel':'');
    let foot;
    if(owned) foot='<div class="co" style="color:#8fd66f">✓解放済</div>';
    else if(!info) foot='<div class="co">—</div>';
    else if(info.via==='gacha') foot='<div class="co" style="color:#c79bff">🎰ガチャ限定</div>';
    else foot='<div class="co">🍬'+info.cost+'</div>';
    b.innerHTML='<img src="'+(SPRITE_DATA[D.spr+'_blue']||'')+'"><div class="nm">'+D.name+'</div>'+foot;
    if(!owned && info && info.via==='coin') b.onclick=()=>buyUnit(k);
    G.appendChild(b);
  }
}
function buyUnit(k){ const info=UNLOCKS[k]; if(!info||info.via!=='coin'||isUnlocked(k)) return;
  if(save.coins<info.cost){ toast('🍬が足りない！'); return; }
  save.coins-=info.cost; save.units.push(k); saveGame(); SFX_win(); toast(DEFS[k].name+' を解放！'); renderCollect(); }
function doGacha(){
  if(save.coins<GACHA_COST){ toast('🍬が足りない！'); return; }
  save.coins-=GACHA_COST;
  const k=GACHA_POOL[(Math.random()*GACHA_POOL.length)|0];
  if(isUnlocked(k)){ save.coins+=GACHA_DUP_COINS; toast('🎰 '+DEFS[k].name+'（重複）→🍬+'+GACHA_DUP_COINS); }
  else { save.units.push(k); toast('🎉 '+DEFS[k].name+' をゲット！'); SFX_win(); }
  saveGame(); renderCollect();
}

// 簡易トースト
let _toastT=null;
function toast(msg){ let t=document.getElementById('smToast');
  if(!t){ t=document.createElement('div'); t.id='smToast'; t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#000c;color:#fff;padding:10px 18px;border-radius:22px;font-weight:800;z-index:60;transition:opacity .3s'; document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1'; clearTimeout(_toastT); _toastT=setTimeout(()=>t.style.opacity='0',1800); }

/* --- ボタンUI --- */
const dock = document.getElementById('dock');
const btnEls = {};
function buildDock(){
  dock.innerHTML=''; for(const k in btnEls) delete btnEls[k];
  for(const k of myLoadout){
    const D=DEFS[k];
    const b=document.createElement('button'); b.className='btn';
    const cdEl=document.createElement('div'); cdEl.className='cd';
    const img=document.createElement('img'); img.className='ic'; img.src=SPRITE_DATA[D.spr+'_blue']||'';
    const nm=document.createElement('div'); nm.className='nm'; nm.textContent=D.name;
    const co=document.createElement('div'); co.className='co'; co.textContent='🍬'+D.cost;
    b.appendChild(cdEl); b.appendChild(img); b.appendChild(nm); b.appendChild(co);
    b.addEventListener('click',()=>deploy(k)); b._cd=cdEl;
    dock.appendChild(b); btnEls[k]=b;
  }
}

function showHint(){ const h=document.getElementById('hint'); h.style.opacity='0.9'; clearTimeout(hintT); hintT=setTimeout(hideHint,6000); }
function hideHint(){ document.getElementById('hint').style.opacity='0'; }

/* ============================================================ 効果音（Web Audio・軽量合成） ============================================================ */
let AC=null;
function ac(){ if(AC===null){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=false; } } return AC||null; }
function blip(freq,dur,type,vol){ const c=ac(); if(!c) return;
  const o=c.createOscillator(), g=c.createGain(); o.type=type||'square'; o.frequency.value=freq;
  g.gain.value=vol||0.06; o.connect(g); g.connect(c.destination);
  const t=c.currentTime; o.start(t); g.gain.setValueAtTime(g.gain.value,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.stop(t+dur); }
let lastHit=0;
function SFX_hit(){ const n=(typeof performance!=='undefined'?performance.now():0); if(n-lastHit<40)return; lastHit=n; blip(220+Math.random()*60,0.05,'square',0.03); }
function SFX_shot(){ blip(720,0.06,'triangle',0.03); }
function SFX_tower(){ blip(180,0.05,'sawtooth',0.08); setTimeout(()=>blip(90,0.35,'sawtooth',0.10),40); setTimeout(()=>SFX_boom(),60); }
function SFX_disco(){ [660,880,990].forEach((f,i)=>setTimeout(()=>blip(f,0.1,'triangle',0.04),i*70)); }
function SFX_blow(){ const c=ac(); if(!c)return; const b=c.createBuffer(1,c.sampleRate*0.25,c.sampleRate); const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++){ const e=i/d.length; d[i]=(Math.random()*2-1)*Math.sin(e*Math.PI)*0.5; }
  const s=c.createBufferSource(), g=c.createGain(); g.gain.value=0.08; s.buffer=b; s.connect(g); g.connect(c.destination); s.start(); }
function SFX_deploy(){ blip(520,0.08,'sine',0.06); setTimeout(()=>blip(780,0.08,'sine',0.05),60); }
function SFX_boom(){ const c=ac(); if(!c)return; const b=c.createBuffer(1,c.sampleRate*0.2,c.sampleRate); const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  const s=c.createBufferSource(), g=c.createGain(); g.gain.value=0.14; s.buffer=b; s.connect(g); g.connect(c.destination); s.start(); }
function SFX_win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,0.18,'square',0.06),i*110)); }
function SFX_lose(){ [392,330,262].forEach((f,i)=>setTimeout(()=>blip(f,0.24,'sawtooth',0.05),i*160)); }

/* --- 起動 --- */
/* --- 起動：セーブ読込→ホーム画面から。バトルは選択後に開始 --- */
loadGame();
myLoadout = STARTERS.slice(0, LOADOUT_MAX);
buildDock(); reset(); running=false;   // world等を初期化（描画がバトル前に走っても落ちないように）
goHome();
requestAnimationFrame(loop);

/* ヘッドレステスト用に主要関数を公開 */
if(typeof globalThis!=='undefined') globalThis.__NYANKO = { CONF, DEFS, ORDER,
  reset, spawn, step, deploy, upgradeWallet, castTower, nearestEnemy, frontUnit, explode, effRate, effCap, walletCost,
  get world(){return world;}, get money(){return money;}, get php(){return php;}, get ehp(){return ehp;},
  get walletLv(){return walletLv;}, get towerCd(){return towerCd;},
  set money(v){money=v;}, set php(v){php=v;}, set ehp(v){ehp=v;} };
</script>
