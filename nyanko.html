function unlockedUnits(){ return TEST_MODE ? ORDER.slice() : ORDER.filter(k=> STARTERS.includes(k) || save.units.includes(k)); }
function isUnlocked(k){ return TEST_MODE || STARTERS.includes(k) || save.units.includes(k); }
function stageUnlocked(id){ return TEST_MODE || id===1 || save.cleared.includes(id-1); }

// 画面遷移
const SCREENS=['homeScreen','selectScreen','loadoutScreen','collectScreen','upgradeScreen'];
function showScreen(id){ running=false; for(const s of SCREENS){ document.getElementById(s).classList.toggle('on', s===id); } }
function hideScreens(){ for(const s of SCREENS) document.getElementById(s).classList.remove('on'); }
function goHome(){ document.getElementById('overlay').style.display='none'; clearTut(); showScreen('homeScreen');
  document.getElementById('homeExp').innerHTML='🎓 <b style="color:#3f7fd0">'+(save.exp||0)+'</b> EXP';
  document.getElementById('homeProgress').textContent='クリア '+save.cleared.length+' / '+STAGES.length+' ステージ ・ なかま '+unlockedUnits().length+' / '+ORDER.length; }
function goSelect(){ showScreen('selectScreen'); renderStages(); }
function goCollect(){ showScreen('collectScreen'); renderCollect(); }

// 強化（EXP：サイフ／タワー）
const UPG_ORDER = ['wStart','wMax','tHp','tPow','tRng'];
function goUpgrade(){ showScreen('upgradeScreen'); renderUpgrade(); }
function renderUpgrade(){
  document.getElementById('upgExp').textContent=(save.exp||0);
  const L=document.getElementById('upgList'); L.innerHTML='';
  for(const t of UPG_ORDER){
    const u=UPG[t], lv=upgLv(t), cur=upgVal(t), max=lv>=u.max, cost=upgCost(t);
    const next = max ? null : (u.valFn ? u.valFn(lv+1) : u.base + (lv+1)*u.step);
    const poor = cost!=null && (save.exp||0)<cost;
    const row=document.createElement(max?'div':'button'); row.className='stagecard'+(max?' locked':'');
    row.innerHTML=candyify('<div class="no" style="font-size:20px">'+u.icon+'</div>'+
      '<div style="flex:1"><div class="nm">'+u.name+' <span style="color:var(--muted);font-weight:700">Lv'+lv+'/'+u.max+'</span></div>'+
      '<div class="meta">'+cur+u.suffix+(max?'（MAX）':' → <b style="color:#3f7fd0">'+next+u.suffix+'</b>')+'</div></div>'+
      (max?'<div class="clr" style="font-size:14px;color:var(--brass)">MAX</div>'
          :'<div class="co" style="margin-left:auto;color:'+(poor?'var(--muted)':'#3f7fd0')+'">🎓'+cost+'</div>'));
    if(!max) row.onclick=()=>buyUpgrade(t);
    L.appendChild(row);
  }
}
function buyUpgrade(t){
  const cost=upgCost(t); if(cost==null){ return; }
  if((save.exp||0)<cost){ toast('EXPが足りない！'); return; }
  save.exp-=cost; save.upg[t]=upgLv(t)+1; saveGame(); SFX_deploy();
  toast(UPG[t].name+' Lv'+upgLv(t)+'！'); renderUpgrade();
}

// ステージ選択
function renderStages(){
  const L=document.getElementById('stageList'); L.innerHTML='';
  for(const s of STAGES){
    const open=stageUnlocked(s.id), clr=save.cleared.includes(s.id);
    const c=document.createElement(open?'button':'div'); c.className='stagecard'+(open?'':' locked');

      (clr?'<div class="clr">✓</div>':'');
    if(open) c.onclick=()=>openLoadout(s);

}

// 編成

function renderLoadout(){

  const G=document.getElementById('unitGrid'); G.innerHTML='';

// バトル開始
function startBattle(){ hideScreens(); document.getElementById('overlay').style.display='none';
  buildDock(); reset(); running=true; clearPause(); resizeCanvas(); requestAnimationFrame(resizeCanvas);   // 戦場表示に切替わった直後にキャンバス寸法を確定
  if(curStage && curStage.tutorial) runTutorial();
  else { clearTut(); showHint('🍬を貯めて下のボタンでなかまを出撃！ 左の敵のお城を落とそう（右＝自分）'); } }

// なかま（解放＆ガチャ）
function unlockAvailable(k){ const info=UNLOCKS[k]; return !!(info && info.via==='coin' && save.cleared.length >= (info.need||0)); }
function collectFoot(k){                            // カード下部：解放状況の表示
  const owned=isUnlocked(k), info=UNLOCKS[k];
  if(owned) return '<div class="co" style="color:var(--brass)">✓解放済</div>';
  if(!info) return '<div class="co">—</div>';
  if(info.via==='gacha') return '<div class="co" style="color:var(--grape)">🎰ガチャ限定</div>';
  if(!unlockAvailable(k)) return '<div class="co" style="color:var(--muted)">🔒'+info.need+'面クリアで</div>';
  const poor=(save.exp||0)<(info.cost||0);
  return '<div class="co" style="color:'+(poor?'var(--muted)':'#3f7fd0')+'">🎓'+info.cost+' EXP</div>';
}
function collectCard(k){
  const D=DEFS[k], owned=isUnlocked(k);
  const b=document.createElement('button'); b.className='ucard'+(owned?' sel':' locked');
  if(owned){
    const lvTag = charLv(k)>1 ? '<div class="co" style="color:var(--brass)">Lv'+charLv(k)+'</div>' : '';
    b.innerHTML=attrBadgeHTML(k)+'<img src="'+(SPRITE_DATA[D.spr+'_blue']||'')+'"><div class="nm">'+D.name+'</div>'+collectFoot(k)+lvTag;
  } else {
    // 未開放＝立ち絵と名前を伏せて「？」で表示（解放条件だけ見せる）
    b.innerHTML='<div class="qmark">？</div><div class="nm">？？？</div>'+collectFoot(k);
  }
  b.onclick=()=>openCharDetail(k);   // タップで詳細（解放済＝性能/レベルUP・未開放＝解放方法）
  return b;
}
function renderCollect(){
  document.getElementById('collectExp').textContent=(save.exp||0);
  document.getElementById('collectCoins').textContent=save.coins;
  document.getElementById('gachaCostTxt').textContent=GACHA_COST;
  document.getElementById('gachaBtn').classList.toggle('off', save.coins<GACHA_COST);
  const S=document.getElementById('collectSections'); S.innerHTML='';
  // 解放ステージ順に並べる（スターター＝先頭 → need の小さい順）。ガチャ限定は別セクション。
  const unlockOrder=k=>STARTERS.includes(k)?-1:((UNLOCKS[k]&&UNLOCKS[k].need)!=null?UNLOCKS[k].need:999);
  const normal=ORDER.filter(k=>!(UNLOCKS[k]&&UNLOCKS[k].via==='gacha')).sort((a,b)=>unlockOrder(a)-unlockOrder(b));
  const gacha =ORDER.filter(k=>  UNLOCKS[k]&&UNLOCKS[k].via==='gacha');    // ガチャ限定
  function section(title, icon, keys){
    if(!keys.length) return;
    const h=document.createElement('div'); h.className='csect'; h.innerHTML='<span class="cs-ic">'+icon+'</span>'+title; S.appendChild(h);
    const g=document.createElement('div'); g.className='grid'; g.style.marginBottom='18px';
    for(const k of keys) g.appendChild(collectCard(k));
    S.appendChild(g);
  }
  section('ノーマル','📦',normal);
  section('ガチャ限定','🎰',gacha);
}
function buyUnit(k){ const info=UNLOCKS[k]; if(!info||info.via!=='coin'||isUnlocked(k)) return;
  if(!unlockAvailable(k)){ toast('ステージを'+info.need+'つクリアすると解放できるよ'); return; }
  if((save.exp||0)<info.cost){ toast('EXPが足りない！'); return; }
  save.exp-=info.cost; save.units.push(k); saveGame(); SFX_win(); toast(DEFS[k].name+' を解放！'); renderCollect(); }
function doGacha(){
  if(save.coins<GACHA_COST){ toast('🍬が足りない！'); return; }
  save.coins-=GACHA_COST;
  const k=GACHA_POOL[(Math.random()*GACHA_POOL.length)|0];
  if(isUnlocked(k)){ save.coins+=GACHA_DUP_COINS; toast('🎰 '+DEFS[k].name+'（重複）→🍬+'+GACHA_DUP_COINS); }
  else { save.units.push(k); toast('🎉 '+DEFS[k].name+' をゲット！'); SFX_win(); }
  saveGame(); renderCollect();
}

function statRow(label,val){ return '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--line)"><span style="color:var(--muted);font-weight:700">'+label+'</span><b>'+val+'</b></div>'; }
function renderCharDetail(){
  const el=document.getElementById('charDetail'); if(!el||!_detailKey) return;
  const k=_detailKey, D=DEFS[k], owned=isUnlocked(k), info=UNLOCKS[k];
  const lv=charLv(k), mul=charLvMul(k), max=lv>=CHAR_LV_MAX, cost=charLvCost(k);
  const hp=Math.round(D.hp*mul), atk=Math.round(D.atk*mul);
  const bonusPct=Math.round((mul-1)*100), poor=cost!=null && (save.exp||0)<cost;
  const role=ROLE_JA[D.role]||D.role||'', desc=UNIT_DESC[k]||'';
  const sub='<span style="color:var(--muted);font-size:11px">('+D.hp+')</span>';
  let stats='';
  stats+=statRow('出撃コスト',CANDY+D.cost);
  stats+=statRow('HP', owned&&lv>1 ? hp+' <span style="color:var(--muted);font-size:11px">('+D.hp+')</span>' : D.hp);
  stats+=statRow('攻撃力', D.atk ? (owned&&lv>1 ? atk+' <span style="color:var(--muted);font-size:11px">('+D.atk+')</span>' : D.atk) : '—');
  if(D.blast) stats+=statRow('爆発ダメージ','💥'+D.blast);
  stats+=statRow('射程', D.range+'px');
  stats+=statRow('移動速度', D.speed);
  stats+=statRow('攻撃速度', D.cd.toFixed(2)+'秒/回');
  if(D.rc) stats+=statRow('再出撃', D.rc.toFixed(1)+'秒');
  if((D.num||1)>1) stats+=statRow('出撃数', D.num+'体');
  // 色トレイト特効（対〇色に強い＝EFFECT_MUL倍）
  if(D.strongVs && D.strongVs.length){
    const chips=D.strongVs.map(t=>{ const T=TRAITS[t]; return T?'<span style="display:inline-flex;align-items:center;gap:4px"><i style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+T.tint+';border:1px solid #0006"></i>'+T.name+'</span>':''; }).join('　');
    stats+=statRow('とくせい', chips+' に強い <span style="color:var(--brass)">×'+EFFECT_MUL+'</span>');
  }
  // レベル / 解放アクション
  let action='';
  if(owned){
    action='<div style="margin-top:12px;padding:11px;border:2px solid var(--px-edge);border-radius:6px;background:var(--parch)">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><b>レベル Lv'+lv+' / '+CHAR_LV_MAX+'</b>'
      +'<span style="color:var(--brass);font-weight:800">HP・攻撃 +'+bonusPct+'%</span></div>'
      +(max
        ? '<div class="bigbtn" style="pointer-events:none;background:var(--brass);border-color:#1f8f6a;box-shadow:0 4px 0 #1f8f6a;font-size:15px;padding:11px">★ MAXレベル</div>'
        : '<button class="bigbtn" onclick="doLevelUp()" style="font-size:15px;padding:11px;'+(poor?'filter:grayscale(.4) brightness(.95)':'')+'">▲ レベルUP（🎓'+cost+' EXP）</button>')
      +'</div>';
  } else if(info && info.via==='coin'){
    const avail=unlockAvailable(k), poorU=(save.exp||0)<info.cost;
    action='<div style="margin-top:12px;padding:11px;border:2px solid var(--px-edge);border-radius:6px;background:var(--parch)">'
      +(!avail
        ? '<div style="text-align:center;color:var(--muted);font-weight:700">🔒 ステージ'+info.need+'面クリアで解放できます</div>'
        : '<button class="bigbtn" onclick="doUnlockFromDetail()" style="font-size:15px;padding:11px;'+(poorU?'filter:grayscale(.4)':'')+'">🎓 '+info.cost+' EXP で解放</button>')
      +'</div>';
  } else if(info && info.via==='gacha'){
    action='<div style="margin-top:12px;padding:11px;border:2px solid var(--px-edge);border-radius:6px;background:var(--parch);text-align:center;color:var(--grape);font-weight:800">🎰 ガチャ限定キャラ</div>';
  }
  // 未開放は立ち絵・名前・性能を伏せて「？」表示（解放条件だけ見せる）
  const avatarHTML = owned
    ? '<img src="'+(SPRITE_DATA[D.spr+'_blue']||'')+'" style="width:72px;height:72px;image-rendering:pixelated;background:var(--parch-dk);border:2px solid var(--px-edge);border-radius:6px">'
    : '<div style="width:72px;height:72px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;color:var(--muted);background:var(--parch-dk);border:2px solid var(--px-edge);border-radius:6px">？</div>';
  const nameHTML = owned ? D.name : '？？？';
  const roleHTML = owned ? role+'　Lv'+lv : '未開放';
  const bodyHTML = owned
    ? (desc?'<div style="margin-top:11px;font-size:13px;line-height:1.55">'+desc+'</div>':'')
      +'<div style="margin-top:11px;font-size:13px">'+stats+'</div>'
    : '<div style="margin-top:11px;font-size:12px;color:var(--muted);text-align:center;line-height:1.6">解放するとステータスや<br>とくちょうが見られるよ</div>';
  el.innerHTML='<div style="background:var(--panel);border:3px solid var(--px-edge);border-radius:10px;box-shadow:0 8px 0 var(--px-edge);max-width:400px;width:100%;max-height:90vh;overflow-y:auto;padding:18px">'
    +'<div style="display:flex;align-items:center;gap:12px">'
    +avatarHTML
    +'<div style="flex:1"><div style="font-size:18px;font-weight:800">'+nameHTML+'</div>'
    +'<div style="color:var(--muted);font-weight:700;font-size:12px;margin-top:2px">'+roleHTML+'</div></div>'
    +'<button onclick="closeCharDetail()" style="background:none;border:none;font-size:22px;line-height:1;color:var(--muted);cursor:pointer;padding:2px 4px">✕</button>'
    +'</div>'
    +bodyHTML
    +action
    +'<div style="margin-top:12px;text-align:center;color:var(--muted);font-size:11px">🎓 所持 <b style="color:#3f7fd0">'+(save.exp||0)+'</b> EXP</div>'
    +'</div>';
}

const dock = document.getElementById('dock');

function buildDock(){
  dock.innerHTML=''; for(const k in btnEls) delete btnEls[k];
  // 出撃ボタンは左からコストの安い順に並べる（安い＝すぐ出せる前衛が左）

  for(const k of dockKeys){

/* ============================================================ 効果音（Web Audio・軽量合成） ============================================================ */
let AC=null;
function ac(){ if(AC===null){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=false; } } return AC||null; }
function blip(freq,dur,type,vol){ const c=ac(); if(!c) return;
  const o=c.createOscillator(), g=c.createGain(); o.type=type||'square'; o.frequency.value=freq;
  g.gain.value=vol||0.06; o.connect(g); g.connect(c.destination);
  const t=c.currentTime; o.start(t); g.gain.setValueAtTime(g.gain.value,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.stop(t+dur); }
let lastHit=0;
function SFX_hit(){ const n=(typeof performance!=='undefined'?performance.now():0); if(n-lastHit<40)return; lastHit=n; blip(220+Math.random()*60,0.05,'square',0.03); }
function SFX_shot(){ blip(720,0.06,'triangle',0.03); }
let lastKnock=0;
function SFX_knock(){ const n=(typeof performance!=='undefined'?performance.now():0); if(n-lastKnock<50)return; lastKnock=n; blip(300,0.05,'sine',0.05); setTimeout(()=>blip(170,0.08,'sine',0.04),30); }
function SFX_tower(){ blip(180,0.05,'sawtooth',0.08); setTimeout(()=>blip(90,0.35,'sawtooth',0.10),40); setTimeout(()=>SFX_boom(),60); }
function SFX_disco(){ [660,880,990].forEach((f,i)=>setTimeout(()=>blip(f,0.1,'triangle',0.04),i*70)); }
function SFX_blow(){ const c=ac(); if(!c)return; const b=c.createBuffer(1,c.sampleRate*0.25,c.sampleRate); const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++){ const e=i/d.length; d[i]=(Math.random()*2-1)*Math.sin(e*Math.PI)*0.5; }
  const s=c.createBufferSource(), g=c.createGain(); g.gain.value=0.08; s.buffer=b; s.connect(g); g.connect(c.destination); s.start(); }
function SFX_deploy(){ blip(520,0.08,'sine',0.06); setTimeout(()=>blip(780,0.08,'sine',0.05),60); }
function SFX_boom(){ const c=ac(); if(!c)return; const b=c.createBuffer(1,c.sampleRate*0.2,c.sampleRate); const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  const s=c.createBufferSource(), g=c.createGain(); g.gain.value=0.14; s.buffer=b; s.connect(g); g.connect(c.destination); s.start(); }
function SFX_win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,0.18,'square',0.06),i*110)); }
function SFX_lose(){ [392,330,262].forEach((f,i)=>setTimeout(()=>blip(f,0.24,'sawtooth',0.05),i*160)); }
