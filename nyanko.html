<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SUGAR MARCH（にゃんこ風・試作）</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:#0d0a16; color:#fff;
    font-family:system-ui,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN",sans-serif; overflow:hidden; }
  #wrap{ width:100%; height:100%; display:flex; flex-direction:column; align-items:center; }
  #top{ width:100%; max-width:960px; padding:6px 10px 0; }
  .tophead{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .bars{ display:flex; gap:10px; align-items:center; margin-top:2px; }
  .castle{ flex:1; }
  .clabel{ font-size:12px; opacity:.85; display:flex; justify-content:space-between; }
  .track{ height:12px; border-radius:7px; background:#00000055; overflow:hidden; box-shadow:inset 0 0 0 1px #ffffff22; }
  .fill{ height:100%; width:100%; transition:width .12s linear; }
  .p .fill{ background:linear-gradient(90deg,#43c6ff,#2a7bff); }
  .e .fill{ background:linear-gradient(90deg,#a7d15a,#5f8a34); }
  #moneyBox{ text-align:right; white-space:nowrap; font-weight:800; font-size:14px; text-shadow:0 1px 2px #000; }
  #moneyBox b{ color:#ffdf6b; font-size:20px; }
  #moneyBox .sub{ display:block; opacity:.65; font-size:11px; font-weight:600; }
  #stage{ width:100%; max-width:960px; flex:1; min-height:0; display:flex; align-items:center; justify-content:center; padding:4px 6px; }
  canvas{ width:100%; height:auto; max-height:100%; border-radius:12px; display:block;
    image-rendering:pixelated; box-shadow:0 8px 28px #0008; touch-action:manipulation; }
  #bottom{ width:100%; max-width:960px; display:flex; align-items:stretch; gap:8px; padding:8px 10px 12px; }
  #dock{ flex:1; display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  .btn{ position:relative; flex:1 1 90px; min-width:84px; max-width:150px; border:none; border-radius:12px; padding:6px 4px 5px;
    background:#241a33; color:#fff; cursor:pointer; overflow:hidden; user-select:none;
    box-shadow:0 3px 0 #0006, inset 0 0 0 1px #ffffff18; }
  .btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #0006, inset 0 0 0 1px #ffffff18; }
  .btn .ic{ width:40px; height:40px; margin:0 auto; display:block; image-rendering:pixelated; }
  .btn .nm{ font-size:10px; opacity:.9; margin-top:1px; }
  .btn .co{ font-size:12px; font-weight:800; color:#ffdf6b; }
  .btn .cd{ position:absolute; left:0; right:0; bottom:0; top:0; background:#000a;
    transform-origin:bottom; transform:scaleY(0); pointer-events:none; }
  .btn.off{ filter:grayscale(.6) brightness(.7); }
  .btn.rdy{ box-shadow:0 3px 0 #0006, inset 0 0 0 2px #ffd23f; }
  /* サイド操作ボタン（左下＝お財布 / 右下＝タワー攻撃） */
  .sidebtn{ position:relative; flex:0 0 80px; border:none; border-radius:12px; color:#fff; cursor:pointer; font-weight:800;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:6px 4px; overflow:hidden;
    user-select:none; box-shadow:0 3px 0 #0006, inset 0 0 0 1px #ffffff20; }
  .sidebtn:active{ transform:translateY(2px); box-shadow:0 1px 0 #0006, inset 0 0 0 1px #ffffff20; }
  .sidebtn .big{ font-size:22px; line-height:1; }
  .sidebtn .lbl{ font-size:10.5px; }
  .sidebtn .sub{ font-size:11px; color:#ffe27a; }
  .sidebtn.off{ filter:grayscale(.55) brightness(.72); }
  .sidebtn.rdy{ box-shadow:0 3px 0 #0006, inset 0 0 0 2px #ffd23f; }
  #walletBtn{ background:linear-gradient(160deg,#7b5cff,#a94bff); }
  #towerBtn{ background:linear-gradient(160deg,#ff8f43,#ff5b7d); }
  .sidebtn .cd{ position:absolute; inset:0; background:#000a; transform-origin:bottom; transform:scaleY(0); pointer-events:none; }
  #overlay{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:#000b; z-index:20; }
  #overlay .card{ background:#20152e; border-radius:18px; padding:26px 28px; text-align:center;
    box-shadow:0 12px 40px #000a, inset 0 0 0 1px #ffffff1a; max-width:88vw; }
  #overlay h1{ margin:0 0 6px; font-size:34px; }
  #overlay p{ margin:0 0 16px; opacity:.85; }
  #overlay button{ border:none; border-radius:12px; padding:12px 22px; font-size:16px; font-weight:800;
    background:linear-gradient(90deg,#ff9f43,#ff6b9d); color:#fff; cursor:pointer; box-shadow:0 4px 0 #0006; }
  #hint{ position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:5;
    background:#000a; padding:5px 12px; border-radius:20px; font-size:12px; opacity:.9; pointer-events:none; transition:opacity .5s; }
  .title{ font-size:13px; font-weight:800; letter-spacing:.5px; opacity:.9; margin-top:2px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="top">
    <div class="tophead">
      <div class="title">🍭 SUGAR MARCH <span style="opacity:.5;font-weight:400">— にゃんこ風・試作</span></div>
      <div id="moneyBox">🍬 <b id="moneyTxt">0</b><span class="sub">/<span id="capTxt">0</span> ・+<span id="rateTxt">0</span>/秒</span></div>
    </div>
    <div class="bars">
      <div class="castle e"><div class="clabel"><span>敵のお城 🏰</span><span id="ehpTxt"></span></div><div class="track"><div class="fill" id="ehp"></div></div></div>
      <div class="castle p"><div class="clabel"><span id="phpTxt"></span><span>🏰 じぶんのお城</span></div><div class="track"><div class="fill" id="php"></div></div></div>
    </div>
  </div>
  <div id="stage"><canvas id="cv" width="960" height="440"></canvas></div>
  <div id="bottom">
    <button id="walletBtn" class="sidebtn" onclick="upgradeWallet()"><span class="big">💰</span><span class="lbl">お財布UP</span><span class="sub" id="walletSub">Lv1</span></button>
    <div id="dock"></div>
    <button id="towerBtn" class="sidebtn" onclick="castTower()"><span class="cd" id="towerCdFill"></span><span class="big">💥</span><span class="lbl">タワー攻撃</span><span class="sub" id="towerSub">OK</span></button>
  </div>
</div>
<div id="hint">🍬を貯めて下のボタンでなかまを出撃！ 左の敵のお城を落とそう（右＝自分）</div>
<div id="overlay"><div class="card"><h1 id="ovT"></h1><p id="ovP"></p><button onclick="restart()">もういちど</button></div></div>

           num:1, mold:'blob',  col:'#8a6bb0', col2:'#573f83'},   // 超硬タンク（ドーナッツ相当）
  m_phage:{name:'ファージ砲', role:'ranged', atk:14, hp:46,  speed:56,  range:170, cd:1.0, scale:0.98,
           num:1, mold:'phage', col:'#9a7bc0', col2:'#5f4488'},   // 射手（シュー相当）
  m_puff: {name:'プクーレ',   role:'bomber', atk:0,  hp:55,  speed:132, range:30, cd:1.0, scale:0.92,
           blast:120, blastR:64, num:1, mold:'spiky', col:'#a7b86a', col2:'#6f7d3f'}, // 自爆（ポップコーン相当）
};

/* --- 状態 --- */
let world, money, php, ehp, cd, enemyCd, elapsed, running, lastT, walletLv, towerCd, hintT;

function effRate(){ return CONF.moneyRate + walletLv*CONF.walletRateStep; }
function effCap(){ return CONF.moneyCap + walletLv*CONF.walletCapStep; }
function walletCost(){ return CONF.walletCostBase + walletLv*CONF.walletCostStep; }

function reset(){
  world = { units:[], shots:[], parts:[], nextId:1 };
  money = CONF.moneyStart;
  php = ehp = CONF.castleHP;
  cd = {}; for(const k of ORDER) cd[k]=0;
  enemyCd = 1.2;
  elapsed = 0;
  walletLv = 0;
  towerCd = 0;              // タワー攻撃：最初から撃てる
  running = true;
}

/* --- ユニットオブジェクトを作る（デプロイ・分裂で共用） --- */
function defOf(key, side){ return side==='p' ? (DEFS[key]||FOE_DEFS[key]) : (FOE_DEFS[key]||DEFS[key]); }
function newUnit(key, side, x, y){
  const D = defOf(key, side);
  return {
    id: world.nextId++, key, side, U:D, x, y,
    hp:D.hp, maxHp:D.hp, atk:D.atk, speed:D.speed, range:D.range, cd:D.cd,
    cool: Math.random()*0.2, dir: side==='p'?-1:1, bob:Math.random()*6.28,
    fuseT:-1, dead:false,
    charging: !!D.charge,                 // 大福＝出た直後は突撃状態
    blowT: 0,                             // ドーナッツ送風タイマー
    discoT: D.disco ? D.disco.cd*0.4 : 0, // パーティークッキーのミラーボール発生タイマー
    auraT: 0, buffMul: 1,
    moving: false, atkAnim: 0, px: x,     // アニメ用（歩行/攻撃/前フレームx）
  };
}
const ATK_ANIM = 0.18;   // 攻撃モーションの表示時間(秒)

/* --- ユニット生成（デプロイ／敵湧き） --- */
function spawn(key, side){
  const D = defOf(key, side);
  if(world.units.filter(u=>u.side===side).length >= CONF.maxUnitsPerSide) return;
  const n = D.num || 1;
  for(let i=0;i<n;i++){
    // 味方(p)は右端ふちから出て左へ／敵(e)は左端ふちから出て右へ（張り付き組を優先迎撃できる湧き位置）
    const baseX = side==='p' ? CONF.W-CONF.spawnInset : CONF.spawnInset;
    const dir = side==='p' ? -1 : 1;
    const y = CONF.groundY - Math.random()*CONF.rowBand;
    world.units.push(newUnit(key, side, baseX + dir*(i*14 + Math.random()*8), y));
  }
}

/* --- 前方（進行方向の先）にいる敵/味方で一番近いもの --- */
function frontUnit(u, sameSide){
  let best=null, bg=1e9;
  for(const o of world.units){
    if(o.dead || o===u) continue;
    if(sameSide ? o.side!==u.side : o.side===u.side) continue;
    const ahead = u.dir>0 ? o.x>u.x : o.x<u.x;   // 進む向きの先にいるか
    if(!ahead) continue;
    const g = Math.abs(o.x-u.x);
    if(g<bg){ bg=g; best=o; }
  }
  return best ? {o:best, gap:bg} : null;
}
// テスト互換：一番近い敵（前後問わず）
function nearestEnemy(u){
  let best=null,bd=1e9;
  for(const o of world.units){ if(o.side===u.side||o.dead) continue; const d=Math.abs(o.x-u.x); if(d<bd){bd=d;best=o;} }
  return best?{o:best,d:bd}:null;
}

/* --- ダメージ適用（装甲=被ダメ軽減をここで一本化） --- */
function hurt(o, dmg){ o.hp -= dmg * (1 - (o.U.dr||0)); }

/* --- 分裂：倒れた場所に子ユニット（別の種類）を生む。
   split={key,n} で子の種類と数を指定＝巨大スライム→スライム→チビ の多段チェーン --- */
function splitOnDeath(u){
  const sp = u.U.split; if(!sp) return;
  for(let i=0;i<sp.n;i++){
    const c = newUnit(sp.key, u.side, u.x + (i? 14 : -14), u.y);
    world.units.push(c);
  }
}

/* --- パーティークッキー：ミラーボールで近くの味方の攻撃UP（クッキーはさらにUP） ---
   各ユニットの u.buffMul（攻撃倍率）を毎フレーム再計算する。 */
function updateBuffs(dt){
  for(const u of world.units){
    if(u.U.disco){
      u.discoT -= dt;
      if(u.discoT<=0){ u.discoT = u.U.disco.cd; u.auraT = u.U.disco.dur; SFX_disco(); }
      if(u.auraT>0) u.auraT -= dt;
    }
    u.buffMul = 1;
  }
  for(const a of world.units){
    const dz = a.U.disco; if(!dz || a.dead || !(a.auraT>0)) continue;
    for(const o of world.units){
      if(o.dead || o.side!==a.side) continue;
      if(Math.abs(o.x-a.x) <= dz.r){
        const m = (o.key==='cookie'||o.key==='partycookie') ? dz.cookieMul : dz.mul;
        if(m > o.buffMul) o.buffMul = m;
      }
    }
  }
}

/* --- ドーナッツの送風：正面（進行方向の先）の敵を吹き飛ばす --- */
function blowAway(u, blow){
  for(const o of world.units){
    if(o.side===u.side || o.dead) continue;
    const ahead = u.dir>0 ? o.x>u.x : o.x<u.x;
    if(!ahead || Math.abs(o.x-u.x) > blow.r) continue;
    o.x = Math.max(CONF.castleAtkRange, Math.min(CONF.W-CONF.castleAtkRange, o.x + Math.sign(o.x-u.x)*blow.kb));
  }
  // 風のエフェクト（前方へ流れる粒）
  for(let i=0;i<10;i++){ const spd=120+Math.random()*160;
    world.parts.push({x:u.x, y:u.y-20-Math.random()*30, vx:u.dir*spd, vy:(Math.random()-0.5)*40, life:0.4, max:0.4, c:'#cfe8ff', r:2+Math.random()*2}); }
  SFX_blow();
}

/* --- 大福の居合の斬撃エフェクト --- */
function slashFx(u){
  for(let i=0;i<12;i++){ const a=Math.random()*6.28, s=60+Math.random()*160;
    world.parts.push({x:u.x, y:u.y-18, vx:Math.cos(a)*s, vy:Math.sin(a)*s-40, life:0.35, max:0.35, c:'#fff2c4', r:2+Math.random()*3}); }
}

/* --- 爆発（bomber） --- */
function explode(x, y, side, blast, blastR){
  for(const o of world.units){
    if(o.side===side || o.dead) continue;
    const d = Math.hypot(o.x-x, o.y-y);
    if(d<=blastR){ hurt(o, blast*(1 - 0.5*(d/blastR))); }
  }
  if(side==='p' && x<=blastR+CONF.castleAtkRange) ehp -= blast;              // 敵城=左
  if(side==='e' && (CONF.W-x)<=blastR+CONF.castleAtkRange) php -= blast;     // 味方城=右
  const c = side==='e' ? '#b6e06a' : '#ffd23f';   // カビ=緑の胞子 / お菓子=金
  for(let i=0;i<14;i++){ const a=Math.random()*6.28, s=40+Math.random()*120;
    world.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-30,life:0.5,max:0.5,c,r:3+Math.random()*3}); }
  SFX_boom();
}

/* --- 弾（射手） --- */
function fireShot(u, target){
  world.shots.push({ x:u.x, y:u.y-16, side:u.side, dmg:u.atk, sp:340, r:12,
    tid:target.id, tx:target.x, ty:target.y-16, ang:0 });
}

/* --- 1フレーム進める --- */
function step(dt){
  elapsed += dt;
  money = Math.min(effCap(), money + effRate()*dt);
  for(const k of ORDER) if(cd[k]>0) cd[k]=Math.max(0, cd[k]-dt);
  if(towerCd>0) towerCd = Math.max(0, towerCd-dt);
  if(world.beam){ world.beam.t += dt; if(world.beam.t >= world.beam.dur) world.beam=null; }

  // 敵の出撃
  enemyCd -= dt;
  if(enemyCd<=0){
    enemySpawn();
    const p = Math.min(1, elapsed/CONF.enemyRampSec);
    enemyCd = CONF.enemyStartCd + (CONF.enemyMinCd-CONF.enemyStartCd)*p;
  }

  updateBuffs(dt);   // パーティークッキーのミラーボール→味方の攻撃バフ(u.buffMul)を先に計算

  for(const u of world.units){
    if(u.dead) continue;
    u.bob += dt*10;
    if(u.atkAnim>0) u.atkAnim -= dt;
    const D = u.U;
    const fe = frontUnit(u,false);          // 前方の敵
    const castleX = u.side==='p' ? 0 : CONF.W;   // 攻撃対象は相手の城（味方=左の敵城 / 敵=右の味方城）
    const castleGap = Math.abs(castleX - u.x);
    const enemyInRange  = fe && fe.gap <= u.range;
    const castleInRange = castleGap <= Math.max(u.range, CONF.castleAtkRange);

    // ドーナッツの送風：一定間隔で正面の敵を吹き飛ばす
    if(D.blow){
      u.blowT -= dt;
      if(u.blowT<=0 && fe && fe.gap <= D.blow.r){
        u.blowT = D.blow.cd; blowAway(u, D.blow);
      }
    }

    // 導火中（bomber）
    if(u.fuseT>=0){
      u.fuseT -= dt;
      if(u.fuseT<=0){ explode(u.x,u.y,u.side,D.blast,D.blastR); u.dead=true; }
      continue;
    }
    // 自爆準備
    if(D.role==='bomber' && (enemyInRange || castleInRange)){ u.fuseT=0.28; continue; }

    // 大福の突撃：出た直後の初撃だけ大ダメージ（範囲）。突撃中は移動が速い
    if(u.charging && (enemyInRange || castleInRange)){
      if(enemyInRange){
        for(const o of world.units){ if(o.side===u.side || o.dead) continue;   // 敵だけに当てる
          if(Math.abs(o.x-u.x) <= D.charge.r) hurt(o, D.charge.dmg); }
        slashFx(u);
      }else{ if(u.side==='p') ehp -= D.charge.dmg; else php -= D.charge.dmg; }
      u.charging=false; u.cool=u.cd; u.atkAnim=ATK_ANIM; SFX_hit();
      continue;
    }

    // 攻撃（射程内なら足を止めて攻撃＝前線ができる）
    if(enemyInRange || castleInRange){
      u.moving = false;
      u.cool -= dt;
      if(u.cool<=0){
        u.cool = u.cd; u.atkAnim = ATK_ANIM;
        const dmg = u.atk * (u.buffMul||1);
        if(D.role==='ranged' && enemyInRange){ fireShot(u, fe.o); SFX_shot(); }
        else if(enemyInRange){ hurt(fe.o, dmg); SFX_hit(); }
        else if(castleInRange){ if(u.side==='p') ehp -= dmg; else php -= dmg; SFX_hit(); }
      }
      continue;
    }

    // 前進：味方どうしは重なってOK（にゃんこ風に前線で団子になる）。敵の手前でだけ止まる。
    u.moving = true;
    const sp = u.speed * (u.charging ? D.charge.spd : 1);   // 突撃中は加速
    let nx = u.x + u.dir*sp*dt;
    if(u.side==='p'){            // 左へ進む・敵城は左(0)
      nx = Math.max(nx, CONF.castleAtkRange);
      if(fe) nx = Math.max(nx, fe.o.x + u.range);   // 前方の敵の射程手前で停止
    }else{                        // 右へ進む・味方城は右(W)
      nx = Math.min(nx, CONF.W - CONF.castleAtkRange);
      if(fe) nx = Math.min(nx, fe.o.x - u.range);
    }
    u.x = nx;
  }

  // 弾の移動
  for(const s of world.shots){
    if(s.dead) continue;
    const t = world.units.find(u=>u.id===s.tid && !u.dead);
    if(t){ s.tx=t.x; s.ty=t.y-16; }
    const dx=s.tx-s.x, dy=s.ty-s.y, d=Math.hypot(dx,dy)||1;
    s.ang = Math.atan2(dy,dx);
    if(d < s.sp*dt + s.r){ if(t) hurt(t, s.dmg); s.dead=true; }
    else{ s.x += dx/d*s.sp*dt; s.y += dy/d*s.sp*dt; }
  }

  for(const u of world.units){ if(!u.dead && u.hp<=0){ u.dead=true; deathBurst(u); splitOnDeath(u); } }
  world.units = world.units.filter(u=>!u.dead);
  world.shots = world.shots.filter(s=>!s.dead);

  for(const p of world.parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt; }
  world.parts = world.parts.filter(p=>p.life>0);

  if(ehp<=0){ running=false; win(true); }
  else if(php<=0){ running=false; win(false); }
}

function deathBurst(u){
  for(let i=0;i<6;i++){ const a=Math.random()*6.28, s=20+Math.random()*70;
    world.parts.push({x:u.x,y:u.y-10,vx:Math.cos(a)*s,vy:-Math.random()*80,life:0.4,max:0.4,
      c:u.side==='p'?'#8fd0ff':'#b6e06a', r:2+Math.random()*2}); }
}

/* --- 敵の出撃AI（時間経過で強い編成も混ざる） --- */
function enemySpawn(){
  const p = Math.min(1, elapsed/CONF.enemyRampSec);
  let pool;
  if(p<0.25)      pool = ['m_swarm','m_swarm','m_puff','m_phage'];
  else if(p<0.55) pool = ['m_swarm','m_tank','m_phage','m_puff','m_swarm'];
  else            pool = ['m_swarm','m_tank','m_big','m_phage','m_puff','m_tank'];
  spawn(pool[(Math.random()*pool.length)|0], 'e');
}

/* --- プレイヤー出撃 --- */
function deploy(key){
  if(!running) return;
  const D = DEFS[key];
  if(cd[key]>0 || money < D.cost) return;
  money -= D.cost; cd[key]=D.rc;
  spawn(key,'p'); SFX_deploy(); hideHint();
}

/* --- お財布レベルアップ --- */
function upgradeWallet(){
  if(!running || walletLv>=CONF.walletMax) return;
  const c = walletCost();
  if(money < c) return;
  money -= c; walletLv++; SFX_deploy();
}

/* --- タワー攻撃スキル（右下）：自分の城（右）から一撃。敵全体にダメージ＋左へ押し戻す --- */
function castTower(){
  if(!running || towerCd>0) return;
  towerCd = CONF.towerCd;
  for(const o of world.units){
    if(o.side!=='e' || o.dead) continue;
    hurt(o, CONF.towerDmg);
    o.x = Math.max(CONF.castleAtkRange, o.x - CONF.towerKB);   // 自陣(左)へノックバック
    for(let i=0;i<4;i++){ const a=Math.random()*6.28, s=30+Math.random()*90;
      world.parts.push({x:o.x,y:o.y-10,vx:Math.cos(a)*s,vy:-Math.random()*90,life:0.4,max:0.4,c:'#ffe9a8',r:2+Math.random()*2}); }
  }
  world.beam = { t:0, dur:0.35 };   // 右→左へ走るビーム演出
  SFX_tower();
}

/* ============================================================ 描画 ============================================================ */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

function drawCastle(x, side){
  const g = CONF.groundY;
  ctx.save(); ctx.translate(x,0);
  const col = side==='p' ? '#3b7bd6' : '#6f8f52';   // 味方=青／敵=カビ緑
  const col2= side==='p' ? '#2a5aa8' : '#465a2f';
  ctx.fillStyle=col2; ctx.fillRect(-26,g-70,52,70);
  ctx.fillStyle=col;  ctx.fillRect(-22,g-64,44,64);
  ctx.fillStyle=col2; ctx.beginPath(); ctx.moveTo(-30,g-64); ctx.lineTo(0,g-92); ctx.lineTo(30,g-64); ctx.closePath(); ctx.fill();
  ctx.fillStyle = side==='p' ? '#ffe9a8' : '#c8e29a'; ctx.fillRect(-8,g-44,16,18);
  if(side==='e'){   // 敵城にカビの斑点
    ctx.fillStyle='#2f3d22';
    for(const [sx,sy,r] of [[-12,-52,4],[8,-40,3],[-4,-24,3.5],[14,-58,3]]){ ctx.beginPath(); ctx.arc(sx,sy,r,0,6.283); ctx.fill(); }
  }
  ctx.restore();
}

/* アニメ：状態に応じてフレームのスプライトキーを返す（SUGAR WARSのフレームを転用） */
function hopPhase(u, fps){ let p=(elapsed*fps + u.x*0.03)%1; return p<0?p+1:p; }
function animFrame(u){
  const D=u.U, team = u.side==='p'?'blue':'red', A=D.anim;
  if(!A) return D.spr+'_'+team;
  if(u.atkAnim>0 && A.atk) return A.atk+'_'+team;                 // 攻撃ポーズ（構えなど）
  if(u.moving && A.walk && A.walk.length){                        // 歩行フレーム
    const i = Math.floor(elapsed*(A.fps||6) + u.x*0.05) % A.walk.length;
    return A.walk[i]+'_'+team;
  }
  return (A.idle || D.spr)+'_'+team;                              // 待機
}

function drawUnit(u){
  const D = u.U;
  const team = u.side==='p'?'blue':'red';
  const S = 58 * (D.scale||1) * (u.sMul||1);
  const cx = u.x, footY = u.y;                 // 足元＝u.y（地面付近）。影も足元に置くので浮かない
  ctx.save(); ctx.globalAlpha=0.28; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(cx, footY, S*0.30, S*0.10, 0,0,6.28); ctx.fill(); ctx.restore();
  if(u.side==='e' && D.mold){
    drawMold(u, S, cx, footY + (Math.sin(u.bob)*2));            // 敵＝カビ軍団（手描き）
  }else{
    const A = D.anim;
    // 大福の突撃：スピード感の残像
    if(u.charging){
      const im0 = SPRITES[D.spr+'_'+team];
      if(im0 && im0.complete && im0.naturalWidth){
        for(let k=1;k<=3;k++){
          ctx.save(); ctx.globalAlpha = 0.12*(4-k);
          ctx.translate(cx - u.dir*k*12, footY);
          if(u.side==='p') ctx.scale(-1,1);
          ctx.drawImage(im0, -S/2, -S, S, S); ctx.restore();
        }
      }
    }
    // フレーム選択（ぽよんスライムは phase から潰れ/伸び/通常＋跳ね上げ）
    let frameKey, lift=0;
    if(A && A.hop && u.moving){
      const ph = hopPhase(u, A.fps||1.3);
      frameKey = ((ph<0.15||ph>0.85) ? A.squash : (ph>=0.40&&ph<=0.60) ? A.base : A.up) + '_' + team;
      lift = Math.sin(ph*Math.PI) * S * 0.16;
    } else {
      frameKey = animFrame(u);
    }
    const im = SPRITES[frameKey] || SPRITES[D.spr+'_'+team];
    const bobY = (A && A.hop) ? 0 : (u.moving ? Math.sin(u.bob)*2 : 0);
    // 攻撃のモーション：前へ踏み込む＋潰れ
    let lungeX=0, sqx=1, sqy=1;
    if(u.atkAnim>0 && !(A && A.atk)){    // 専用の攻撃ポーズが無いキャラは踏み込みで表現
      const a = Math.sin((u.atkAnim/ATK_ANIM)*Math.PI);
      lungeX = u.dir * a * S*0.18; sqx = 1 + 0.08*a; sqy = 1 - 0.10*a;
    }
    ctx.save();
    ctx.translate(cx + lungeX, footY + bobY - lift);
    if(u.side==='p') ctx.scale(-1,1);   // 味方は左へ進む＝左向き（スプライトは右向きが素）
    ctx.scale(sqx, sqy);
    if(u.fuseT>=0) ctx.globalAlpha = 0.6 + 0.4*Math.sin(elapsed*40);
    if(im && im.complete && im.naturalWidth){ ctx.drawImage(im, -S/2, -S, S, S); }
    else { ctx.font=(S*0.7)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillText('🍬',0,-6); }
    ctx.restore();
  }
  if(u.hp < u.maxHp){
    const w=S*0.5,h=4,bx=cx-w/2,by=footY-S-2;
    ctx.fillStyle='#0008'; ctx.fillRect(bx,by,w,h);
    ctx.fillStyle = u.side==='p'?'#6fd66f':'#b6e06a'; ctx.fillRect(bx,by,w*Math.max(0,u.hp/u.maxHp),h);
  }
  // パーティークッキー：頭上のミラーボール
  if(u.U.disco && u.auraT>0) drawMirrorBall(cx, footY-S-6, elapsed);
  // 攻撃バフ中の味方：小さな♪キラキラ
  if(u.buffMul>1 && !(u.U.disco)){
    ctx.fillStyle='#ffe27a'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.globalAlpha=0.7+0.3*Math.sin(elapsed*8+u.x); ctx.fillText('♪', cx+S*0.3, footY-S+2); ctx.globalAlpha=1;
  }
}

/* ミラーボール（キラキラ回転する球） */
function drawMirrorBall(x, y, t){
  ctx.save(); ctx.translate(x,y);
  // 吊り紐
  ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(0,-9); ctx.stroke();
  // 球（市松のミラー）
  ctx.fillStyle='#bcd2e8'; ctx.beginPath(); ctx.arc(0,0,9,0,6.28); ctx.fill();
  for(let i=0;i<10;i++){ const a=i*0.9+t*3; ctx.fillStyle=(i%2)?'#ffffff':'#7fa8d8';
    ctx.fillRect(Math.cos(a)*3-1.5, Math.sin(a)*3-1.5, 3,3); }
  // キラッ
  ctx.globalAlpha=0.5+0.5*Math.sin(t*10); ctx.fillStyle='#fff';
  ctx.fillRect(-1,-14,2,4); ctx.fillRect(-14,-1,4,2); ctx.fillRect(10,-1,4,2);
  ctx.globalAlpha=1; ctx.restore();
}

/* --- カビ敵の手描き（プレースホルダ／画像素材なし） ---
   mold: blob=もやもやカビ玉 / phage=脚つきウイルス砲 / spiky=トゲ球（自爆） */
function drawMold(u, S, cx, cy){
  const D = u.U, col = D.col||'#7fae5c', dk = D.col2||'#4f7038';
  const r = S*0.36;
  const top = cy - S*0.5;                       // 体の中心を足元より上へ
  const puls = D.mold==='spiky' && u.fuseT>=0 ? (1 + 0.18*Math.sin(elapsed*40)) : 1;
  ctx.save();
  ctx.translate(cx, top);
  ctx.scale(puls, puls);
  // 目の向き（プレイヤー＝右を見る）
  const look = 2.2;
  if(D.mold==='phage'){
    // 脚つきウイルス（着陸船型）
    ctx.strokeStyle=dk; ctx.lineWidth=Math.max(2,S*0.05); ctx.lineCap='round';
    for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(i*r*0.5,0); ctx.lineTo(i*r*0.9, r*0.9+S*0.16); ctx.stroke(); }
    // 頭（六角）
    ctx.fillStyle=col; ctx.beginPath();
    for(let k=0;k<6;k++){ const a=Math.PI/6 + k*Math.PI/3; const px=Math.cos(a)*r, py=Math.sin(a)*r*0.9-r*0.2;
      k?ctx.lineTo(px,py):ctx.moveTo(px,py); } ctx.closePath(); ctx.fill();
    ctx.strokeStyle=dk; ctx.lineWidth=2; ctx.stroke();
    eyes(0,-r*0.25, r*0.5, S*0.11, look);
  } else if(D.mold==='spiky'){
    // トゲ球（自爆ウイルス）
    ctx.fillStyle=dk;
    for(let k=0;k<9;k++){ const a=k*6.283/9; const ox=Math.cos(a)*r, oy=Math.sin(a)*r;
      ctx.beginPath(); ctx.moveTo(ox*0.8,oy*0.8);
      ctx.lineTo(ox*1.35 - Math.sin(a)*r*0.18, oy*1.35 + Math.cos(a)*r*0.18);
      ctx.lineTo(ox*1.35 + Math.sin(a)*r*0.18, oy*1.35 - Math.cos(a)*r*0.18); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle=col; circle(0,0,r);
    eyes(0,-r*0.1, r*0.42, S*0.1, look);
  } else {
    // もやもやカビ玉（デコボコ）
    ctx.fillStyle=col;
    const lumps=[[0,0,1],[-0.55,-0.15,0.6],[0.55,-0.1,0.62],[-0.3,-0.55,0.5],[0.32,-0.5,0.52],[0,0.35,0.7]];
    for(const [lx,ly,ls] of lumps) circle(lx*r, ly*r, r*ls);
    // カビの斑点
    ctx.fillStyle=dk;
    for(const [sx,sy,ss] of [[-0.35,-0.1,0.14],[0.3,0.05,0.12],[0.05,-0.4,0.1],[-0.1,0.3,0.11]]) circle(sx*r,sy*r,r*ss);
    // 浮遊する胞子
    ctx.fillStyle=col; ctx.globalAlpha=0.6;
    for(let k=0;k<3;k++){ const a=elapsed*1.4 + k*2.1 + u.x*0.02; circle(Math.cos(a)*r*1.15, -r*1.0 - (k*4) + Math.sin(a)*3, r*0.08); }
    ctx.globalAlpha=1;
    eyes(0,-r*0.15, r*0.5, S*0.12, look);
  }
  ctx.restore();

  function circle(x,y,rr){ ctx.beginPath(); ctx.arc(x,y,rr,0,6.283); ctx.fill(); }
  function eyes(ex,ey,sp,er,lk){
    for(const s of [-1,1]){
      ctx.fillStyle='#fff'; circle(ex+s*sp*0.5, ey, er);
      ctx.fillStyle='#241a1a'; circle(ex+s*sp*0.5 + lk, ey+er*0.1, er*0.5);
    }
  }
}

function drawShot(s){
  if(s.side==='e'){                    // カビの胞子弾（トゲ付きの緑玉）
    ctx.save(); ctx.translate(s.x,s.y);
    ctx.fillStyle='#5f7d3a';
    for(let k=0;k<6;k++){ const a=k*6.283/6 + elapsed*6; ctx.beginPath();
      ctx.moveTo(Math.cos(a)*3,Math.sin(a)*3); ctx.lineTo(Math.cos(a)*9,Math.sin(a)*9); ctx.lineTo(Math.cos(a+0.5)*3,Math.sin(a+0.5)*3); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle='#a7c96a'; ctx.beginPath(); ctx.arc(0,0,5,0,6.283); ctx.fill();
    ctx.restore(); return;
  }
  const im = SPRITES['arrow_'+(s.side==='p'?'blue':'red')];
  ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.ang);
  if(im && im.complete && im.naturalWidth){ ctx.drawImage(im,-14,-14,28,28); }
  else { ctx.fillStyle='#7fd0ff'; ctx.fillRect(-6,-2,12,4); }
  ctx.restore();
}

function render(){
  const W=CONF.W,H=CONF.H,g=CONF.groundY;
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#3a2a55'); bg.addColorStop(0.6,'#2a3a66'); bg.addColorStop(1,'#243a5c');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff12';
  for(let i=0;i<4;i++){ ctx.beginPath(); ctx.ellipse(120+i*260, g+20, 200, 90, 0,0,6.28); ctx.fill(); }
  ctx.fillStyle='#e7b57a'; ctx.fillRect(0,g,W,H-g);
  ctx.fillStyle='#d59f63'; ctx.fillRect(0,g,W,6);
  drawCastle(24,'e'); drawCastle(W-24,'p');   // 左＝敵(赤) / 右＝味方(青)
  const us = world.units.slice().sort((a,b)=>a.y-b.y);   // 奥(小y)→手前(大y)
  for(const u of us) drawUnit(u);
  for(const s of world.shots) drawShot(s);
  for(const p of world.parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill(); }
  ctx.globalAlpha=1;
  drawBeam();
}

/* タワー攻撃のビーム演出（右の自城→左へ走る光の帯） */
function drawBeam(){
  const bm = world.beam; if(!bm) return;
  const W=CONF.W, H=CONF.H, g=CONF.groundY;
  const k = bm.t/bm.dur;                 // 0→1
  const headX = W - k*W;                 // 右から左へ
  ctx.save();
  // うっすら全域フラッシュ
  ctx.globalAlpha = 0.25*(1-k);
  ctx.fillStyle = '#fff3c4'; ctx.fillRect(0, g-120, W, 120);
  // 走る光の帯
  ctx.globalAlpha = 0.9*(1-k*0.5);
  const grad = ctx.createLinearGradient(headX-70,0,headX+70,0);
  grad.addColorStop(0,'rgba(255,220,110,0)'); grad.addColorStop(0.5,'#fff6d0'); grad.addColorStop(1,'rgba(255,220,110,0)');
  ctx.fillStyle = grad; ctx.fillRect(headX-70, g-112, 140, 108);
  ctx.restore();
  ctx.globalAlpha = 1;
}

/* --- HUD --- */
function hud(){
  document.getElementById('moneyTxt').textContent = Math.floor(money);
  document.getElementById('rateTxt').textContent = effRate();
  document.getElementById('capTxt').textContent = effCap();
  const pv=Math.max(0,php/CONF.castleHP), ev=Math.max(0,ehp/CONF.castleHP);
  document.getElementById('php').style.width=(pv*100)+'%';
  document.getElementById('ehp').style.width=(ev*100)+'%';
  document.getElementById('phpTxt').textContent=Math.max(0,Math.ceil(php));
  document.getElementById('ehpTxt').textContent=Math.max(0,Math.ceil(ehp));
  const wb=document.getElementById('walletBtn'), ws=document.getElementById('walletSub');
  if(walletLv>=CONF.walletMax){ ws.textContent='MAX'; wb.classList.add('off'); wb.classList.remove('rdy'); }
  else{ ws.textContent='🍬'+walletCost(); const poorW=money<walletCost(); wb.classList.toggle('off',poorW); wb.classList.toggle('rdy',!poorW); }
  const tb=document.getElementById('towerBtn'), ts=document.getElementById('towerSub'), tf=document.getElementById('towerCdFill');
  const ready = towerCd<=0;
  ts.textContent = ready ? 'OK' : Math.ceil(towerCd)+'秒';
  tb.classList.toggle('off', !ready); tb.classList.toggle('rdy', ready);
  tf.style.transform='scaleY('+(ready?0:towerCd/CONF.towerCd)+')';
  for(const k of ORDER){
    const el=btnEls[k]; if(!el) continue; const D=DEFS[k];
    const onCd=cd[k]>0, poor=money<D.cost;
    el.classList.toggle('off', onCd||poor); el.classList.toggle('rdy', !onCd&&!poor);
    el._cd.style.transform='scaleY('+(onCd? cd[k]/D.rc : 0)+')';
  }
}

/* --- ループ --- */
function loop(t){
  if(!lastT) lastT=t;
  let dt=(t-lastT)/1000; lastT=t;
  if(dt>0.05) dt=0.05;
  if(running) step(dt);
  render(); hud();
  requestAnimationFrame(loop);
}

/* --- 決着 --- */
function win(youWon){
  const ov=document.getElementById('overlay');
  document.getElementById('ovT').textContent=youWon?'🎉 しょうり！':'💥 まけ…';
  document.getElementById('ovP').textContent=youWon?'敵のお城を落とした！':'お城が落ちてしまった…';
  ov.style.display='flex'; youWon?SFX_win():SFX_lose();
}
function restart(){ document.getElementById('overlay').style.display='none'; reset(); showHint(); }

/* --- ボタンUI --- */
const dock = document.getElementById('dock');
const btnEls = {};
function buildDock(){
  dock.innerHTML='';
  for(const k of ORDER){
    const D=DEFS[k];
    const b=document.createElement('button'); b.className='btn';
    const cdEl=document.createElement('div'); cdEl.className='cd';
    const img=document.createElement('img'); img.className='ic'; img.src=SPRITE_DATA[D.spr+'_blue']||'';
    const nm=document.createElement('div'); nm.className='nm'; nm.textContent=D.name;
    const co=document.createElement('div'); co.className='co'; co.textContent='🍬'+D.cost;
    b.appendChild(cdEl); b.appendChild(img); b.appendChild(nm); b.appendChild(co);
    b.addEventListener('click',()=>deploy(k)); b._cd=cdEl;
    dock.appendChild(b); btnEls[k]=b;
  }
}

function showHint(){ const h=document.getElementById('hint'); h.style.opacity='0.9'; clearTimeout(hintT); hintT=setTimeout(hideHint,6000); }
function hideHint(){ document.getElementById('hint').style.opacity='0'; }

/* ============================================================ 効果音（Web Audio・軽量合成） ============================================================ */
let AC=null;
function ac(){ if(AC===null){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=false; } } return AC||null; }
function blip(freq,dur,type,vol){ const c=ac(); if(!c) return;
  const o=c.createOscillator(), g=c.createGain(); o.type=type||'square'; o.frequency.value=freq;
  g.gain.value=vol||0.06; o.connect(g); g.connect(c.destination);
  const t=c.currentTime; o.start(t); g.gain.setValueAtTime(g.gain.value,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.stop(t+dur); }
let lastHit=0;
function SFX_hit(){ const n=(typeof performance!=='undefined'?performance.now():0); if(n-lastHit<40)return; lastHit=n; blip(220+Math.random()*60,0.05,'square',0.03); }
function SFX_shot(){ blip(720,0.06,'triangle',0.03); }
function SFX_tower(){ blip(180,0.05,'sawtooth',0.08); setTimeout(()=>blip(90,0.35,'sawtooth',0.10),40); setTimeout(()=>SFX_boom(),60); }
function SFX_disco(){ [660,880,990].forEach((f,i)=>setTimeout(()=>blip(f,0.1,'triangle',0.04),i*70)); }
function SFX_blow(){ const c=ac(); if(!c)return; const b=c.createBuffer(1,c.sampleRate*0.25,c.sampleRate); const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++){ const e=i/d.length; d[i]=(Math.random()*2-1)*Math.sin(e*Math.PI)*0.5; }
  const s=c.createBufferSource(), g=c.createGain(); g.gain.value=0.08; s.buffer=b; s.connect(g); g.connect(c.destination); s.start(); }
function SFX_deploy(){ blip(520,0.08,'sine',0.06); setTimeout(()=>blip(780,0.08,'sine',0.05),60); }
function SFX_boom(){ const c=ac(); if(!c)return; const b=c.createBuffer(1,c.sampleRate*0.2,c.sampleRate); const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  const s=c.createBufferSource(), g=c.createGain(); g.gain.value=0.14; s.buffer=b; s.connect(g); g.connect(c.destination); s.start(); }
function SFX_win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,0.18,'square',0.06),i*110)); }
function SFX_lose(){ [392,330,262].forEach((f,i)=>setTimeout(()=>blip(f,0.24,'sawtooth',0.05),i*160)); }

/* --- 起動 --- */
buildDock(); reset(); showHint(); requestAnimationFrame(loop);

/* ヘッドレステスト用に主要関数を公開 */
if(typeof globalThis!=='undefined') globalThis.__NYANKO = { CONF, DEFS, ORDER,
  reset, spawn, step, deploy, upgradeWallet, castTower, nearestEnemy, frontUnit, explode, effRate, effCap, walletCost,
  get world(){return world;}, get money(){return money;}, get php(){return php;}, get ehp(){return ehp;},
  get walletLv(){return walletLv;}, get towerCd(){return towerCd;},
  set money(v){money=v;}, set php(v){php=v;}, set ehp(v){ehp=v;} };
