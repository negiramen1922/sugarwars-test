<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#fff1dd">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SUGAR MARCH">
<title>SUGAR MARCH（にゃんこ風・試作）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  /* ===== SUGAR WARS 準拠：おかしのポップ×ドット風（ハード枠＋段差シャドウ・にじみ影なし） ===== */
  :root{
    --bg:#fff1dd; --bg2:#ffe4c4; --panel:#fffaf3; --panel-2:#fff0dc; --parch:#fff8ec; --parch-dk:#f0e3c4;
    --ink:#4a2a1c; --muted:#a9785e; --line:rgba(150,90,50,.16);
    --berry:#ff4f79; --berry-dk:#c9224c; --gold:#ffb43a; --gold-dk:#c37a10;
    --brass:#37b98a; --grape:#a45fd6; --steel:#38a7cc; --rust:#ff7a68;
    --px-edge:#4a2a12; --px-edge-gold:#7a3f10;   /* ドット風ボタンのハード枠色 */
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; color:var(--ink); overflow:hidden; overscroll-behavior:none; touch-action:manipulation;
    background:radial-gradient(1100px 600px at 50% -8%, #ffd7a2 0%, transparent 60%), radial-gradient(820px 520px at 12% 10%, #ffc6d6 0%, transparent 55%), var(--bg);
    font-family:"Inter",system-ui,"Hiragino Kaku Gothic ProN",sans-serif; -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent; }
  /* 画面の実高さ（アドレスバー分を除く）。JSが --vh を更新。フォールバックは100% */
  #wrap{ width:100%; height:100%; height:calc(var(--vh, 1vh) * 100); display:flex; flex-direction:column; align-items:center;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); box-sizing:border-box; }
  #top{ width:100%; max-width:960px; padding:6px 10px 0; }
  .tophead{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .bars{ display:none; }   /* 敵HP＝キャンバス上部に大バー／自陣HP＝城の上（in-canvas描画）に移行 */
  .castle{ flex:1; }
  /* 通貨アイコン＝ドット絵キャンディ（🍬絵文字の置き換え。data URIは実行時に --candy-img へ注入） */
  .candy{ display:inline-block; width:1.05em; height:1.05em; background:var(--candy-img) center/contain no-repeat; vertical-align:-0.18em; image-rendering:pixelated; }
  .clabel{ font-size:11px; color:var(--muted); font-weight:600; display:flex; justify-content:space-between; }
  .clabel span:last-child{ font-family:"Space Mono",monospace; }
  .track{ height:14px; border-radius:3px; background:var(--parch-dk); overflow:hidden; border:2px solid var(--px-edge); box-shadow:0 2px 0 var(--px-edge); }
  .fill{ height:100%; width:100%; transition:width .12s linear; }
  .p .fill{ background:linear-gradient(180deg,#5cc8f2,#2a7bff); }
  .e .fill{ background:linear-gradient(180deg,#b6dd6a,#5f8a34); }
  #moneyBox{ text-align:right; white-space:nowrap; font-weight:700; font-size:13px; color:var(--muted);
    background:var(--panel); border:2px solid var(--px-edge); border-radius:4px; padding:3px 10px; box-shadow:0 3px 0 var(--px-edge); }
  /* バトルの倍速トグル */
  #speedBtn{ cursor:pointer; white-space:nowrap; font-weight:800; font-size:13px; color:var(--ink); font-family:Inter,system-ui,sans-serif;
    background:var(--panel); border:2px solid var(--px-edge); border-radius:4px; padding:4px 10px; box-shadow:0 3px 0 var(--px-edge); }
  #speedBtn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--px-edge); }
  #speedBtn.on{ background:var(--grape); color:#fff; border-color:#6b2f9e; box-shadow:0 3px 0 #6b2f9e; }
  /* 一時停止ボタン（speedBtnと同じ見た目） */
  #pauseBtn{ cursor:pointer; white-space:nowrap; font-weight:800; font-size:13px; color:var(--ink); font-family:Inter,system-ui,sans-serif;
    background:var(--panel); border:2px solid var(--px-edge); border-radius:4px; padding:4px 10px; box-shadow:0 3px 0 var(--px-edge); }
  #pauseBtn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--px-edge); }
  #pauseBtn.on{ background:var(--steel); color:#fff; border-color:#1f6f8c; box-shadow:0 3px 0 #1f6f8c; }
  /* 一時停止オーバーレイ */
  #pauseOverlay{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(74,42,18,.45); z-index:18; cursor:pointer; }
  #pauseOverlay .pausecard{ background:var(--panel); color:var(--ink); border:3px solid var(--px-edge); border-radius:8px; padding:22px 34px; text-align:center; box-shadow:0 8px 0 var(--px-edge); }
  #moneyBox b{ color:var(--gold-dk); font-size:20px; font-family:"Space Mono",monospace; }
  #moneyBox .sub{ display:block; font-size:10px; font-weight:600; font-family:"Space Mono",monospace; }
  #stage{ width:100%; max-width:960px; flex:1; min-height:0; display:flex; align-items:center; justify-content:center; padding:4px 6px; }
  canvas{ width:100%; height:auto; max-height:100%; display:block; image-rendering:pixelated;
    border:3px solid var(--px-edge); border-radius:8px; box-shadow:0 6px 0 var(--px-edge); touch-action:manipulation; }
  #bottom{ width:100%; max-width:960px; display:flex; align-items:stretch; gap:8px; padding:10px 10px 12px; }
  #dock{ flex:1; display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
  /* 出撃ボタン（ユニット）：パーチ地のドットカード */
  .btn{ position:relative; flex:1 1 90px; min-width:84px; max-width:150px; cursor:pointer; overflow:hidden; user-select:none;
    background:var(--parch); color:var(--ink); border:3px solid var(--px-edge); border-radius:5px; padding:6px 4px 5px;
    box-shadow:0 4px 0 var(--px-edge); transition:transform .08s ease, filter .12s ease; }
  .btn:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--px-edge); }
  .btn .ic{ width:40px; height:40px; margin:0 auto; display:block; image-rendering:pixelated; }
  .btn .nm{ font-size:10px; color:var(--muted); font-weight:700; margin-top:1px; }
  .btn .co{ font-size:13px; font-weight:700; color:var(--gold-dk); font-family:"Space Mono",monospace; }
  .btn .cd{ position:absolute; left:0; right:0; bottom:0; top:0; background:rgba(74,42,18,.55);
    transform-origin:bottom; transform:scaleY(0); pointer-events:none; }
  .btn.off{ filter:grayscale(.55) brightness(.82); opacity:.75; }
  .btn.rdy{ border-color:var(--berry-dk); box-shadow:0 4px 0 var(--berry-dk); }
  /* サイド操作ボタン（左下＝お財布 / 右下＝タワー攻撃） */
  .sidebtn{ position:relative; flex:0 0 80px; cursor:pointer; font-weight:700; color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:6px 4px; overflow:hidden; user-select:none;
    border:3px solid var(--px-edge); border-radius:5px; box-shadow:0 4px 0 var(--px-edge); transition:transform .08s ease; }
  .sidebtn:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--px-edge); }
  .sidebtn .big{ font-size:22px; line-height:1; }
  .sidebtn .lbl{ font-size:10.5px; text-shadow:0 1px 0 rgba(0,0,0,.35); }
  .sidebtn .sub{ font-size:12px; color:#fff; font-family:"Space Mono",monospace; text-shadow:0 1px 0 rgba(0,0,0,.35); }
  .sidebtn.off{ filter:grayscale(.5) brightness(.82); opacity:.8; }
  .sidebtn.rdy{ border-color:var(--gold-dk); box-shadow:0 4px 0 var(--gold-dk); }
  #walletBtn{ background:var(--grape); }
  #towerBtn{ background:var(--berry); }
  .sidebtn .cd{ position:absolute; inset:0; background:rgba(74,42,18,.55); transform-origin:bottom; transform:scaleY(0); pointer-events:none; }
  /* オーバーレイ（勝敗）：パーチのドットカード */
  #overlay{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(74,42,18,.55); z-index:20; }
  #overlay .card{ background:var(--panel); color:var(--ink); border:3px solid var(--px-edge); border-radius:8px; padding:26px 28px; text-align:center;
    box-shadow:0 8px 0 var(--px-edge); max-width:88vw; }
  #overlay h1{ margin:0 0 6px; font-size:34px; font-family:"Oswald",sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
  #overlay p{ margin:0 0 16px; color:var(--muted); }
  #overlay button{ font-family:"Oswald",sans-serif; text-transform:uppercase; letter-spacing:.05em; border:3px solid var(--px-edge-gold); border-radius:4px;
    padding:11px 22px; font-size:16px; font-weight:600; background:var(--gold); color:#3a2408; cursor:pointer; box-shadow:0 5px 0 var(--px-edge-gold); }
  #overlay button:active{ transform:translateY(4px); box-shadow:0 1px 0 var(--px-edge-gold); }
  #hint{ position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:5;
    background:var(--panel); color:var(--ink); border:2px solid var(--px-edge); padding:5px 14px; border-radius:4px;
    font-size:12px; font-weight:600; box-shadow:0 3px 0 var(--px-edge); pointer-events:none; transition:opacity .5s; }
  .title{ font-family:"Oswald",sans-serif; text-transform:uppercase; font-size:14px; font-weight:700; letter-spacing:.06em; color:var(--ink); margin-top:2px; }
  .title span{ color:var(--muted); }
  /* ===== スマホ最適化 ===== */
  /* 狭い/低い画面：バトル上部のタイトルを隠して縦を稼ぐ（ホームのh1は別なので影響なし） */
  @media (max-width:760px), (max-height:560px){
    .title{ display:none; }
    #top{ padding:4px 8px 0; }
    #moneyBox b{ font-size:18px; }
  }
  /* 縦持ち：戦場を上寄せ＋操作ボタンを大きく下（親指ゾーン）に寄せる。中央に浮いて小さいのを解消 */
  @media (orientation:portrait){
    /* 戦場を中央いっぱいに（キャンバスは #stage を満たし、JSがズーム＋横スクロール）。操作は下に固定。 */
    #stage{ flex:1 1 auto; align-items:stretch; padding:4px 6px 6px; min-height:0; }
    #stage canvas{ width:100%; height:100%; max-height:none; }
    #bottom{ flex:0 0 auto; align-items:stretch; padding-bottom:calc(10px + env(safe-area-inset-bottom)); }
    #dock{ gap:8px; }
    .btn{ flex:1 1 30%; max-width:none; padding:9px 6px 7px; }
    .btn .ic{ width:44px; height:44px; }
    .btn .nm{ font-size:11px; }
    .btn .co{ font-size:15px; }
    .sidebtn{ flex:0 0 74px; padding:9px 4px; }
    .sidebtn .big{ font-size:24px; }
  }
  /* 横持ちで低い画面：上下のパディングを詰めて戦場を最大化 */
  @media (orientation:landscape) and (max-height:520px){
    #top{ padding:3px 10px 0; }
    #bottom{ padding:6px 10px calc(8px + env(safe-area-inset-bottom)); }
    .sidebtn{ flex:0 0 76px; }
  }
  /* --- メタ画面（ホーム/ステージ選択/編成）--- */
  .screen{ position:fixed; inset:0; z-index:30; display:none; flex-direction:column; align-items:center; color:var(--ink); overflow-y:auto; padding:16px;
    background:radial-gradient(1100px 600px at 50% -8%, #ffd7a2 0%, transparent 60%), radial-gradient(820px 520px at 12% 10%, #ffc6d6 0%, transparent 55%), var(--bg); }
  .screen.on{ display:flex; }
  .screen h1{ margin:8px 0 2px; font-size:32px; font-family:"Oswald",sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
    color:var(--ink); text-shadow:0 3px 0 var(--parch-dk); }
  .screen .sub{ color:var(--muted); font-size:13px; font-weight:600; margin-bottom:14px; }
  .screen .sub b{ color:var(--gold-dk); font-family:"Space Mono",monospace; }
  /* 大ボタン：ドット風（ハード枠＋5px段差） */
  .bigbtn{ font-family:"Oswald",sans-serif; text-transform:uppercase; letter-spacing:.05em; font-weight:700;
    border:3px solid var(--px-edge-gold); border-radius:5px; padding:15px 34px; font-size:20px; cursor:pointer;
    background:var(--berry); color:#fff; box-shadow:0 6px 0 var(--berry-dk); transition:transform .08s ease, filter .12s ease; }
  .bigbtn:active{ transform:translateY(4px); box-shadow:0 2px 0 var(--berry-dk); }
  .bigbtn.off{ filter:grayscale(.5) brightness(.85); cursor:default; }
  .backbtn{ align-self:flex-start; font-family:"Oswald",sans-serif; text-transform:uppercase; letter-spacing:.04em; font-weight:600;
    border:2px solid var(--px-edge); background:var(--panel); color:var(--ink); border-radius:4px; padding:7px 14px; cursor:pointer;
    box-shadow:0 3px 0 var(--px-edge); margin-bottom:8px; }
  .backbtn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--px-edge); }
  .list{ width:100%; max-width:520px; display:flex; flex-direction:column; gap:10px; }
  .stagecard{ display:flex; align-items:center; gap:12px; text-align:left; cursor:pointer;
    background:var(--panel); color:var(--ink); border:3px solid var(--px-edge); border-radius:6px; padding:12px 14px; box-shadow:0 4px 0 var(--px-edge); }
  .stagecard:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--px-edge); }
  .stagecard.locked{ filter:grayscale(.65) brightness(.92); opacity:.7; cursor:default; }
  .stagecard .no{ font-size:22px; font-weight:700; font-family:"Oswald",sans-serif; width:40px; height:40px; border-radius:5px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; background:var(--gold); color:#3a2408; border:2px solid var(--px-edge-gold); }
  .stagecard.locked .no{ background:var(--parch-dk); color:var(--muted); border-color:var(--px-edge); }
  .stagecard .nm{ font-weight:700; }
  .stagecard .meta{ font-size:11px; color:var(--muted); font-weight:600; }
  .stagecard .rw{ margin-left:auto; text-align:center; font-size:10px; color:var(--muted); }
  .stagecard .rw img{ width:38px; height:38px; display:block; image-rendering:pixelated; }
  .stagecard .clr{ margin-left:auto; font-size:22px; color:var(--brass); }
  .grid{ width:100%; max-width:560px; display:grid; grid-template-columns:repeat(auto-fill,minmax(92px,1fr)); gap:8px; }
  .ucard{ position:relative; cursor:pointer; background:var(--parch); color:var(--ink); border:3px solid var(--px-edge); border-radius:5px; padding:8px 4px 6px;
    box-shadow:0 4px 0 var(--px-edge); transition:transform .08s ease; }
  .ucard:active{ transform:translateY(2px); box-shadow:0 2px 0 var(--px-edge); }
  .ucard img{ width:44px; height:44px; display:block; margin:0 auto; image-rendering:pixelated; }
  .ucard .nm{ font-size:10.5px; color:var(--muted); font-weight:700; }
  .ucard .co{ font-size:11px; font-weight:700; color:var(--gold-dk); font-family:"Space Mono",monospace; }
  /* なかま一覧のセクション見出し（ノーマル／ガチャ限定） */
  .csect{ display:flex; align-items:center; gap:8px; margin:4px 2px 8px; font-weight:800; color:var(--ink); font-size:14px; }
  .csect::after{ content:""; flex:1; height:3px; border-radius:2px; background:var(--px-edge); opacity:.35; }
  .csect .cs-ic{ font-size:15px; }
  /* 未開放（？）カード＝立ち絵と名前を伏せてシルエットのはてなに */
  .ucard.locked .qmark{ width:44px; height:44px; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:900; color:var(--muted); background:var(--parch-dk); border-radius:6px; }
  .ucard.sel{ border-color:var(--berry-dk); box-shadow:0 4px 0 var(--berry-dk); background:#fff2e6; }
  .ucard .pick{ position:absolute; top:-6px; right:-6px; width:22px; height:22px; border-radius:4px; background:var(--berry); border:2px solid var(--berry-dk);
    color:#fff; font-weight:700; font-size:12px; font-family:"Space Mono",monospace; display:none; align-items:center; justify-content:center; }
  .abadge{ position:absolute; top:3px; left:5px; min-width:18px; height:18px; padding:0 3px; border-radius:4px;
    color:#fff; font-weight:700; font-size:11px; display:flex; align-items:center; justify-content:center; border:2px solid rgba(0,0,0,.35); }
  .ucard.sel .pick{ display:flex; }
  #loadoutBar{ position:sticky; bottom:0; width:100%; max-width:560px; display:flex; align-items:center; gap:10px;
    padding:10px 0; margin-top:6px; }
  #loadoutBar .cnt{ font-weight:700; font-family:"Space Mono",monospace; color:var(--ink); }
</style>
</head>
<body>
<!-- ホーム -->
<div id="homeScreen" class="screen">
  <div style="flex:1"></div>
  <div style="font-size:52px">🍭</div>
  <h1>SUGAR MARCH</h1>
  <div class="sub">お菓子の王国をカビ軍団から守れ！</div>
  <button class="bigbtn" onclick="goSelect()">▶ はじめる</button>
  <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center">
    <button class="bigbtn" onclick="goCollect()" style="background:var(--grape);border-color:#6b2f9e;box-shadow:0 6px 0 #6b2f9e;font-size:16px;padding:13px 22px"><i class="candy"></i> なかま</button>
    <button class="bigbtn" onclick="goUpgrade()" style="background:var(--steel);border-color:#1f6f8c;box-shadow:0 6px 0 #1f6f8c;font-size:16px;padding:13px 22px">⚙ 強化</button>
  </div>
  <div class="sub" id="homeExp" style="margin-top:14px;font-size:15px">🎓 <b style="color:#3f7fd0">0</b> EXP</div>
  <div class="sub" id="homeProgress" style="margin-top:8px"></div>
  <button id="testModeBtn" onclick="toggleTestMode()" class="backbtn" style="align-self:center;margin-top:12px;font-size:12px"></button>
  <button onclick="resetProgress()" class="backbtn" style="align-self:center;margin-top:8px;font-size:12px;color:var(--rust);border-color:var(--rust)">🗑 進捗をリセット（テスト用）</button>
  <div style="flex:1"></div>
</div>
<!-- なかま（解放＆ガチャ） -->
<div id="collectScreen" class="screen">
  <button class="backbtn" onclick="goHome()">← ホーム</button>
  <h1>なかま</h1>
  <div class="sub">🎓 <b id="collectExp">0</b> EXP　・　<i class="candy"></i> <b id="collectCoins">0</b> コイン</div>
  <div class="sub" style="margin-top:-8px">キャラは🎓EXPで解放（ステージを進めるほど解放できるキャラが増える）</div>
  <button class="bigbtn" onclick="doGacha()" id="gachaBtn" style="background:var(--gold);color:#3a2408;border-color:var(--px-edge-gold);box-shadow:0 6px 0 var(--px-edge-gold);font-size:16px;padding:13px 26px;margin-bottom:14px">🎰 ガチャを回す（<i class="candy"></i><span id="gachaCostTxt"></span>）</button>
  <div id="collectSections" style="width:100%;max-width:560px"></div>
</div>
<!-- 強化（EXP：サイフ／タワー） -->
<div id="upgradeScreen" class="screen">
  <button class="backbtn" onclick="goHome()">← ホーム</button>
  <h1>強化</h1>
  <div class="sub">🎓 <b id="upgExp" style="color:#3f7fd0">0</b> EXP　でサイフとタワーを恒久強化</div>
  <div class="list" id="upgList" style="max-width:540px"></div>
</div>
<!-- ステージ選択 -->
<div id="selectScreen" class="screen">
  <button class="backbtn" onclick="goHome()">← ホーム</button>
  <h1>ステージ</h1>
  <div class="sub">クリアで新しいなかまが解放！</div>
  <div class="list" id="stageList"></div>
</div>
<!-- 編成 -->
<div id="loadoutScreen" class="screen">
  <button class="backbtn" onclick="goSelect()">← ステージ</button>
  <h1>へんせい</h1>
  <div class="sub" id="loadoutHint"></div>
  <div class="grid" id="unitGrid"></div>
  <div id="loadoutBar">
    <span class="cnt" id="loadoutCnt"></span>
    <button class="bigbtn" id="sortieBtn" onclick="sortie()" style="margin-left:auto;padding:12px 24px;font-size:17px">しゅつじん！</button>
  </div>
</div>
<div id="wrap">
  <div id="top">
    <div class="tophead">
      <div class="title" style="flex:1;min-width:0">🍭 SUGAR MARCH <span style="opacity:.5;font-weight:400">— にゃんこ風・試作</span></div>
      <button id="pauseBtn" onclick="togglePause()" title="一時停止">⏸</button>
      <button id="speedBtn" onclick="toggleSpeed()" title="バトルの速さ">▶ ×1</button>
      <div id="moneyBox"><i class="candy"></i> <b id="moneyTxt">0</b><span class="sub">/<span id="capTxt">0</span> ・+<span id="rateTxt">0</span>/秒</span></div>
    </div>
    <div class="bars">
      <div class="castle e"><div class="clabel"><span>敵のお城 🏰</span><span id="ehpTxt"></span></div><div class="track"><div class="fill" id="ehp"></div></div></div>

   ★タワーの派生要素（スロー砲/毒砲など）は未実装＝設計メモ NYANKO_NOTES.md に考察を記載。
   ============================================================ */
// 財布Lvごとの最大貯金（にゃんこ式＝固定テーブル）。wMaxメタで上限Lvを追加、wStartメタで開始Lvを上げる。

  wStart:{ name:'サイフ 初期Lv',   icon:'👛', suffix:'🍬',   max:5, c0:450, valFn:(lv)=>WALLET_CAPS[Math.min(lv, WALLET_CAPS.length-1)] },
  wMax:  { name:'サイフ 最大貯金',  icon:'💰', suffix:'🍬',   max:6, c0:400, valFn:(lv)=>600 + lv*100 },
  tHp:   { name:'タワーHP',        icon:'🏰', suffix:'',     base:1600, step:450, max:8, c0:400 }, // 自分のお城のHP

};
const UPG_GROWTH = 1.55;                                        // EXPコストの逓増率
function upgLv(t){ return (save.upg && save.upg[t]) || 0; }
function upgVal(t){ const u=UPG[t]; return u.valFn ? u.valFn(upgLv(t)) : (u.base + upgLv(t)*u.step); }
function upgCost(t){ const u=UPG[t]; const lv=upgLv(t); return lv>=u.max ? null : Math.round(u.c0 * Math.pow(UPG_GROWTH, lv)); }
// ステージ報酬EXP（初回は多め・再挑戦は少額。ステージが進むほど増える）
// ★1-2面クリアで計約1500EXP＝クッキータンク(1000)＋少し強化 の塩梅
function stageExp(s, first){ const n=s.id; return first ? Math.round(600 + n*100) : Math.round(120 + n*20); }

/* ============================================================
   キャラのレベル（EXPで個別に強化＝HP/攻撃アップ）。にゃんこの「にゃんこ強化」に相当。
   ・save.lv[key]=レベル(1〜CHAR_LV_MAX)。1レベルごとにHPと攻撃が CHAR_LV_STEP ずつ上がる。
   ・レベルUPのEXPコストは基礎(出撃コスト由来)×1.35^(lv-1) で逓増。数値/性能は詳細ダイアログで確認。
   ============================================================ */
const CHAR_LV_MAX = 20;      // 最大レベル
const CHAR_LV_STEP = 0.08;   // 1レベルごとのHP/攻撃の上昇率（+8%）
function charLv(k){ return (save.lv && save.lv[k]) || 1; }
function charLvMul(k){ return 1 + (charLv(k)-1)*CHAR_LV_STEP; }                 // HP/攻撃の倍率
function charLvCost(k){ const lv=charLv(k); if(lv>=CHAR_LV_MAX) return null;    // 次のレベルに必要なEXP（MAXならnull）
  const base = 25 + Math.round((DEFS[k]?DEFS[k].cost:60)*0.3);                  // 出撃コストが高いキャラほど強化も重い
  return Math.round(base * Math.pow(1.35, lv-1)); }
function levelUpChar(k){
  if(!isUnlocked(k)) return false;
  const cost=charLvCost(k); if(cost==null) return false;        // MAX
  if((save.exp||0)<cost) return false;                          // EXP不足
  save.exp-=cost; if(!save.lv) save.lv={}; save.lv[k]=charLv(k)+1; saveGame(); return true;
}

   ============================================================ */
const STARTERS = ['cookie'];           // 最初から使えるのはクッキー1体だけ（にゃんこ風）

/* ============================================================
   ステージ＝50面ルート（プロシージャル生成）。設計方針は NYANKO_NOTES.md 参照。
   ・敵は「基本湧き(軽め・同時数ソフト上限で泥沼化しない)」＋「城HP割合で発火するイベント(大群/ボス)」。
   ・自爆(m_puff)は序盤に出さず中盤(18面〜)から。10面ごとにボス面。
   ============================================================ */
const STAGE_COUNT = 50;
// 基本湧きに使う敵プール（ステージnで解禁される敵。自爆は中盤から）
function basePool(n){
  // 立ち絵に置き換え済み：雑魚=m_bump／壁=m_thorn／超硬=m_armor／大型=m_legs。
  // 射手m_phage・自爆m_puffは手描きのまま据え置き（立ち絵が届いたら差し替え）。
  const p=['m_bump','m_bump'];                 // 雑魚（旧m_swarm 引退→立ち絵）
  if(n>=4)  p.push('m_thorn');                 // 壁（旧m_tank 引退→立ち絵）
  if(n>=8)  p.push('m_phage');                 // 射手（手描き据え置き）
  if(n>=9)  p.push('m_armor');                 // 装甲の重壁（旧m_big の超硬枠→立ち絵）
  if(n>=13) { p.push('m_armor'); p.push('m_thorn'); }
  if(n>=17) p.push('m_legs');                  // 足長の大型ブルーザー（エリート）

/* --- WAVE（敵タワーの複数ゲージ）を生成 ---
   ・1ステージ＝複数ゲージ。1本削るごとに次WAVEへ。最後を削り切ると勝ち。
   ・type: normal=切替時に敵バースト / break=難易度UP（湧き速い・タワー攻撃・強敵・制限時間つき）。
   ・基本「…通常→（後半にもう1本ブレイク）→最後ブレイク」。制限時間内に割れないと大技（味方スタン）。
   ・ボス/中ボスは最後のブレイクに配置。 */
function makeWaves(n, boss, mini, total){
  let cnt = Math.max(2, Math.min(5, 2 + Math.floor(n/6)));   // 後半ほどゲージ数↑（2〜5）
  if(boss) cnt = Math.max(cnt, 4);
  const waves=[];
  for(let i=0;i<cnt;i++){
    const isLast = i===cnt-1;
    const isMid  = (cnt>=4 && i===cnt-2);                    // 最後の1つ手前にもブレイク
    waves.push({ idx:i, type:(isLast||isMid)?'break':'normal', final:isLast });
  }
  const wt=waves.map(w=>w.type==='break'?1.4:1); const wsum=wt.reduce((a,b)=>a+b,0);
  waves.forEach((w,i)=>{
    w.hp = Math.max(220, Math.round(total*wt[i]/wsum));      // HP配分（ブレイクは厚め）
    w.burst = (w.type==='break') ? 4+Math.floor(n/4) : 3+Math.floor(n/7);   // 切替時の入場バースト数
    if(w.type==='break') w.limit = Math.round(16 + n*0.5);  // ブレイクの制限時間(秒)
    w.tower = (w.type==='break');                           // ブレイク中はタワーが手前を攻撃
  });
  if(boss)      waves[cnt-1].boss = { key:'m_boss',  hp:Math.round(2600+n*420), atk:Math.round(52+n*5.2), sMul:1.14, trait:'red' };
  else if(mini) waves[cnt-1].mini = { key:'m_gboss', hp:Math.round(1500+n*280), atk:Math.round(32+n*3.4), sMul:1.0,  trait:'green' };
  return waves;
}

}

/* ============================================================

   ・敵は trait（色）を持つと体がその色に塗り替わる。plain＝無属性（塗り替えなし・倍率に関与しない）。
   ・味方は strongVs（対〇色）を持つと、その色の敵に EFFECT_MUL 倍ダメージ（有利ボーナスのみ・減衰なし）。
   ・無属性(plain)どうしは倍率なし＝序盤の雑魚は相性を気にしなくてよい。色つきは主にボス。
   ・色を増やすときは TRAITS に1行足すだけ。敵に trait / 味方に strongVs を付けるだけで機能する。
   ============================================================ */
const TRAITS = {
  plain:  { name:'プレーン', tint:null },                       // 無属性（白/ベージュ/黄の見た目・倍率なし）
  green:  { name:'みどり',   tint:'#5fbf5f', dark:'#357a35' },  // 毒など
  red:    { name:'あか',     tint:'#ff5a4a', dark:'#a3322a' },  // 強個体・ボス
  blue:   { name:'あお',     tint:'#4aa3ff', dark:'#2a5fa8' },
  black:  { name:'くろ',     tint:'#3a3340', dark:'#17141c' },  // 強化された雑魚/ボス
  yellow: { name:'きいろ',   tint:'#ffd23f', dark:'#b8901a' },

const EFFECT_MUL = 1.6;                                          // 「ばつぐん！」＝有効時のダメージ倍率
function traitOf(u){ return (u && (u.trait || (u.U && u.U.trait))) || 'plain'; }
function traitTint(u){ const t=TRAITS[traitOf(u)]; return (t && t.tint) ? {col:t.tint, dk:t.dark||t.tint} : null; }
// 味方(strongVs)が 相手の色(targetTrait) に有効か。plain（無属性）は常に非有利＝倍率に関与しない。
function isEffective(strongVs, targetTrait){ return !!(strongVs && strongVs.length && targetTrait && targetTrait!=='plain' && strongVs.indexOf(targetTrait)>=0); }
function effHitMul(attacker, target){ return isEffective(attacker && attacker.U && attacker.U.strongVs, traitOf(target)) ? EFFECT_MUL : 1; }
// カード用バッジ：味方が「対〇色に強い」ならその色ドットを表示（無ければ空）
function attrBadgeHTML(key){ const sv=DEFS[key] && DEFS[key].strongVs; if(!sv || !sv.length) return '';
  const dots=sv.map(t=>{ const c=TRAITS[t]&&TRAITS[t].tint; return c?'<i style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+c+';border:1px solid #0006"></i>':''; }).join('');
  return '<span class="abadge" title="この色の敵に強い">'+dots+'</span>'; }

    if(o.dead || o===u) continue;
    if(sameSide ? o.side!==u.side : o.side===u.side) continue;
    const ahead = u.dir>0 ? o.x>u.x : o.x<u.x;   // 進む向きの先にいるか
    if(!ahead) continue;
    const g = Math.abs(o.x-u.x);
    if(g<bg){ bg=g; best=o; }
  }
  return best ? {o:best, gap:bg} : null;
}
// テスト互換：一番近い敵（前後問わず）
function nearestEnemy(u){
  let best=null,bd=1e9;
  for(const o of world.units){ if(o.side===u.side||o.dead) continue; const d=Math.abs(o.x-u.x); if(d<bd){bd=d;best=o;} }
  return best?{o:best,d:bd}:null;
}

/* --- ダメージ適用（装甲＝被ダメ軽減／HPしきい値ノックバックをここで一本化） ---
   にゃんこ式KB：最大HPを kbCount で等分し、HPがしきい値を下回るたびに後ろへ1回ふっとぶ。 */
const KB_HPDIST = 52;      // HPしきい値KBで後退する距離（スタッガー）
const KB_STAGGER_CD = 0.6; // スタッガー後のクールダウン（この間は再スタッガーしない）＝壁際で連続ノックバックにハメられて動けなくなるのを防ぐ
function hurt(o, dmg){
  const real = dmg * (1 - (o.U.dr||0));
  o.hp -= real;
  if(o.U.counter && o.hp>0) o.counter = (o.counter||0) + real;   // カウンター型：受けた実ダメージを蓄積
  const kc = o.kbCount||0;
  if(kc>1 && o.hp>0){                                  // KB回数1（＝しきい値なし）はスタッガーしない
    const seg = Math.ceil(o.hp / (o.maxHp/kc));       // 残りHPセグメント数
    if(o.kbSeg===undefined) o.kbSeg = kc;
    // しきい値を割った→ふっとぶ。ただしクールダウン中は「攻撃する隙」を確保するためスタッガーしない
    // （大量の敵に囲まれて連続ノックバックで永久に動けなくなる＝ハメ の防止）。
    if(seg < o.kbSeg){ o.kbSeg = seg; if((o.kbCd||0)<=0){ kbBackward(o, KB_HPDIST); o.kbCd = KB_STAGGER_CD; } }
  }
}
// 後ろ（自陣側＝進行方向の逆）へ短くスタッガー（HPしきい値KB＝小さめの後退）
function kbBackward(o, dist){ applyKnock(o, o.x + o.dir*100, dist, {pop:150, time:0.28, tau:0.08}); }

/* --- 分裂：倒れた場所に子ユニット（別の種類）を生む。
   split={key,n} で子の種類と数を指定＝巨大スライム→スライム→チビ の多段チェーン --- */
function splitOnDeath(u){
  const sp = u.U.split; if(!sp) return;
  for(let i=0;i<sp.n;i++){
    const c = newUnit(sp.key, u.side, u.x + (i? 14 : -14), u.y);
    world.units.push(c);
  }
}

/* --- パーティークッキー：ミラーボールで近くの味方の攻撃UP（クッキーはさらにUP） ---
   各ユニットの u.buffMul（攻撃倍率）を毎フレーム再計算する。 */
function updateBuffs(dt){
  for(const u of world.units){
    if(u.U.disco){
      u.discoT -= dt;
      if(u.discoT<=0){ u.discoT = u.U.disco.cd; u.auraT = u.U.disco.dur; SFX_disco(); }
      if(u.auraT>0) u.auraT -= dt;
    }
    u.buffMul = 1;
  }
  for(const a of world.units){
    const dz = a.U.disco; if(!dz || a.dead || !(a.auraT>0)) continue;
    for(const o of world.units){
      if(o.dead || o.side!==a.side) continue;
      if(Math.abs(o.x-a.x) <= dz.r){
        const m = (o.key==='cookie'||o.key==='partycookie') ? dz.cookieMul : dz.mul;
        if(m > o.buffMul) o.buffMul = m;
      }
    }
  }
}

/* --- ドーナッツの送風：正面（進行方向の先）の敵を吹き飛ばす --- */
/* --- 風のエフェクト（前方へ流れる粒）＝ドーナッツのふっとばし攻撃時 --- */
function windFx(u){
  for(let i=0;i<8;i++){ const spd=120+Math.random()*160;
    world.parts.push({x:u.x, y:u.y-20-Math.random()*30, vx:u.dir*spd, vy:(Math.random()-0.5)*40, life:0.4, max:0.4, c:'#cfe8ff', r:2+Math.random()*2}); }
  SFX_blow();
}

/* --- 大福の居合の斬撃エフェクト --- */
function slashFx(u){
  for(let i=0;i<12;i++){ const a=Math.random()*6.28, s=60+Math.random()*160;
    world.parts.push({x:u.x, y:u.y-18, vx:Math.cos(a)*s, vy:Math.sin(a)*s-40, life:0.35, max:0.35, c:'#fff2c4', r:2+Math.random()*3}); }
}

/* --- 爆発（bomber） --- */
function explode(x, y, side, blast, blastR){
  for(const o of world.units){
    if(o.side===side || o.dead) continue;
    const d = Math.hypot(o.x-x, o.y-y);
    if(d<=blastR){ hurt(o, blast*(1 - 0.5*(d/blastR))); }
  }
  if(side==='p' && x<=blastR+CONF.castleAtkRange) ehp -= blast;              // 敵城=左
  if(side==='e' && (CONF.W-x)<=blastR+CONF.castleAtkRange) php -= blast;     // 味方城=右
  const c = side==='e' ? '#b6e06a' : '#ffd23f';   // カビ=緑の胞子 / お菓子=金
  for(let i=0;i<14;i++){ const a=Math.random()*6.28, s=40+Math.random()*120;
    world.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-30,life:0.5,max:0.5,c,r:3+Math.random()*3}); }
  SFX_boom();
}

/* --- 弾（射手） --- */
function fireShot(u, target){
  if(u.U.arc){
    // シューの矢：山なりの弧を描いて着弾（大きめ）
    const x0=u.x + u.dir*8, y0=u.y-34, tx=target.x, ty=target.y-14;
    const dist=Math.abs(tx-x0);
    world.shots.push({ lob:true, side:u.side, dmg:u.atk*(u.buffMul||1), strongVs:u.U.strongVs, r:18, tid:target.id,
      x:x0, y:y0, x0, y0, tx, ty, t:0, dur:Math.max(0.4, dist/360), arcH:70+dist*0.35, ang:0, arrow:true });
  }else{
    world.shots.push({ x:u.x, y:u.y-16, side:u.side, dmg:u.atk, strongVs:u.U.strongVs, sp:320, r:12,
      tid:target.id, tx:target.x, ty:target.y-16, ang:0, ice: u.key==='icewiz', slow:u.U.slowHit });
  }
}

/* --- 1フレーム進める --- */
function step(dt){
  elapsed += dt;
  money = Math.min(effCap(), money + effRate()*dt);
  for(const k of ORDER) if(cd[k]>0) cd[k]=Math.max(0, cd[k]-dt);
  if(towerCd>0) towerCd = Math.max(0, towerCd-dt);
  if(world.shake>0) world.shake = Math.max(0, world.shake - dt*40);   // 画面揺れの減衰
  if(world.beam){ world.beam.t += dt; if(world.beam.t >= world.beam.dur) world.beam=null; }

  // 敵の基本湧き（軽め・同時数ソフト上限で泥沼化を防ぐ／ブレイクWAVE中は速い）
  enemyCd -= dt;
  if(enemyCd<=0){
    const S=curStage, cap = S ? (S.baseCap||14) : 14;
    if(world.units.filter(u=>u.side==='e').length < cap) enemySpawn();
    enemyCd = (S ? S.baseCd : 3.0) * (world.waveType==='break' ? 0.6 : 1);
  }
  updateBreak(dt);      // ブレイクWAVE：タワーの手前攻撃＋制限時間ペナルティ

  updateBuffs(dt);   // パーティークッキーのミラーボール→味方の攻撃バフ(u.buffMul)を先に計算

  for(const u of world.units){
    if(u.dead) continue;
    u.bob += dt*10;
    if(u.atkAnim>0) u.atkAnim -= dt;
    if(u.slowT>0) u.slowT -= dt;   // 鈍足の残り時間
    if(u.kbCd>0) u.kbCd -= dt;     // スタッガーのクールダウン（連続ノックバックのハメ防止）
    // 吹き飛び中：弧を描いて後ろへ飛ぶ（この間はAIしない）
    if(u.kbT>0){
      u.kbT -= dt;
      u.kbVX -= u.kbVX*Math.min(1, dt/KB_TAU);          // 水平は減衰
      u.x += u.kbVX*dt;
      u.kbVY += KB_GRAV*dt; u.kbY += u.kbVY*dt;          // 上下は放物線
      if(u.kbY>=0){ u.kbY=0; if(u.kbVY>140){ u.kbVY=-u.kbVY*0.35; } else { u.kbVY=0; } }  // 着地バウンド
      // 画面内に留めるだけの小さいクランプ（castleAtkRangeで留めると、城際の敵が前へワープして
      // 攻撃中の味方をすり抜け後ろへ回り込むバグになる）。城の手前まではノックバックしてよい。
      u.x = Math.max(10, Math.min(CONF.W-10, u.x));
      continue;
    }
    if(u.stunT>0){ u.stunT-=dt; u.moving=false; continue; }   // スタン中（ブレイクの大技）は行動不能
    const D = u.U;
    const fe = frontUnit(u,false);          // 前方の敵
    const castleX = u.side==='p' ? 0 : CONF.W;   // 攻撃対象は相手の城（味方=左の敵城 / 敵=右の味方城）
    const castleGap = Math.abs(castleX - u.x);
    const enemyInRange  = fe && fe.gap <= u.range;
    // 前方に「城より手前の敵」がいる間は城を殴らない＝城に張り付いたまま、後ろ(城側)に湧いた敵を
    // 無視してしまう不具合を防ぐ。敵が城より手前なら足を止めず踏み込んで倒しにいく。
    const feNearer = fe && fe.gap < castleGap;
    const castleInRange = !feNearer && castleGap <= Math.max(u.range, CONF.castleAtkRange);

    // 導火中（bomber）
    if(u.fuseT>=0){
      u.fuseT -= dt;
      if(u.fuseT<=0){ explode(u.x,u.y,u.side,D.blast,D.blastR); u.dead=true; }
      continue;
    }
    // 自爆準備
    if(D.role==='bomber' && (enemyInRange || castleInRange)){ u.fuseT=0.28; continue; }

    // 大福の居合：納刀→(windup)少し抜刀→突撃→鋭い切り付け。初撃だけ大ダメージ（範囲）
    if(u.charging){
      u.chargeT += dt;
      const windup = u.chargeT < D.charge.windup;   // 抜刀のためだけの時間（まだ斬らない）
      if(!windup && (enemyInRange || castleInRange)){
        if(enemyInRange){
          for(const o of world.units){ if(o.side===u.side || o.dead) continue;   // 敵だけに当てる
            if(Math.abs(o.x-u.x) <= D.charge.r){ const eff=isEffective(u.U.strongVs, traitOf(o)); hurt(o, D.charge.dmg*(eff?EFFECT_MUL:1)); if(eff) advFx(o, traitOf(o)); } }
          slashFx(u); world.slashes.push({x:u.x, y:u.y-CONF.rowBand, dir:u.dir, t:0, dur:0.28, reach:D.charge.r});
          if(u.side==='p') world.shake = 5;   // サムライの居合ヒットで軽く画面が揺れる
        }else{ if(u.side==='p') ehp -= D.charge.dmg; else php -= D.charge.dmg; }
        u.charging=false; u.cool=u.cd; u.atkAnim=ATK_ANIM; SFX_hit();
        continue;
      }
    }

    // 攻撃（射程内なら足を止めて攻撃＝前線ができる）
    if(enemyInRange || castleInRange){
      u.moving = false;
      u.cool -= dt;
      if(u.cool<=0){
        u.cool = u.cd; u.atkAnim = ATK_ANIM;
        let dmg = u.atk * (u.buffMul||1);
        // カウンター型：攻撃までに受けたダメージを、上限(atk×COUNTER_CAP=800%)まで上乗せして一撃で返す
        if(D.counter && u.counter>0){ const cb=Math.min(u.counter, u.atk*COUNTER_CAP); u.counter=0; dmg += cb; counterFx(u, cb); }
        const doKB = D.kbHit && (++u.hitCount % D.kbHit.every === 0);
        if(D.role==='ranged' && enemyInRange){ fireShot(u, fe.o); SFX_shot(); }
        else if(enemyInRange){
          if(D.area){   // 範囲攻撃：射程内の前方の敵をまとめて攻撃
            for(const o of world.units){ if(o.side===u.side || o.dead) continue;
              const ah = u.dir>0 ? o.x>u.x : o.x<u.x;
              if(ah && Math.abs(o.x-u.x) <= u.range){ attackHit(u,o,dmg); if(doKB) applyKnock(o, u.x, D.kbHit.dist); } }
            if(doKB){ windFx(u); world.shake = Math.max(world.shake, u.side==='p'?3:0); }
          } else { attackHit(u, fe.o, dmg); if(doKB) applyKnock(fe.o, u.x, D.kbHit.dist); }
          SFX_hit();
        }
        else if(castleInRange){ if(u.side==='p') ehp -= dmg; else php -= dmg; SFX_hit(); }
      }
      continue;
    }

    // 前進：味方どうしは重なってOK（にゃんこ風に前線で団子になる）。敵の手前でだけ止まる。
    u.moving = true;
    // 居合：抜刀の溜め中(windup)はゆっくり／抜刀後は一気に加速して突撃。鈍足中は減速
    const windup = u.charging && u.chargeT < D.charge.windup;
    const slowF = u.slowT>0 ? (u.slowMul||1) : 1;
    const sp = (u.charging ? u.speed*(windup ? 0.30 : D.charge.spd) : u.speed) * slowF;
    let nx = u.x + u.dir*sp*dt;
    // 停止位置：前方に敵がいればその敵の射程手前まで踏み込む（城に張り付いた敵の後ろに湧いた敵も追える）。
    // 敵がいなければ城の攻撃距離(castleAtkRange)で足を止めて城を殴る。どちらも城本体(castleBodyR)へはめり込まない。
    if(u.side==='p'){            // 左へ進む・敵城は左(0)
      nx = fe ? Math.max(nx, fe.o.x + u.range) : Math.max(nx, CONF.castleAtkRange);
      nx = Math.max(nx, CONF.castleBodyR);
    }else{                        // 右へ進む・味方城は右(W)
      nx = fe ? Math.min(nx, fe.o.x - u.range) : Math.min(nx, CONF.W - CONF.castleAtkRange);
      nx = Math.min(nx, CONF.W - CONF.castleBodyR);
    }
    u.x = nx;
  }

  // 対面ユニットのすり抜け防止：味方は敵の右、敵は味方の左（前線を保つ）。
  // ノックバックで弾かれたり、速い/遅いの差で入れ替わって「敵が後ろに回り込む／味方が後ろに下がる」のを防ぐ。
  // 吹き飛び中(kbT>0＝宙に浮いている)と当たり判定なし(noCollide/untargetable)は対象外。
  const COLLIDE_W = 24;
  for(const a of world.units){
    if(a.side!=='p' || a.dead || a.kbT>0 || a.U.noCollide || a.U.untargetable) continue;
    for(const b of world.units){
      if(b.side!=='e' || b.dead || b.kbT>0 || b.U.noCollide || b.U.untargetable) continue;
      if(a.x < b.x && (b.x - a.x) < COLLIDE_W){        // 入れ替わり（味方が敵の左＝すり抜けた）→押し戻す
        const mid=(a.x+b.x)/2;
        a.x = Math.min(CONF.W - CONF.castleBodyR, mid + COLLIDE_W/2);   // 味方を右（自陣側）へ
        b.x = Math.max(CONF.castleBodyR, mid - COLLIDE_W/2);            // 敵を左（自陣側）へ
      }
    }
  }

  // 弾の移動
  for(const s of world.shots){
    if(s.dead) continue;
    if(s.lob){
      // 山なり：発射時に決めた着弾点へ放物線で飛ぶ
      s.t += dt; const p = Math.min(1, s.t/s.dur);
      const nx = s.x0 + (s.tx-s.x0)*p;
      const ny = s.y0 + (s.ty-s.y0)*p - s.arcH*Math.sin(p*Math.PI);
      s.ang = Math.atan2(ny-s.y, nx-s.x); s.x=nx; s.y=ny;
      if(p>=1){
        let t = world.units.find(u=>u.id===s.tid && !u.dead);
        if(!t){ let bd=44; for(const o of world.units){ if(o.side===s.side||o.dead) continue; const dd=Math.hypot(o.x-s.x,o.y-s.y); if(dd<bd){bd=dd;t=o;} } }
        if(t){ const eff=isEffective(s.strongVs, traitOf(t)); hurt(t, s.dmg*(eff?EFFECT_MUL:1)); if(eff) advFx(t, traitOf(t)); if(s.slow && !t.dead){ t.slowT=s.slow.dur; t.slowMul=s.slow.mul; } }
        s.dead=true;
      }
      continue;
    }
    const t = world.units.find(u=>u.id===s.tid && !u.dead);
    if(t){ s.tx=t.x; s.ty=t.y-16; }
    const dx=s.tx-s.x, dy=s.ty-s.y, d=Math.hypot(dx,dy)||1;
    s.ang = Math.atan2(dy,dx);
    if(d < s.sp*dt + s.r){ if(t){ const eff=isEffective(s.strongVs, traitOf(t)); hurt(t, s.dmg*(eff?EFFECT_MUL:1)); if(eff) advFx(t, traitOf(t)); if(s.slow && !t.dead){ t.slowT=s.slow.dur; t.slowMul=s.slow.mul; } } s.dead=true; }
    else{ s.x += dx/d*s.sp*dt; s.y += dy/d*s.sp*dt; }
  }

  for(const u of world.units){ if(!u.dead && u.hp<=0){ u.dead=true; deathBurst(u); splitOnDeath(u); } }
  world.units = world.units.filter(u=>!u.dead);
  world.shots = world.shots.filter(s=>!s.dead);

  for(const p of world.parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt; }
  world.parts = world.parts.filter(p=>p.life>0);
  for(const sl of world.slashes){ sl.t += dt; }
  world.slashes = world.slashes.filter(sl=>sl.t < sl.dur);
  for(const pp of world.pops){ pp.t += dt; pp.y -= 34*dt; }   // フロートテキストは上へ
  world.pops = world.pops.filter(pp=>pp.t < pp.dur);

  if(ehp<=0){
    if(curStage && curStage.waves && curWave < curStage.waves.length-1) advanceWave();   // ゲージ削り切り→次WAVE
    else { running=false; win(true); }                                                    // 最後のゲージ＝勝ち
  }
  else if(php<=0){ running=false; win(false); }
}

function deathBurst(u){
  for(let i=0;i<6;i++){ const a=Math.random()*6.28, s=20+Math.random()*70;
    world.parts.push({x:u.x,y:u.y-10,vx:Math.cos(a)*s,vy:-Math.random()*80,life:0.4,max:0.4,
      c:u.side==='p'?'#8fd0ff':'#b6e06a', r:2+Math.random()*2}); }
}

/* --- 敵の出撃AI（時間経過で強い編成も混ざる） --- */
function enemySpawn(){
  const pool = (curStage && curStage.pool) || ['m_swarm'];
  spawn(pool[(Math.random()*pool.length)|0], 'e');
}
/* --- WAVE制（敵タワーの複数ゲージ） --- */
const TOWER_ATK_CD = 2.6;   // ブレイク中のタワー攻撃の間隔(秒)
// 次のWAVEへ（ゲージを削り切ったとき）：味方全体ノックバック＋入場バースト＋（最後は）ボス
function advanceWave(){
  curWave++;
  const w = curStage.waves[curWave];
  foeMaxHP = w.hp; ehp = w.hp;
  world.waveType = w.type;
  world.breakTimer = (w.type==='break') ? (w.limit||0) : 0;
  world.breakPenalized = false;
  world.towerAtkCd = TOWER_ATK_CD;
  knockAllAllies();                                        // WAVE切替＝味方全体を必ずノックバック
  spawnWaveBurst(w);                                       // 入場バースト（多め／ブレイクはさらに多い）
  if(w.boss) spawnBoss(w.boss);
  if(w.mini) spawnBoss(w.mini);
  showEventBanner(w.type==='break' ? (w.final?'⚡ 最終ブレイク！':'⚡ ブレイクWAVE！') : ('WAVE '+(curWave+1)+'！'));
  world.shake = Math.max(world.shake, 8);
}
// WAVE切替時の入場バースト（敵城側から一気に湧く）。ブレイクは重めの敵を混ぜる。
function spawnWaveBurst(w){
  const pool=(curStage&&curStage.pool)||['m_bump'];
  const n=w.burst||0;
  for(let i=0;i<n;i++){
    if(world.units.filter(u=>u.side==='e').length>=CONF.maxUnitsPerSide) break;
    let key=pool[(Math.random()*pool.length)|0];
    if(w.type==='break' && Math.random()<0.5) key=heavyKey(curStage.id);   // ブレイクは重め
    const y=CONF.groundY - Math.random()*CONF.rowBand;
    const u=newUnit(key,'e', CONF.spawnInset + Math.random()*60, y); u.fromEvent=true;
    world.units.push(u);
  }
  world.shake=Math.max(world.shake,4);
}
// ブレイクWAVE：敵タワーが手前の味方を攻撃＋制限時間オーバーで大技（味方スタン）
function updateBreak(dt){
  if(world.waveType!=='break') return;
  const w = curStage && curStage.waves && curStage.waves[curWave];
  if(w && w.tower){ world.towerAtkCd-=dt; if(world.towerAtkCd<=0){ towerAttack(); world.towerAtkCd=TOWER_ATK_CD; } }
  if(world.breakTimer>0){ world.breakTimer-=dt; if(world.breakTimer<=0 && !world.breakPenalized) breakPenalty(); }
}
// 敵タワー（左・x=0）から最前(最左)の味方へ弾を撃つ
function towerAttack(){
  let t=null, best=1e9;
  for(const u of world.units){ if(u.side!=='p'||u.dead) continue; if(u.x<best){best=u.x;t=u;} }
  if(!t) return;
  const dmg = 22 + (curStage?curStage.id:1)*2;
  world.shots.push({ x:CONF.castleBodyR, y:CONF.groundY-42, side:'e', dmg, sp:300, r:14,
    tid:t.id, tx:t.x, ty:t.y-16, ang:0, tower:true });
  SFX_shot();
}
// 制限時間オーバーの大技＝味方全員スタン（一定時間 行動不能）
function breakPenalty(){
  world.breakPenalized=true;
  for(const u of world.units){ if(u.side==='p'&&!u.dead) u.stunT=Math.max(u.stunT||0, 2.5); }
  showEventBanner('⚡ 敵の大技！ 味方スタン！');
  world.shake=Math.max(world.shake,12); world.stunFlashT=0.6;
}
function spawnWave(key, n){
  for(let i=0;i<n;i++){
    if(world.units.filter(u=>u.side==='e').length >= CONF.maxUnitsPerSide) break;
    const y=CONF.groundY - Math.random()*CONF.rowBand;
    const u=newUnit(key,'e', CONF.spawnInset + Math.random()*50, y); u.fromEvent=true;
    world.units.push(u);
  }
  // 増援は「城に張り付いた味方」を少し後ろへ剥がして、湧いた増援が前で防衛できるようにする
  // （張り付き組が城の手前(x<40)に踏み込むと、後ろに湧いた増援を無視して城を殴り続ける不具合の対策）
  knockAllAllies({maxX: CONF.spawnInset + 140, dist: CONF.waveKnock});
  world.shake = Math.max(world.shake, 4);
}
function spawnBoss(cfg){
  cfg=cfg||{};
  const u=newUnit(cfg.key||'m_boss','e', CONF.spawnInset+12, CONF.groundY-2);   // cfg.key で立ち絵ボス（緑中ボス等）に差し替え可
  if(cfg.hp){ u.hp=cfg.hp; u.maxHp=cfg.hp; }
  if(cfg.atk) u.atk=cfg.atk;
  if(cfg.sMul) u.sMul=cfg.sMul;
  if(cfg.trait) u.trait=cfg.trait;                 // 色トレイト（緑=中ボス/赤=大ボス）＝体色に反映＋対〇色の有利判定に使う
  u.kbCount=3; u.kbSeg=undefined;            // ボスは滅多にひるまず前進する
  u.boss=true; u.fromEvent=true;
  world.units.push(u);
  world.shake = 8;
  knockAllAllies();                          // ボス登場の衝撃波＝味方全員を自陣へ吹き飛ばし、城への張り付きをはがす
}
// 味方を自陣側（敵城の逆＝右）へ強制ノックバック＝城に張り付いた組をはがす。
// opt.maxX＝このx未満（敵城寄り）の味方だけ対象（増援wave用に「張り付き組だけ」剥がす）。省略で全員（ボス用）。
function knockAllAllies(opt){
  opt = opt||{};
  const maxX = (opt.maxX!=null) ? opt.maxX : Infinity;
  const dist = (opt.dist!=null) ? opt.dist : CONF.bossKnock;
  for(const u of world.units){
    if(u.side!=='p' || u.dead) continue;
    if(u.fuseT>=0) continue;                 // 導火中の自爆はそのまま（触らない）
    if(u.x > maxX) continue;                 // 城際の張り付き組だけ（wave時）
    applyKnock(u, 0, dist, {pop:300, time:0.6});   // 敵城(x=0)から遠ざかる＝右へ吹き飛ぶ
    u.charging=false;                        // 大福の突撃などはリセット（宙に浮くので）
  }
  world.shake = Math.max(world.shake, 8);
}
function showEventBanner(msg){ showHint('⚠ '+msg); }

/* --- プレイヤー出撃 --- */
function deploy(key){
  if(!running) return;
  const D = DEFS[key];
  if(cd[key]>0 || money < D.cost) return;
  money -= D.cost; cd[key]=D.rc;
  spawn(key,'p'); SFX_deploy(); hideHint();
}

/* --- お財布レベルアップ --- */
function upgradeWallet(){
  if(!running || walletLv>=walletMaxLv()) return;
  const c = walletCost();
  if(money < c) return;
  money -= c; walletLv++; SFX_deploy();
}

/* --- タワー攻撃スキル（右下）：自分の城（右）から一撃。敵全体にダメージ＋左へ押し戻す --- */
function castTower(){
  if(!running || towerCd>0) return;
  towerCd = CONF.towerCd;
  const pow = upgVal('tPow');                 // 威力（メタ強化）
  const minX = CONF.W - upgVal('tRng');       // 自城(右)から射程ぶん左まで届く
  for(const o of world.units){
    if(o.side!=='e' || o.dead || o.x < minX) continue;   // 射程外はスルー
    hurt(o, pow);
    applyKnock(o, CONF.W, CONF.towerKB);   // 自城(右)から左へパーンと吹き飛ばす
    for(let i=0;i<4;i++){ const a=Math.random()*6.28, s=30+Math.random()*90;
      world.parts.push({x:o.x,y:o.y-10,vx:Math.cos(a)*s,vy:-Math.random()*90,life:0.4,max:0.4,c:'#ffe9a8',r:2+Math.random()*2}); }
  }
  world.beam = { t:0, dur:0.35, reach:minX };   // 右→左へ走るビーム演出（射程まで）
  SFX_tower();
}

/* ============================================================ 描画 ============================================================ */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

/* --- カメラ：スマホ縦持ちは戦場を画面いっぱいにズーム＋横スクロール（にゃんこ式）。横/PCは全体表示 --- */
const cam = { x:0, zoom:1, oy:0, visW:CONF.W, mobile:false };
const CAM_VISW = 440;      // スマホ縦：一度に見せる世界の横幅（小さいほどズーム大＝ユニットが大きい）
const CAM_GROUND_FRAC = 0.82;  // 地面をキャンバスのこの高さ位置に置く（下寄り＝空を上に広く）
function resizeCanvas(){
  const box=document.getElementById('stage'); if(!box) return;
  const r=box.getBoundingClientRect();
  const dpr=Math.min(window.devicePixelRatio||1, 2);
  const portrait = window.innerHeight > window.innerWidth*1.15;   // 明確に縦長のときだけズーム
  if(portrait && r.width>2 && r.height>2){
    cv.width=Math.round(r.width*dpr); cv.height=Math.round(r.height*dpr);
    cam.visW=Math.min(CONF.W, CAM_VISW);       // 見える世界の横幅（<Wなら横スクロール）
    cam.zoom=cv.width/cam.visW;                // 横幅にフィット＝ユニットが見やすい大きさ
    cam.oy=cv.height*CAM_GROUND_FRAC - CONF.groundY*cam.zoom;   // 地面を下寄りに固定（空は上に広く）
    cam.mobile=true;
  }else{
    cv.width=CONF.W; cv.height=CONF.H; cam.zoom=1; cam.x=0; cam.oy=0; cam.visW=CONF.W; cam.mobile=false;
  }
  ctx.imageSmoothingEnabled=false;
}
function updateCamera(){
  if(!cam.mobile){ cam.x=0; return; }
  const maxX=Math.max(0, CONF.W-cam.visW);
  let pMin=Infinity, eMax=-Infinity, np=0, ne=0;
  for(const u of world.units){ if(u.dead) continue;
    if(u.side==='p'){ np++; if(u.x<pMin)pMin=u.x; } else { ne++; if(u.x>eMax)eMax=u.x; } }
  let target;
  if(np) target=pMin;                          // 最前線の味方ユニットを映す（先頭＝戦線。中央へ飛ばず自陣から前線へ追従）
  else if(ne) target=eMax;                      // 味方がいなければ最前の敵（自陣に迫る脅威）
  else target=CONF.W-cam.visW/2;               // 開幕は自陣(右)寄り
  const want=Math.max(0, Math.min(maxX, target-cam.visW/2));
  cam.x += (want-cam.x)*0.1;                    // なめらか追従
  if(Math.abs(want-cam.x)<0.5) cam.x=want;
}

function drawCastle(x, side){
  const g = CONF.groundY;
  ctx.save(); ctx.translate(x,0);
  const col = side==='p' ? '#3b7bd6' : '#6f8f52';   // 味方=青／敵=カビ緑
  const col2= side==='p' ? '#2a5aa8' : '#465a2f';
  ctx.fillStyle=col2; ctx.fillRect(-26,g-70,52,70);
  ctx.fillStyle=col;  ctx.fillRect(-22,g-64,44,64);
  ctx.fillStyle=col2; ctx.beginPath(); ctx.moveTo(-30,g-64); ctx.lineTo(0,g-92); ctx.lineTo(30,g-64); ctx.closePath(); ctx.fill();
  ctx.fillStyle = side==='p' ? '#ffe9a8' : '#c8e29a'; ctx.fillRect(-8,g-44,16,18);
  if(side==='e'){   // 敵城にカビの斑点
    ctx.fillStyle='#2f3d22';
    for(const [sx,sy,r] of [[-12,-52,4],[8,-40,3],[-4,-24,3.5],[14,-58,3]]){ ctx.beginPath(); ctx.arc(sx,sy,r,0,6.283); ctx.fill(); }
  }
  ctx.restore();
}

/* アニメ：状態に応じてフレームのスプライトキーを返す（SUGAR WARSのフレームを転用） */
function hopPhase(u, fps){ let p=(elapsed*fps + u.x*0.03)%1; return p<0?p+1:p; }
function animFrame(u){
  const D=u.U, team = u.side==='p'?'blue':'red', A=D.anim;
  if(!A) return D.spr+'_'+team;
  if(u.atkAnim>0 && A.atk) return A.atk+'_'+team;                 // 攻撃ポーズ（構えなど）
  if(u.moving && A.walk && A.walk.length){                        // 歩行フレーム
    const i = Math.floor(elapsed*(A.fps||6) + u.x*0.05) % A.walk.length;
    return A.walk[i]+'_'+team;
  }
  return (A.idle || D.spr)+'_'+team;                              // 待機
}

/* --- 武器合成キャラの描画（本家 index.html の合成ロジックを移植）---
   本家は「左向き＝前方」が基準でミラーせず、本体中心(cx,cy)に武器を重ねる。
   nyankoの味方も左向きなのでそのまま流用できる（cy=本体中心＝footY-S/2）。 */
function drawGearUnit(u, S, cx, footY, team){
  const D = u.U;
  const cy = footY - S*0.5;                       // 本体の中心（本家の基準）
  const bob = u.moving ? Math.sin(u.bob)*S*0.02 : 0;
  let bodyKey = D.body + '_' + team;
  if(D.bodyWalk && u.moving){ const i=Math.floor(elapsed*(D.bodyFps||6)+u.x*0.05)%D.bodyWalk.length; bodyKey=D.bodyWalk[i]+'_'+team; }
  const im = SPRITES[bodyKey] || SPRITES[D.spr+'_'+team];
  const windup = u.charging && u.chargeT < (D.charge?D.charge.windup:0);
  // 突撃ダッシュの残像（後方＝進行方向の逆へ）
  if(u.charging && !windup && im && im.complete && im.naturalWidth){
    for(let k=1;k<=3;k++){ ctx.save(); ctx.globalAlpha=0.12*(4-k);
      ctx.drawImage(im, cx - u.dir*k*13 - S/2, cy-S/2, S, S); ctx.restore(); }
  }
  const cyb = cy + bob;
  if(im && im.complete && im.naturalWidth){ ctx.imageSmoothingEnabled=false; ctx.drawImage(im, cx-S/2, cyb-S/2, S, S); }
  else if(CANDY_IMG && CANDY_IMG.complete && CANDY_IMG.naturalWidth){ ctx.imageSmoothingEnabled=false; ctx.drawImage(CANDY_IMG, cx-S/2, cyb-S/2, S, S); }
  else { ctx.font=(S*0.7)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillText('🍬', cx, footY-6); }
  if(D.gear==='spear')   drawCookieSpear(u,S,cx,cyb);
  if(D.gear==='sword')   drawChocoGear(u,S,cx,cyb);
  if(D.gear==='katana')  drawDaifukuWeapon(u,S,cx,cyb);
  if(D.gear==='cknight') drawCookieSword(u,S,cx,cyb);
  if(D.gear==='lance')   drawCookieLance(u,S,cx,cyb);
  if(D.gear==='ctank')   drawCookieTank(u,S,cx,cyb);
  if(D.gear==='axe')     drawCookieAxe(u,S,cx,cyb);
  if(D.gear==='knight')  drawChocoKnight(u,S,cx,cyb);
}
// クッキーの槍（本家 drawCookieSpear 移植）。待機=上向き／移動=左に倒す／攻撃=左へ突き出す
const SP_PIVX=0.5, SP_PIVY=0.72;
function drawCookieSpear(u, S, cx, cy){
  const sp = SPRITES['cookie_spear_'+(u.side==='p'?'blue':'red')];
  if(!sp || !sp.complete || !sp.naturalWidth) return;
  const handX=cx+S*0.24, handY=cy-S*0.02;
  const spH=S*1.05, spW=spH*(sp.naturalWidth/sp.naturalHeight);
  let ang, px=handX, py=handY;
  if(u.atkAnim>0){ const a=1-u.atkAnim/ATK_ANIM, j=Math.sin(a*Math.PI); ang=-1.65; px=handX - j*S*0.34; py=handY + S*0.06; }
  else { ang=-1.15; py=handY + S*0.04; }   // 常に前へ倒して構える（上に戻さない＝せわしなくしない）
  ctx.save(); ctx.translate(px,py); ctx.rotate(ang); ctx.imageSmoothingEnabled=false;
  ctx.drawImage(sp, -SP_PIVX*spW, -SP_PIVY*spH, spW, spH); ctx.restore();
}
// クッキーランスの槍。槍を水平に構え（穂先＝左＝敵へ）、攻撃＝そのまま前へ突き刺す（振り下ろさない）
function drawCookieLance(u, S, cx, cy){
  const sp = SPRITES['clance_spear_'+(u.side==='p'?'blue':'red')] || SPRITES['clance_spear_blue'];
  if(!sp || !sp.complete || !sp.naturalWidth) return;
  const spH=S*1.18, spW=spH*(sp.naturalWidth/sp.naturalHeight);
  const ang = -Math.PI/2 - 0.06;                              // ほぼ水平（穂先が左＝敵側／わずかに上向き）
  let px=cx-S*0.02, py=cy+S*0.10;                             // 待機：脇に構えて敵へ穂先を向ける
  if(u.atkAnim>0){ const a=1-u.atkAnim/ATK_ANIM, j=Math.sin(a*Math.PI);
    px = cx-S*0.02 - j*S*0.40;                                // 水平のまま前方(左＝敵)へ突き刺す→引く
  }
  ctx.save(); ctx.translate(px,py); ctx.rotate(ang); ctx.imageSmoothingEnabled=false;
  ctx.drawImage(sp, -SP_PIVX*spW, -SP_PIVY*spH, spW, spH); ctx.restore();
}
// クッキーウォリアーの斧。待機＝右肩に斜め担ぎ／攻撃＝大きく振りかぶって前方(左＝敵)へ振り下ろす（重い一撃）
const AXE_PIVX=0.06, AXE_PIVY=0.95;   // 柄の握り（斧スプライトの左下）を回転軸に
function drawCookieAxe(u, S, cx, cy){
  const ax = SPRITES['cwarrior_axe_'+(u.side==='p'?'blue':'red')] || SPRITES['cwarrior_axe_blue'];
  if(!ax || !ax.complete || !ax.naturalWidth) return;
  const aH=S*1.22, aW=aH*(ax.naturalWidth/ax.naturalHeight);
  let px=cx+S*0.05, py=cy+S*0.10, th=0.12;                    // 待機：斧を右肩に斜め担ぎ（刃が上・後方）
  if(u.atkAnim>0){ const a=1-u.atkAnim/ATK_ANIM, j=Math.sin(a*Math.PI);
    th = 0.12 - 3.1*j;                                         // 振りかぶって前方(左)へ大きく振り下ろす→戻す
    px = cx+S*0.05 - j*S*0.10;
    py = cy+S*0.10 + j*S*0.04;
  }
  ctx.save(); ctx.translate(px,py); ctx.rotate(th); ctx.imageSmoothingEnabled=false;
  ctx.drawImage(ax, -AXE_PIVX*aW, -AXE_PIVY*aH, aW, aH); ctx.restore();
}
// クッキータンクのチョコ盾。前方(左＝敵)に構え／攻撃＝盾を短く前へ突き出す（シールドバッシュ・突き出しすぎない）
function drawCookieTank(u, S, cx, cy){
  const sh = SPRITES['ctank_shield_'+(u.side==='p'?'blue':'red')] || SPRITES['ctank_shield_blue'];
  if(!sh || !sh.complete || !sh.naturalWidth) return;
  const shH=S*0.80, shW=shH*(sh.naturalWidth/sh.naturalHeight);
  const bob = u.moving ? Math.sin(u.bob*0.6)*S*0.02 : 0;
  let bx=cx-S*0.30, by=cy+S*0.05+bob, pop=1;
  if(u.atkAnim>0){ const a=1-u.atkAnim/ATK_ANIM, j=Math.sin(a*Math.PI);
    bx = cx-S*0.30 - j*S*0.16;                        // シールドバッシュ：前へ短く突き出す（突き出しすぎない）
    by = cy+S*0.05 - j*S*0.02;
    pop = 1 + 0.10*j;                                 // ドンッと当てる衝撃（伸ばさず大きさで表現）
  }
  ctx.save(); ctx.translate(bx, by); ctx.scale(pop,pop); ctx.imageSmoothingEnabled=false;
  ctx.drawImage(sh, -0.5*shW, -0.5*shH, shW, shH); ctx.restore();
}
// クッキーナイトの剣。待機=左手に刀身を立てて構え／攻撃=斬撃エフェクト付きの剣に持ち替えて前方(左=敵)へ横薙ぎ
function drawCookieSword(u, S, cx, cy){
  const rest = SPRITES['cknight_sword_blue'], slash = SPRITES['cknight_slash_blue'];
  if(u.atkAnim>0 && slash && slash.complete && slash.naturalWidth){
    const a = 1 - u.atkAnim/ATK_ANIM;                 // 0→1 で振り抜く
    const w = S*1.20, h = w*(slash.naturalHeight/slash.naturalWidth);
    const hx = cx - S*0.14, hy = cy + S*0.03;         // 左手の位置（前方＝敵側）
    const ang = -0.62 + 1.05*a;                       // 振り上げ→前方へ薙ぐ
    ctx.save(); ctx.translate(hx,hy); ctx.rotate(ang); ctx.imageSmoothingEnabled=false;
    ctx.drawImage(slash, -0.86*w, -0.5*h, w, h);      // 柄＝右端をピボットに刃＋斬撃が左へ伸びる
    ctx.restore();
  } else if(rest && rest.complete && rest.naturalWidth){
    const h = S*0.92, w = h*(rest.naturalWidth/rest.naturalHeight);
    const hx = cx - S*0.30, hy = cy + S*0.16;         // 左手で刃を上に立てて構え
    ctx.save(); ctx.translate(hx,hy); ctx.rotate(-0.10); ctx.imageSmoothingEnabled=false;
    ctx.drawImage(rest, -0.5*w, -0.90*h, w, h);       // 柄＝下端をピボット
    ctx.restore();
  }
}
// チョコナイト：盾(右)＝クッキータンクの盾を構え／剣(左)＝クッキーナイトの剣を振る（drawCookieSwordと同じ振り）
function drawChocoKnight(u, S, cx, cy){
  const c = u.side==='p'?'blue':'red';
  // 盾（クッキータンクのチョコ盾）を右手に構える・歩行で軽く揺れる
  const sh = SPRITES['ctank_shield_'+c] || SPRITES['ctank_shield_blue'];
  if(sh && sh.complete && sh.naturalWidth){
    const shH=S*0.70, shW=shH*(sh.naturalWidth/sh.naturalHeight);
    const by = u.moving ? Math.sin(u.bob*0.6)*S*0.03 : 0;
    ctx.save(); ctx.translate(cx+S*0.28, cy+S*0.05+by); ctx.imageSmoothingEnabled=false;
    ctx.drawImage(sh, -0.5*shW, -0.5*shH, shW, shH); ctx.restore();
  }
  // 剣（クッキーナイトの剣）を左手で振る＝待機は立てて構え／攻撃は斬撃エフェクト付きで横薙ぎ
  const rest = SPRITES['cknight_sword_'+c] || SPRITES['cknight_sword_blue'];
  const slash = SPRITES['cknight_slash_'+c] || SPRITES['cknight_slash_blue'];
  if(u.atkAnim>0 && slash && slash.complete && slash.naturalWidth){
    const a = 1 - u.atkAnim/ATK_ANIM;
    const w = S*1.20, h = w*(slash.naturalHeight/slash.naturalWidth);
    const hx = cx - S*0.14, hy = cy + S*0.03, ang = -0.62 + 1.05*a;
    ctx.save(); ctx.translate(hx,hy); ctx.rotate(ang); ctx.imageSmoothingEnabled=false;
    ctx.drawImage(slash, -0.86*w, -0.5*h, w, h); ctx.restore();
  } else if(rest && rest.complete && rest.naturalWidth){
    const h = S*0.92, w = h*(rest.naturalWidth/rest.naturalHeight);
    const hx = cx - S*0.30, hy = cy + S*0.16;
    ctx.save(); ctx.translate(hx,hy); ctx.rotate(-0.10); ctx.imageSmoothingEnabled=false;
    ctx.drawImage(rest, -0.5*w, -0.90*h, w, h); ctx.restore();
  }
}
// チョコの剣(左)・盾(右)（本家 drawChocoGear 移植）。攻撃=剣を左へ振り下ろし／歩行=盾が揺れる
const CSW_PIVX=0.5, CSW_PIVY=0.82;
function drawChocoGear(u, S, cx, cy){
  const c=u.side==='p'?'blue':'red';
  const sword=SPRITES['choco_sword_'+c], shield=SPRITES['choco_shield_'+c];
  if(shield && shield.complete && shield.naturalWidth){
    const shW=S*0.42, shH=shW*(shield.naturalHeight/shield.naturalWidth);
    const by = u.moving ? Math.sin(u.bob*0.6)*S*0.03 : 0;   // 揺れ控えめ
    ctx.save(); ctx.translate(cx+S*0.26, cy+S*0.05+by); ctx.imageSmoothingEnabled=false; ctx.drawImage(shield,-0.5*shW,-0.5*shH,shW,shH); ctx.restore();
  }
  if(sword && sword.complete && sword.naturalWidth){
    const swH=S*0.72, swW=swH*(sword.naturalWidth/sword.naturalHeight);
    let ang=-0.25;
    if(u.atkAnim>0){ const a=1-u.atkAnim/ATK_ANIM; ang=-0.5 - 2.0*a; }
    ctx.save(); ctx.translate(cx-S*0.24, cy+S*0.04); ctx.rotate(ang); ctx.imageSmoothingEnabled=false;
    ctx.drawImage(sword,-CSW_PIVX*swW,-CSW_PIVY*swH,swW,swH); ctx.restore();
  }
}
// 大福の刀・鞘（本家 drawDaifukuWeapon 移植）。納刀→抜刀(charge)→突撃(dash)→左で振り下ろし(walk攻撃)
const KAT_PIVX=0.24, KAT_PIVY=0.5;
function drawDaifukuWeapon(u, S, cx, cy){
  const kat=SPRITES['daifuku_katana'], sh=SPRITES['daifuku_sheath'];
  if(!kat || !kat.complete || !kat.naturalWidth) return;
  const kW=S*0.92, kH=kW*(kat.naturalHeight/kat.naturalWidth);
  const SA=Math.PI-2.3, dcos=Math.cos(SA), dsin=Math.sin(SA);
  const SCX=cx+S*0.15, SCY=cy+S*0.20, SLEN=S*0.66;
  const openX=SCX-dcos*SLEN*0.5, openY=SCY-dsin*SLEN*0.5;
  const shePX=openX-dcos*0.17*S, shePY=openY-dsin*0.17*S;
  const drawKat=function(px,py,ang){ ctx.save(); ctx.translate(px,py); ctx.rotate(ang); ctx.imageSmoothingEnabled=false; ctx.drawImage(kat,-KAT_PIVX*kW,-KAT_PIVY*kH,kW,kH); ctx.restore(); };
  const drawSheath=function(){ if(!sh||!sh.complete||!sh.naturalWidth) return; const sW=SLEN, sHh=sW*(sh.naturalHeight/sh.naturalWidth); ctx.save(); ctx.translate(SCX,SCY); ctx.rotate(SA); ctx.imageSmoothingEnabled=false; ctx.drawImage(sh,-0.5*sW,-0.5*sHh,sW,sHh); ctx.restore(); };
  const DRAW_DIST=S*0.30;
  // nyankoの状態→本家cstate相当
  const windup = u.charging && u.chargeT < (u.U.charge?u.U.charge.windup:0);
  let st;
  if(u.charging && windup) st='charge';
  else if(u.charging) st='dash';
  else st='walk';
  let px, py, ang, behind=false;
  if(st==='dash'){
    behind=true; px=shePX + (-dcos)*DRAW_DIST; py=shePY + (-dsin)*DRAW_DIST; ang=SA;
  } else if(st==='walk' && u.atkAnim>0){
    const a=1-u.atkAnim/ATK_ANIM; px=cx-S*0.12; py=cy+S*0.12; ang=-2.35 - 1.5*a;
  } else if(st==='walk'){
    px=cx-S*0.12; py=cy+S*0.12; ang=-2.75;
  } else if(st==='charge'){
    behind=true;
    const prog = u.U.charge.windup>0 ? Math.min(1,(u.chargeT||0)/u.U.charge.windup) : 0;
    const p = prog<0.3 ? 0 : Math.min(1,(prog-0.3)/0.7);
    px=shePX + (-dcos)*p*DRAW_DIST; py=shePY + (-dsin)*p*DRAW_DIST; ang=SA;
  } else { behind=true; px=shePX; py=shePY; ang=SA; }
  if(behind){ drawKat(px,py,ang); drawSheath(); }
  else { drawSheath(); drawKat(px,py,ang); }
}
// 居合の斬撃アーク
function drawSlashes(){
  for(const sl of world.slashes){
    const p=sl.t/sl.dur, a=1-p;
    const cx=sl.x + sl.dir*(24+p*34), cy=sl.y;
    ctx.save(); ctx.globalAlpha=a*0.85; ctx.strokeStyle='#fff'; ctx.lineWidth=5; ctx.lineCap='round';
    const base = sl.dir>0 ? 0 : Math.PI;
    ctx.beginPath(); ctx.arc(cx, cy, sl.reach*1.3, base-0.85, base+0.85); ctx.stroke();
    ctx.globalAlpha=a*0.4; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx, cy, sl.reach*1.6, base-0.7, base+0.7); ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

function drawUnit(u){
  const D = u.U;
  const team = u.side==='p'?'blue':'red';
  const S = 58 * (D.scale||1) * (u.sMul||1);
  const cx = u.x;
  const air = -(u.kbY||0);                      // 吹き飛びの高さ（px・0以上）
  const footY = u.y + (u.kbY||0);               // 本体は吹き飛び中は浮く（kbYは負＝上）
  // 影は地面に残し、浮くほど小さく薄く（＝飛んでる感）
  ctx.save(); ctx.globalAlpha=0.28*Math.max(0.25, 1-air/70); ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(cx, u.y, S*0.30*Math.max(0.4,1-air/120), S*0.10, 0,0,6.28); ctx.fill(); ctx.restore();
  if(u.side==='e' && D.spr && SPRITES[D.spr]){
    drawFoeSprite(u, S, cx, footY + (Math.sin(u.bob)*2));       // 敵＝立ち絵スプライト（ユーザー提供の画像）
  }else if(u.side==='e' && D.mold){
    drawMold(u, S, cx, footY + (Math.sin(u.bob)*2));            // 敵＝カビ軍団（手描き）
  }else if(D.gear){
    drawGearUnit(u, S, cx, footY, team);                        // 武器合成キャラ（槍/剣/刀）
  }else{
    const A = D.anim;
    // フレーム選択（ぽよんスライムは phase から潰れ/伸び/通常＋跳ね上げ）
    let frameKey, lift=0;
    if(A && A.hop && u.moving){
      const ph = hopPhase(u, A.fps||1.3);
      frameKey = ((ph<0.15||ph>0.85) ? A.squash : (ph>=0.40&&ph<=0.60) ? A.base : A.up) + '_' + team;
      lift = Math.sin(ph*Math.PI) * S * 0.16;
    } else {
      frameKey = animFrame(u);
    }
    const im = SPRITES[frameKey] || SPRITES[D.spr+'_'+team];
    // 歩行：フレーム切替キャラはゆるやかに上下（プルプルしないよう控えめ・低速）
    let bobY = 0;
    if(A && A.hop) bobY = 0;
    else if(A && A.walk && u.moving) bobY = -Math.abs(Math.sin(elapsed*A.fps*0.8 + u.x))*1.6;
    else if(u.moving) bobY = Math.sin(u.bob)*2;
    // 攻撃のモーション：前へ踏み込む＋潰れ
    let lungeX=0, sqx=1, sqy=1;
    if(u.atkAnim>0 && !(A && A.atk)){    // 専用の攻撃ポーズが無いキャラは踏み込みで表現
      const a = Math.sin((u.atkAnim/ATK_ANIM)*Math.PI);
      lungeX = u.dir * a * S*0.18; sqx = 1 + 0.08*a; sqy = 1 - 0.10*a;
    }
    ctx.save();
    ctx.translate(cx + lungeX, footY + bobY - lift);
    if(u.side==='p') ctx.scale(-1,1);   // 味方は左へ進む＝左向き（スプライトは右向きが素）
    ctx.scale(sqx, sqy);
    if(u.fuseT>=0) ctx.globalAlpha = 0.6 + 0.4*Math.sin(elapsed*40);
    if(im && im.complete && im.naturalWidth){ ctx.drawImage(im, -S/2, -S, S, S); }
    else if(CANDY_IMG && CANDY_IMG.complete && CANDY_IMG.naturalWidth){ ctx.imageSmoothingEnabled=false; ctx.drawImage(CANDY_IMG, -S/2, -S, S, S); }
    else { ctx.font=(S*0.7)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillText('🍬',0,-6); }
    ctx.restore();
  }
  if(u.hp < u.maxHp){
    const w=S*0.5,h=4,bx=cx-w/2,by=footY-S-2;
    ctx.fillStyle='#0008'; ctx.fillRect(bx,by,w,h);
    ctx.fillStyle = u.side==='p'?'#6fd66f':'#b6e06a'; ctx.fillRect(bx,by,w*Math.max(0,u.hp/u.maxHp),h);
  }
  // 色トレイト（敵の属性）は drawMold で体色に反映済み＝ここでのバッジ描画は不要
  // パーティークッキー：頭上のミラーボール
  if(u.U.disco && u.auraT>0) drawMirrorBall(cx, footY-S-6, elapsed);
  // 攻撃バフ中の味方：小さな♪キラキラ
  if(u.buffMul>1 && !(u.U.disco)){
    ctx.fillStyle='#ffe27a'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.globalAlpha=0.7+0.3*Math.sin(elapsed*8+u.x); ctx.fillText('♪', cx+S*0.3, footY-S+2); ctx.globalAlpha=1;
  }
  // カウンター蓄積中：赤いオーラ（溜まっているほど濃く脈動）＝返せる量が見える
  if(u.U.counter && u.counter>0){
    const f = Math.min(1, u.counter/(u.atk*COUNTER_CAP));
    ctx.save(); ctx.globalAlpha=(0.25+0.45*f)*(0.7+0.3*Math.sin(elapsed*9+u.x));
    ctx.strokeStyle='#ff4a3a'; ctx.lineWidth=2+2.5*f;
    ctx.beginPath(); ctx.ellipse(cx, footY-S*0.42, S*0.46, S*0.5, 0, 0, 6.28); ctx.stroke();
    ctx.restore(); ctx.globalAlpha=1;
  }
}

/* ミラーボール（キラキラ回転する球） */
function drawMirrorBall(x, y, t){
  ctx.save(); ctx.translate(x,y);
  // 吊り紐
  ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(0,-9); ctx.stroke();
  // 球（市松のミラー）
  ctx.fillStyle='#bcd2e8'; ctx.beginPath(); ctx.arc(0,0,9,0,6.28); ctx.fill();
  for(let i=0;i<10;i++){ const a=i*0.9+t*3; ctx.fillStyle=(i%2)?'#ffffff':'#7fa8d8';
    ctx.fillRect(Math.cos(a)*3-1.5, Math.sin(a)*3-1.5, 3,3); }
  // キラッ
  ctx.globalAlpha=0.5+0.5*Math.sin(t*10); ctx.fillStyle='#fff';
  ctx.fillRect(-1,-14,2,4); ctx.fillRect(-14,-1,4,2); ctx.fillRect(10,-1,4,2);
  ctx.globalAlpha=1; ctx.restore();
}

/* --- 敵の立ち絵スプライト描画（画像を足元アンカーで・吹き飛び中は回転） --- */
function drawFoeSprite(u, S, cx, footY){
  const im = SPRITES[u.U.spr]; if(!(im && im.complete && im.naturalWidth)) return;
  ctx.save();
  ctx.translate(cx, footY - S*0.5);
  if(u.kbT>0) ctx.rotate((KB_TIME-u.kbT)*7*Math.sign(u.kbVX||-1));   // 吹き飛び中はくるっと回転
  if(u.U.mold==='spiky' && u.fuseT>=0){ const p=1+0.18*Math.sin(elapsed*40); ctx.scale(p,p); }  // 自爆導火中はふくらむ（将来用）
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(im, -S/2, -S/2, S, S);
  ctx.restore();
}
/* --- カビ敵の手描き（プレースホルダ／画像素材なし） ---
   mold: blob=もやもやカビ玉 / phage=脚つきウイルス砲 / spiky=トゲ球（自爆） */
function drawMold(u, S, cx, cy){
  const D = u.U, tt = traitTint(u);                       // 色トレイトがあれば体色を塗り替え（plainは元の配色）
  const col = tt ? tt.col : (D.col||'#7fae5c'), dk = tt ? tt.dk : (D.col2||'#4f7038');
  const r = S*0.36;
  const top = cy - S*0.5;                       // 体の中心を足元より上へ
  const puls = D.mold==='spiky' && u.fuseT>=0 ? (1 + 0.18*Math.sin(elapsed*40)) : 1;
  ctx.save();
  ctx.translate(cx, top);
  if(u.kbT>0) ctx.rotate((KB_TIME-u.kbT)*7*Math.sign(u.kbVX||-1));   // 吹き飛び中はくるっと回転
  ctx.scale(puls, puls);
  // 目の向き（プレイヤー＝右を見る）
  const look = 2.2;
  if(D.mold==='phage'){
    // 脚つきウイルス（着陸船型）
    ctx.strokeStyle=dk; ctx.lineWidth=Math.max(2,S*0.05); ctx.lineCap='round';
    for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(i*r*0.5,0); ctx.lineTo(i*r*0.9, r*0.9+S*0.16); ctx.stroke(); }
    // 頭（六角）
    ctx.fillStyle=col; ctx.beginPath();
    for(let k=0;k<6;k++){ const a=Math.PI/6 + k*Math.PI/3; const px=Math.cos(a)*r, py=Math.sin(a)*r*0.9-r*0.2;
      k?ctx.lineTo(px,py):ctx.moveTo(px,py); } ctx.closePath(); ctx.fill();
    ctx.strokeStyle=dk; ctx.lineWidth=2; ctx.stroke();
    eyes(0,-r*0.25, r*0.5, S*0.11, look);
  } else if(D.mold==='spiky'){
    // トゲ球（自爆ウイルス）
    ctx.fillStyle=dk;
    for(let k=0;k<9;k++){ const a=k*6.283/9; const ox=Math.cos(a)*r, oy=Math.sin(a)*r;
      ctx.beginPath(); ctx.moveTo(ox*0.8,oy*0.8);
      ctx.lineTo(ox*1.35 - Math.sin(a)*r*0.18, oy*1.35 + Math.cos(a)*r*0.18);
      ctx.lineTo(ox*1.35 + Math.sin(a)*r*0.18, oy*1.35 - Math.cos(a)*r*0.18); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle=col; circle(0,0,r);
    eyes(0,-r*0.1, r*0.42, S*0.1, look);
  } else {
    // もやもやカビ玉（デコボコ）
    ctx.fillStyle=col;
    const lumps=[[0,0,1],[-0.55,-0.15,0.6],[0.55,-0.1,0.62],[-0.3,-0.55,0.5],[0.32,-0.5,0.52],[0,0.35,0.7]];
    for(const [lx,ly,ls] of lumps) circle(lx*r, ly*r, r*ls);
    // カビの斑点
    ctx.fillStyle=dk;
    for(const [sx,sy,ss] of [[-0.35,-0.1,0.14],[0.3,0.05,0.12],[0.05,-0.4,0.1],[-0.1,0.3,0.11]]) circle(sx*r,sy*r,r*ss);
    // 浮遊する胞子
    ctx.fillStyle=col; ctx.globalAlpha=0.6;
    for(let k=0;k<3;k++){ const a=elapsed*1.4 + k*2.1 + u.x*0.02; circle(Math.cos(a)*r*1.15, -r*1.0 - (k*4) + Math.sin(a)*3, r*0.08); }
    ctx.globalAlpha=1;
    eyes(0,-r*0.15, r*0.5, S*0.12, look);
  }
  ctx.restore();

  function circle(x,y,rr){ ctx.beginPath(); ctx.arc(x,y,rr,0,6.283); ctx.fill(); }
  function eyes(ex,ey,sp,er,lk){
    for(const s of [-1,1]){
      ctx.fillStyle='#fff'; circle(ex+s*sp*0.5, ey, er);
      ctx.fillStyle='#241a1a'; circle(ex+s*sp*0.5 + lk, ey+er*0.1, er*0.5);
    }
  }
}

function drawShot(s){
  if(s.side==='e'){                    // カビの胞子弾（トゲ付きの緑玉）
    ctx.save(); ctx.translate(s.x,s.y);
    ctx.fillStyle='#5f7d3a';
    for(let k=0;k<6;k++){ const a=k*6.283/6 + elapsed*6; ctx.beginPath();
      ctx.moveTo(Math.cos(a)*3,Math.sin(a)*3); ctx.lineTo(Math.cos(a)*9,Math.sin(a)*9); ctx.lineTo(Math.cos(a+0.5)*3,Math.sin(a+0.5)*3); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle='#a7c96a'; ctx.beginPath(); ctx.arc(0,0,5,0,6.283); ctx.fill();
    ctx.restore(); return;
  }
  if(s.ice){   // アイスウィザードの氷弾（水色のキラキラ）
    ctx.save(); ctx.translate(s.x,s.y);
    ctx.fillStyle='#bfeaff'; ctx.beginPath(); ctx.arc(0,0,6,0,6.28); ctx.fill();
    ctx.fillStyle='#7fc6ff'; for(let k=0;k<4;k++){ const a=k*1.57+elapsed*4; ctx.fillRect(Math.cos(a)*7-1.5,Math.sin(a)*7-1.5,3,3); }
    ctx.restore(); return;
  }
  const im = SPRITES['arrow_'+(s.side==='p'?'blue':'red')];
  const sz = s.arrow ? CONF.arrowSize : 28;     // 矢は大きめ（大量に飛ぶ迫力）
  ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.ang);
  if(im && im.complete && im.naturalWidth){ ctx.drawImage(im,-sz/2,-sz/2,sz,sz); }
  else { ctx.fillStyle='#7fd0ff'; ctx.fillRect(-sz*0.25,-2,sz*0.5,4); }
  ctx.restore();
}

function render(){
  const W=CONF.W,H=CONF.H,g=CONF.groundY;
  updateCamera();
  // 1) 空：キャンバス全体をスクリーン空間で塗る（カメラ非依存＝余白ゼロ・スマホ縦でも上まで空）
  ctx.setTransform(1,0,0,1,0,0);
  const bg = ctx.createLinearGradient(0,0,0,cv.height);
  bg.addColorStop(0,'#3a2a55'); bg.addColorStop(0.6,'#2a3a66'); bg.addColorStop(1,'#243a5c');
  ctx.fillStyle=bg; ctx.fillRect(0,0,cv.width,cv.height);
  // 2) カメラ変換（世界座標）＝ズーム＋横スクロール＋地面の縦位置(oy)
  ctx.setTransform(cam.zoom,0,0,cam.zoom, -cam.x*cam.zoom, cam.oy);
  ctx.fillStyle='#ffffff12';
  for(let i=0;i<4;i++){ ctx.beginPath(); ctx.ellipse(120+i*260, g+20, 200, 90, 0,0,6.28); ctx.fill(); }
  // 画面揺れ（サムライの居合ヒット時）＝背景以外を少し揺らす
  const shk = world.shake||0;
  ctx.save();
  if(shk>0) ctx.translate(Math.sin(elapsed*90)*shk, Math.cos(elapsed*70)*shk*0.6);
  const gh = Math.max(H-g, cv.height);   // 地面は画面下まで届くよう十分下へ延ばす（スマホ縦で下に空きを作らない）
  ctx.fillStyle='#e7b57a'; ctx.fillRect(-8,g,W+16,gh);
  ctx.fillStyle='#d59f63'; ctx.fillRect(-8,g,W+16,6);
  drawCastle(24,'e'); drawCastle(W-24,'p');   // 左＝敵(赤) / 右＝味方(青)
  drawCastleHP(W-24, php, myMaxHP);           // 自陣タワーのHP（城の上に数値＋バー）
  // タワー攻撃の射程ライン（自城=右 から ここまで届く）＝プレイヤーに「ここまで」を可視化
  { const minX = W - upgVal('tRng');
    ctx.save();
    ctx.strokeStyle='#ff7aa8'; ctx.lineWidth=2; ctx.setLineDash([7,7]); ctx.globalAlpha=0.55;
    ctx.beginPath(); ctx.moveTo(minX, g); ctx.lineTo(minX, g-100); ctx.stroke(); ctx.setLineDash([]);
    ctx.globalAlpha=0.9; ctx.fillStyle='#ff7aa8';
    ctx.beginPath(); ctx.moveTo(minX, g-100); ctx.lineTo(minX+7, g-108); ctx.lineTo(minX-7, g-108); ctx.closePath(); ctx.fill();  // ▲マーカー
    ctx.font='bold 10px sans-serif'; ctx.textAlign='center'; ctx.fillStyle='#ffd7e6';
    ctx.fillText('💥タワー射程', minX, g-112);
    // 覆う範囲（minX→右）をうっすら
    ctx.globalAlpha=0.06; ctx.fillStyle='#ff7aa8'; ctx.fillRect(minX, g-100, W-minX, 100);
    ctx.restore(); }
  const us = world.units.slice().sort((a,b)=>a.y-b.y);   // 奥(小y)→手前(大y)
  for(const u of us) drawUnit(u);
  drawSlashes();
  for(const s of world.shots) drawShot(s);
  for(const p of world.parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill(); }
  ctx.globalAlpha=1;
  // フロートテキスト（ばつぐん！ など）
  for(const pp of world.pops){ const a=1-pp.t/pp.dur;
    ctx.globalAlpha=Math.max(0,a); ctx.font='bold 15px sans-serif'; ctx.textAlign='center';
    ctx.lineWidth=3; ctx.strokeStyle='#0009'; ctx.strokeText(pp.text, pp.x, pp.y);
    ctx.fillStyle=pp.c||'#fff'; ctx.fillText(pp.text, pp.x, pp.y); }
  ctx.globalAlpha=1;
  ctx.restore();
  drawBeam();
  ctx.setTransform(1,0,0,1,0,0);   // 変換をリセット
  drawWaveHud();                   // 敵タワーの大HPバー＋WAVE進行（スクリーン空間・上部固定）
  if(world.stunFlashT>0){ world.stunFlashT-=1/60; ctx.fillStyle='rgba(255,220,80,'+Math.max(0,world.stunFlashT*0.5)+')'; ctx.fillRect(0,0,cv.width,cv.height); }
}
// 自陣タワーのHP（城の上に数値＋バー・世界座標）
function drawCastleHP(x, hp, maxHp){
  const g=CONF.groundY, by=g-92, bw=66, bh=8, bx=x-bw/2;
  ctx.fillStyle='#0009'; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
  ctx.fillStyle='#2a1a12'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#4aa3ff'; ctx.fillRect(bx+1,by+1,(bw-2)*Math.max(0,hp/maxHp),bh-2);
  ctx.fillStyle='#fff'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.lineWidth=3; ctx.strokeStyle='#0009'; ctx.strokeText(Math.max(0,Math.ceil(hp)), x, by-2);
  ctx.fillText(Math.max(0,Math.ceil(hp)), x, by-2);
}
// 敵タワーの大HPバー＋WAVE進行（●○）＋ブレイク制限時間（スクリーン空間・上部）
function drawWaveHud(){
  const waves = curStage && curStage.waves; if(!waves) return;
  const w = waves[curWave] || {};
  const pad=Math.round(cv.width*0.03), bw=cv.width-pad*2, bx=pad, by=Math.round(cv.height*0.015);
  const bh=Math.max(16, Math.round(cv.height*0.030));
  ctx.textBaseline='middle';
  ctx.fillStyle='#0008'; ctx.fillRect(bx-3,by-3,bw+6,bh+6);
  ctx.fillStyle='#2a1a12'; ctx.fillRect(bx,by,bw,bh);
  const frac=Math.max(0, foeMaxHP? ehp/foeMaxHP : 0);
  ctx.fillStyle = w.type==='break' ? '#ff6a5a' : '#8fd24a';
  ctx.fillRect(bx+2,by+2,(bw-4)*frac,bh-4);
  const label = w.type==='break' ? (w.final?'最終ブレイク':'ブレイク') : ('WAVE '+(curWave+1));
  ctx.font='bold '+Math.round(bh*0.62)+'px sans-serif'; ctx.fillStyle='#fff';
  ctx.textAlign='left';  ctx.lineWidth=3; ctx.strokeStyle='#0009';
  ctx.strokeText('🏰 '+label, bx+8, by+bh/2); ctx.fillText('🏰 '+label, bx+8, by+bh/2);
  ctx.textAlign='right'; ctx.strokeText(Math.max(0,Math.ceil(ehp))+' / '+foeMaxHP, bx+bw-8, by+bh/2); ctx.fillText(Math.max(0,Math.ceil(ehp))+' / '+foeMaxHP, bx+bw-8, by+bh/2);
  // WAVEピップ
  const pr=Math.max(4,Math.round(bh*0.24)), pipY=by+bh+pr+4;
  for(let i=0;i<waves.length;i++){ const px=bx+8+pr+i*(pr*2.6);
    ctx.beginPath(); ctx.arc(px, pipY, pr, 0, 6.28);
    ctx.fillStyle = i<curWave ? '#6a4a30' : (i===curWave ? (waves[i].type==='break'?'#ff6a5a':'#8fd24a') : '#b89a86'); ctx.fill();
    if(waves[i].type==='break'){ ctx.lineWidth=2; ctx.strokeStyle='#ffd24a'; ctx.stroke(); } }
  // ブレイク制限時間
  if(w.type==='break' && world.breakTimer>0){ ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillStyle= world.breakTimer<5?'#ff5a4a':'#ffd24a'; ctx.font='bold '+Math.round(bh*0.6)+'px sans-serif';
    ctx.strokeText('⏱ '+Math.ceil(world.breakTimer), bx+bw-8, pipY); ctx.fillText('⏱ '+Math.ceil(world.breakTimer), bx+bw-8, pipY); }
}

/* タワー攻撃のビーム演出（右の自城→左へ走る光の帯） */
function drawBeam(){
  const bm = world.beam; if(!bm) return;
  const W=CONF.W, H=CONF.H, g=CONF.groundY;
  const k = bm.t/bm.dur;                 // 0→1
  const reach = bm.reach!=null ? bm.reach : 0;
  const headX = W - k*(W - reach);       // 右から射程ぶん左へ
  ctx.save();
  // うっすら全域フラッシュ
  ctx.globalAlpha = 0.25*(1-k);
  ctx.fillStyle = '#fff3c4'; ctx.fillRect(0, g-120, W, 120);
  // 走る光の帯
  ctx.globalAlpha = 0.9*(1-k*0.5);
  const grad = ctx.createLinearGradient(headX-70,0,headX+70,0);
  grad.addColorStop(0,'rgba(255,220,110,0)'); grad.addColorStop(0.5,'#fff6d0'); grad.addColorStop(1,'rgba(255,220,110,0)');
  ctx.fillStyle = grad; ctx.fillRect(headX-70, g-112, 140, 108);
  ctx.restore();
  ctx.globalAlpha = 1;
}

/* --- HUD --- */
function hud(){
  const capped = money >= effCap()-0.5;                 // 上限に到達しているか
  const mt=document.getElementById('moneyTxt');
  mt.textContent = Math.floor(money) + (capped?' MAX':'');
  mt.style.color = capped ? '#ff8f5a' : '';             // 上限中はオレンジで警告
  document.getElementById('rateTxt').textContent = effRate();
  document.getElementById('capTxt').textContent = effCap();
  const pv=Math.max(0,php/myMaxHP), ev=Math.max(0,ehp/foeMaxHP);
  document.getElementById('php').style.width=(pv*100)+'%';
  document.getElementById('ehp').style.width=(ev*100)+'%';
  document.getElementById('phpTxt').textContent=Math.max(0,Math.ceil(php));
  document.getElementById('ehpTxt').textContent=Math.max(0,Math.ceil(ehp));
  const wb=document.getElementById('walletBtn'), ws=document.getElementById('walletSub');
  if(walletLv>=walletMaxLv()){ ws.textContent='MAX'; wb.classList.add('off'); wb.classList.remove('rdy'); }
  else{ ws.innerHTML=CANDY+walletCost(); const poorW=money<walletCost(); wb.classList.toggle('off',poorW); wb.classList.toggle('rdy',!poorW); }
  const tb=document.getElementById('towerBtn'), ts=document.getElementById('towerSub'), tf=document.getElementById('towerCdFill');
  const ready = towerCd<=0;
  ts.textContent = ready ? 'OK' : Math.ceil(towerCd)+'秒';
  tb.classList.toggle('off', !ready); tb.classList.toggle('rdy', ready);
  tf.style.transform='scaleY('+(ready?0:towerCd/CONF.towerCd)+')';
  for(const k of ORDER){
    const el=btnEls[k]; if(!el) continue; const D=DEFS[k];
    const onCd=cd[k]>0, poor=money<D.cost;
    el.classList.toggle('off', onCd||poor); el.classList.toggle('rdy', !onCd&&!poor);
    el._cd.style.transform='scaleY('+(onCd? cd[k]/D.rc : 0)+')';
  }
}

/* --- ループ --- */
function loop(t){
  if(!lastT) lastT=t;
  let dt=(t-lastT)/1000; lastT=t;
  if(dt>0.05) dt=0.05;
  if(running && !paused){ for(let i=0;i<gameSpeed;i++) step(dt); }   // 倍速＝1フレームでstepを複数回（大きなdtでの貫通を防ぐ）／一時停止中は進めない
  render(); hud();
  requestAnimationFrame(loop);
}
/* --- 一時停止（バトルを止める。もう一度で再開） --- */

function renderPauseBtn(){ const b=document.getElementById('pauseBtn'); if(!b) return;
  b.textContent = paused ? '▶ 再開' : '⏸'; b.classList.toggle('on', paused); }
function togglePause(){ if(!running) return; paused=!paused; renderPauseBtn();
  const ov=document.getElementById('pauseOverlay'); if(ov) ov.style.display = paused ? 'flex' : 'none'; }
function clearPause(){ paused=false; renderPauseBtn(); const ov=document.getElementById('pauseOverlay'); if(ov) ov.style.display='none'; }
/* --- 倍速トグル（×1 ⇄ ×2）。端末に保存＝好みを覚える --- */

try{ const sv=parseInt(localStorage.getItem('sm_speed'),10); if(sv===2) gameSpeed=2; }catch(e){}

/* --- 決着 --- */
function win(youWon){
  clearTut(); clearPause();
  const ov=document.getElementById('overlay');
  const T=document.getElementById('ovT'), P=document.getElementById('ovP'), B=document.getElementById('overButtons');
  B.innerHTML='';
  const addBtn=(label,fn,alt)=>{ const b=document.createElement('button'); b.textContent=label; if(alt) b.style.background='#0005'; b.onclick=fn; B.appendChild(b); };
  if(youWon && !curStage){   // ステージ外（テスト等）：進行なしの簡易表示
    T.textContent='🎉 しょうり！'; P.textContent='敵のお城を落とした！'; ov.style.display='flex'; SFX_win(); return;
  }
  if(youWon){
    const s=curStage, first=!save.cleared.includes(s.id);
    const reward = first ? s.coins : REPLAY_COINS;
    const exp = stageExp(s, first);
    save.coins += reward;
    save.exp = (save.exp||0) + exp;
    if(first) save.cleared.push(s.id);
    saveGame();
    T.textContent='🎉 ステージクリア！';
    P.innerHTML='🎓 <b style="color:#6fb7ff">+'+exp+'</b> EXP　／　'+CANDY+' <b style="color:#ffdf6b">+'+reward+'</b> コイン'+(first?'（初クリア）':'')
      +'<br>所持：🎓'+(save.exp)+' EXP・'+CANDY+save.coins;
    const next=STAGE_BY_ID[s.id+1];
    if(next && save.cleared.includes(s.id)) addBtn('▶ 次のステージへ',()=>{ closeOver(); openLoadout(next); });
    addBtn('🎒 編成にもどる',()=>{ closeOver(); openLoadout(s); }, true);
    addBtn('🏠 ホームへ',()=>{ closeOver(); goHome(); }, true);
    SFX_win();
  }else{
    T.textContent='💥 まけ…';
    P.textContent='お城が落ちてしまった…もう一度挑戦しよう';
    addBtn('🔄 リトライ',()=>{ closeOver(); startBattle(); });
    addBtn('🎒 編成にもどる',()=>{ closeOver(); openLoadout(curStage); }, true);
    addBtn('🏠 ホームへ',()=>{ closeOver(); goHome(); }, true);
    SFX_lose();
  }
  ov.style.display='flex';
}
function closeOver(){ document.getElementById('overlay').style.display='none'; }

/* --- 進捗リセット（テスト用）：セーブを初期状態に戻す。難易度・ゲーム進行の検証に使う --- */
function resetProgress(){
