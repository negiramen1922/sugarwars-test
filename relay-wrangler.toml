# SUGAR WARS — PVP中継サーバー（Cloudflare Worker + Durable Object）用の wrangler 設定。
# 使い方：このファイルを wrangler.toml として使うか、--config relay-wrangler.toml を付けてデプロイ。
#   npx wrangler deploy --config relay-wrangler.toml
# 詳しい手順は RELAY_SETUP.md。

name = "sugarwars-relay"
main = "relay-worker.js"
compatibility_date = "2024-09-23"

# Durable Object（1部屋=1オブジェクト）のバインディング
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

# Durable Object クラスの登録（SQLite backed＝無料プランでも使える）
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]
